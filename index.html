      {/* 報酬・入金サマリー */}
      {(()=>{
        const myPayments=(payments||[]).filter(p=>(p.case_ids||[]).includes(c.case_id));
        if(myPayments.length===0)return null;
        return(
          <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:500,color:"#666",marginBottom:10}}>💴 報酬・入金</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {myPayments.map(p=>{
                const isBundle=p.case_ids.length>1;
                const myItems=isBundle?(p.items||[]).filter(it=>it.applicant&&c.applicant&&it.applicant===c.applicant):(p.items||[]);
                const total=myItems.length>0?calcTaxedTotal(calcItemsTotal(myItems),p.tax_mode||"tax_incl")+(isBundle?0:calcExpBillable(p.expenses)):calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
                const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
                const myPaid=isBundle&&myItems.length>0?null:paid;
                const remaining=myPaid!==null?total-myPaid:null;
                const status=myPaid!==null?(myPaid>=total&&total>0?"入金済":myPaid>0?"一部入金":(p.invoice_date?"請求済":"未請求")):(p.invoice_date?"請求済":"未請求");
                const stColor=status==="入金済"?"#3B6D11":status==="一部入金"?"#854F0B":status==="請求済"?"#185FA5":"#999";
                const stBg=status==="入金済"?"#EAF3DE":status==="一部入金"?"#FAEEDA":status==="請求済"?"#E6F1FB":"#F5F5F5";
                return(
                  <div key={p.payment_id} onClick={()=>setOpenPaymentModal(p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"var(--bg2)",borderRadius:6,cursor:"pointer",border:"0.5px solid rgba(0,0,0,0.05)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
                      <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:3,background:stBg,color:stColor,whiteSpace:"nowrap"}}>{status}</span>
                      <span style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.bill_to_name||"—"}{isBundle&&<span style={{fontSize:10,marginLeft:4,color:"#999"}}>まとめ{p.case_ids.length}件</span>}</span>
                    </div>
                    <div style={{display:"flex",gap:14,alignItems:"center",fontSize:12,whiteSpace:"nowrap"}}>
                      <span style={{color:"#666"}}>請求 <strong>{fmt(total)}</strong></span>
                      {myPaid!==null&&myPaid>0&&<span style={{color:"#666"}}>入金 <strong>{fmt(myPaid)}</strong></span>}
                      {remaining!==null&&remaining>0&&myPaid>0&&<span style={{color:"#A32D2D"}}>残 <strong>{fmt(remaining)}</strong></span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* 書類チェックリスト */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:500,color:"#666"}}>書類チェックリスト</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"#999"}}>提出済 {submitted}/{total}</span>
            <div style={{width:80,height:5,background:"#eee",borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:"#1D9E75",borderRadius:3}}/></div>
            <span style={{fontSize:11,color:"#3B6D11",fontWeight:500}}>{pct}%</span>
          </div>
        </div>
        {groups.map(group=>(
          <div key={group||"none"}>
            {group&&<div style={{fontSize:11,color:"#999",fontWeight:500,marginBottom:4,marginTop:8,paddingLeft:6,borderLeft:"2px solid #D3D1C7"}}>{group}</div>}
            {c.docs.filter(d=>d.group===group).map(doc=>{
              const s=DOC_STATUS_STYLE[doc.status]||DOC_STATUS_STYLE["未取得"];
              const isIrr=doc.status==="不要";
              return(
                <div key={doc.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,background:s.bg}}>
                  <div onClick={()=>!isIrr&&cycleDoc(doc.id)} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${s.chkBorder}`,background:s.chkBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:isIrr?"default":"pointer",opacity:isIrr?0.3:1}}>
                    {(doc.status==="取得済"||doc.status==="提出済")&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
                  </div>
                  <span style={{flex:1,fontSize:12,color:s.textColor,textDecoration:isIrr?"line-through":""}}>{doc.name}</span>
                  {doc.status==="提出済"&&<span style={{fontSize:10,color:"#3B6D11",fontWeight:500}}>提出済</span>}
                  {doc.status==="取得済"&&<span style={{fontSize:10,color:"#854F0B",fontWeight:500}}>取得済</span>}
                  <button onClick={()=>setDocStatus(doc.id,isIrr?"未取得":"不要")} style={{fontSize:10,padding:"1px 5px",borderRadius:3,border:"0.5px solid #ddd",background:"transparent",cursor:"pointer",color:isIrr?"#999":"#ddd"}}>{isIrr?"戻す":"不要"}</button>
                </div>
              );
            })}
          </div>
        ))}
        <div style={{marginTop:10,display:"flex",gap:6}}>
          <input value={newDocName} onChange={e=>setNewDocName(e.target.value)} placeholder="書類名を入力…" style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}} onKeyDown={e=>e.key==="Enter"&&addDoc()}/>
          <button onClick={addDoc} style={{fontSize:11,padding:"5px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",color:"#444"}}>+ 追加</button>
        </div>
      </div>

      {/* ヒアリング */}
      {c.hearing_items&&c.hearing_items.length>0&&(
        <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"#666",marginBottom:10}}>ヒアリング項目</div>
          {c.hearing_items.map((item,i)=>(
            <div key={i} style={{marginBottom:12}}>
              <div style={{fontSize:12,color:"#444",marginBottom:5}}>{item.label}</div>
              {item.type==="yearmonth"?(
                <div style={{display:"flex",gap:6}}>
                  <select value={item.year||""} onChange={e=>updateHearing(i,"year",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}><option value="">年</option>{YEARS.map(y=><option key={y} value={y}>{y}年</option>)}</select>
                  <select value={item.month||""} onChange={e=>updateHearing(i,"month",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}><option value="">月</option>{MONTHS.map(m=><option key={m} value={m}>{m}月</option>)}</select>
                </div>

            </div>
          ))}
        </div>
      )}

      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#666",marginBottom:10}}>追加資料対応履歴</div>
        {(c.additional_requests||[]).map(r=>{
          const isSubmitted=!!r.submitted_date;
          const deadlineDays=r.deadline_date?Math.ceil((new Date(r.deadline_date)-new Date(new Date().toDateString()))/86400000):null;
          return(
            <div key={r.id} style={{padding:"10px 12px",background:isSubmitted?"#F5FBF0":"#FCEBEB",borderRadius:6,marginBottom:6,border:`0.5px solid ${isSubmitted?"#1D9E75":"#F7C1C1"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:11,color:isSubmitted?"#3B6D11":"#A32D2D",fontWeight:500}}>要請日 {r.requested_date}</span>
                {isSubmitted?<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"#EAF3DE",color:"#3B6D11",fontWeight:500}}>提出済 {r.submitted_date}</span>
                  :r.deadline_date?<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:deadlineDays<=3?"#FCEBEB":"#FAEEDA",color:deadlineDays<=3?"#A32D2D":"#854F0B",fontWeight:500}}>締切 {r.deadline_date}{deadlineDays!==null?` (残${deadlineDays}日)`:""}</span>:null}
              </div>
              {(Array.isArray(r.requested_docs)?r.requested_docs:[r.requested_docs]).map((d,di)=>(
                <div key={di} style={{fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                  <span style={{width:4,height:4,borderRadius:"50%",background:"#A32D2D",flexShrink:0}}/>
                  {d}
                </div>
              ))}
              {r.submission_method&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}><span style={{fontSize:11,padding:"1px 6px",borderRadius:3,background:"#EEEDFE",color:"#534AB7"}}>{r.submission_method}</span>{r.tracking_number&&<span style={{fontSize:11,color:"#666"}}>追跡: {r.tracking_number}</span>}</div>}
              {r.memo&&<div style={{fontSize:11,padding:"3px 8px",background:"rgba(0,0,0,0.04)",borderRadius:4,color:"#555",marginTop:4}}>メモ: {r.memo}</div>}
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}>
                <button onClick={()=>startEditReq(r)} style={{fontSize:10,padding:"2px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>編集</button>
              </div>
            </div>
          );
        })}
        <div style={{background:"var(--bg2)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:10,color:editReqId?"#185FA5":"#999",fontWeight:editReqId?500:400}}>{editReqId?"記録を編集中":"追加資料要請を記録"}</span>{editReqId&&<button onClick={resetReqForm} style={{fontSize:10,padding:"1px 7px",cursor:"pointer",borderRadius:3,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#999"}}>キャンセル</button>}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>要請日</div><input type="date" max="9999-12-31" min="1900-01-01" value={newReqDate} onChange={e=>setNewReqDate(e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>提出締切日</div><input type="date" max="9999-12-31" min="1900-01-01" value={newReqDeadline} onChange={e=>setNewReqDeadline(e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
          </div>
          <div style={{marginBottom:6}}>
            <div style={{fontSize:10,color:"#999",marginBottom:4}}>要請された書類</div>
            {/* プリセット＋履歴ボタン */}
            {(()=>{
              const current=new Set(newReqDocs.filter(d=>d.trim()));
              // 過去の全案件から要請書類名を集める（重複除去）
              const pastDocs=new Set();
              (allCases||[]).forEach(cs=>(cs.additional_requests||[]).forEach(r=>(Array.isArray(r.requested_docs)?r.requested_docs:[]).forEach(d=>{if(d.trim())pastDocs.add(d.trim());})));
              // プリセット＋履歴をマージ（プリセット優先、重複除去）
              const presetSet=new Set(ADD_REQ_PRESETS);
              const historyOnly=[...pastDocs].filter(d=>!presetSet.has(d));
              const addDocName=(name)=>{if(current.has(name))return;const empty=newReqDocs.findIndex(d=>!d.trim());if(empty>=0){const a=[...newReqDocs];a[empty]=name;setNewReqDocs(a);}else{setNewReqDocs([...newReqDocs,name]);}};
              return(
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                  {ADD_REQ_PRESETS.map(p=>(
                    <button key={p} onClick={()=>addDocName(p)} disabled={current.has(p)}

            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>提出方法</div><select value={newReqMethod} onChange={e=>setNewReqMethod(e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}><option value="">選択</option><option value="オンラインシステム">オンラインシステム</option><option value="レターパック">レターパック</option></select></div>

          <div style={{display:"flex",gap:6}}>
            <input value={newReqNote} onChange={e=>setNewReqNote(e.target.value)} placeholder="備考（任意）" style={{flex:1,fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/>
            <button onClick={addAdditionalRequest} style={{fontSize:12,padding:"4px 12px",cursor:"pointer",borderRadius:5,border:"0.5px solid #A32D2D",background:"#FCEBEB",color:"#A32D2D",whiteSpace:"nowrap"}}>{editReqId?"更新":"記録"}</button>

        <textarea value={c.notes||""} onChange={e=>updateField("notes",e.target.value)} rows={2} placeholder="メモを入力…" style={{width:"100%",fontSize:12,padding:"6px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",resize:"vertical"}}/>

      {showClientModal&&client&&<ClientInfoModal client={client} onClose={()=>setShowClientModal(false)}/>}
      {openPaymentModal&&(()=>{
        const p=openPaymentModal;
        const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
        const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
        const remaining=total-paid;
        const caseNames=(p.case_ids||[]).map(id=>(allCases||[]).find(cc=>cc.case_id===id)).filter(Boolean).map(cc=>cc.applicant||cc.case_title).join("、");
        return(
          <div onClick={()=>setOpenPaymentModal(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg)",borderRadius:12,padding:24,maxWidth:480,width:"90%",position:"relative"}}>
              <button onClick={()=>setOpenPaymentModal(null)} style={{position:"absolute",top:12,right:14,fontSize:16,background:"transparent",border:"none",cursor:"pointer",color:"#999"}}>✕</button>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{p.bill_to_name||"—"}</div>
              <div style={{fontSize:13,color:"#666",marginBottom:12}}>{caseNames}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px",fontSize:13,color:"#333"}}>
                <div><span style={{color:"#999",fontSize:11}}>請求額</span><br/>{fmt(total)}</div>
                <div><span style={{color:"#999",fontSize:11}}>入金済</span><br/>{fmt(paid)}</div>
                <div><span style={{color:"#999",fontSize:11}}>残額</span><br/><span style={{color:"#A32D2D",fontWeight:500}}>{fmt(remaining)}</span></div>
                <div><span style={{color:"#999",fontSize:11}}>支払期限</span><br/>{p.due_date||"未設定"}</div>
                <div><span style={{color:"#999",fontSize:11}}>請求書番号</span><br/>{p.invoice_number||"—"}</div>
                <div><span style={{color:"#999",fontSize:11}}>請求日</span><br/>{p.invoice_date||"—"}</div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// 8b. 共通：関係者リスト
// ============================================================
function ContactsSection({contacts,onChange}){
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:"",role:"",org:"",phone:"",email:"",note:""});
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  function startAdd(){setForm({name:"",role:"",org:"",phone:"",email:"",note:""});setEditId(null);setShowForm(true);}
  function startEdit(ct){setForm({name:ct.name,role:ct.role||"",org:ct.org||"",phone:ct.phone||"",email:ct.email||"",note:ct.note||""});setEditId(ct.id);setShowForm(true);}
  function save(){
    if(!form.name.trim())return;
    if(editId){onChange(contacts.map(c=>c.id===editId?{...c,...form}:c));}
    else{onChange([...contacts,{id:"ct"+Date.now(),...form}]);}
    setShowForm(false);setEditId(null);
  }
  function remove(id){onChange(contacts.filter(c=>c.id!==id));}
  const ROLE_PRESETS=["司法書士","税理士","社労士","弁護士","担当者","審査官","その他"];
  return(
    <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:500,color:"#666"}}>👤 関係者</span>
        <button onClick={startAdd} style={{fontSize:11,padding:"3px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",color:"#444"}}>+ 追加</button>
      </div>
      {contacts.length===0&&!showForm&&<div style={{fontSize:12,color:"#bbb",textAlign:"center",padding:8}}>関係者の登録はありません</div>}
      {contacts.map(ct=>(
        <div key={ct.id} style={{padding:"8px 10px",background:"var(--bg2)",borderRadius:6,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{fontSize:13,fontWeight:500}}>{ct.name}</span>
              {ct.role&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"#EEEDFE",color:"#534AB7"}}>{ct.role}</span>}
            </div>
            {ct.org&&<div style={{fontSize:11,color:"#888",marginBottom:1}}>{ct.org}</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {ct.phone&&<span style={{fontSize:11,color:"#666"}}>📞 {ct.phone}</span>}
              {ct.email&&<span style={{fontSize:11,color:"#666"}}>✉ {ct.email}</span>}
            </div>
            {ct.note&&<div style={{fontSize:11,color:"#999",marginTop:2}}>{ct.note}</div>}
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0}}>
            <button onClick={()=>startEdit(ct)} style={{fontSize:10,padding:"2px 6px",cursor:"pointer",borderRadius:3,border:"0.5px solid #ddd",background:"transparent",color:"#999"}}>編集</button>
            <button onClick={()=>remove(ct.id)} style={{fontSize:10,padding:"2px 6px",cursor:"pointer",borderRadius:3,border:"0.5px solid #ddd",background:"transparent",color:"#ccc"}}>×</button>
          </div>
        </div>
      ))}
      {showForm&&(
        <div style={{padding:10,background:"#FAFAF8",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.1)",marginTop:6}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>氏名 *</div><input value={form.name} onChange={e=>up("name",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>役割</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{ROLE_PRESETS.map(r=><button key={r} onClick={()=>up("role",r)} style={{fontSize:9,padding:"1px 5px",borderRadius:3,cursor:"pointer",border:"0.5px solid",borderColor:form.role===r?"#534AB7":"#ddd",background:form.role===r?"#EEEDFE":"transparent",color:form.role===r?"#534AB7":"#999"}}>{r}</button>)}</div>
              <input value={form.role} onChange={e=>up("role",e.target.value)} placeholder="または自由入力" style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>所属</div><input value={form.org} onChange={e=>up("org",e.target.value)} placeholder="事務所名・部署等" style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>電話</div><input value={form.phone} onChange={e=>up("phone",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>メール</div><input value={form.email} onChange={e=>up("email",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
          </div>
          <div style={{marginBottom:8}}><div style={{fontSize:10,color:"#999",marginBottom:2}}>メモ</div><input value={form.note} onChange={e=>up("note",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
          <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
            <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{fontSize:11,padding:"4px 12px",cursor:"pointer",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>キャンセル</button>
            <button onClick={save} disabled={!form.name.trim()} style={{fontSize:11,padding:"4px 12px",cursor:"pointer",borderRadius:5,border:"0.5px solid #534AB7",background:"#EEEDFE",color:"#534AB7",fontWeight:500,opacity:form.name.trim()?1:0.5}}>{editId?"更新":"追加"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CommLogSection({logs,contacts,onChange}){
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),contact_name:"",method:"電話",content:""});
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  function save(){
    if(!form.content.trim())return;
    onChange([{id:"cl"+Date.now(),...form},...logs]);
    setForm({date:new Date().toISOString().slice(0,10),contact_name:"",method:"電話",content:""});setShowForm(false);
  }
  function remove(id){onChange(logs.filter(l=>l.id!==id));}
  return(
    <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:500,color:"#666"}}>💬 やり取り履歴</span>

      </div>
      {showForm&&(
        <div style={{padding:10,background:"#FAFAF8",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.1)",marginBottom:8}}>
          <div style={{display:"grid",gridTemplateColumns:"120px 1fr 100px",gap:8,marginBottom:8}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>日付</div><input type="date" max="9999-12-31" value={form.date} onChange={e=>up("date",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>相手</div>

              :<input value={form.contact_name} onChange={e=>up("contact_name",e.target.value)} placeholder="相手の名前" style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/>}
              {contacts.length>0&&<input value={form.contact_name} onChange={e=>up("contact_name",e.target.value)} placeholder="または直接入力" style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",marginTop:4}}/>}
            </div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:2}}>手段</div><select value={form.method} onChange={e=>up("method",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}>{COMM_METHODS.map(m=><option key={m}>{m}</option>)}</select></div>
          </div>
          <div style={{marginBottom:8}}><div style={{fontSize:10,color:"#999",marginBottom:2}}>内容 *</div><textarea value={form.content} onChange={e=>up("content",e.target.value)} rows={2} placeholder="やり取りの内容…" style={{width:"100%",fontSize:12,padding:"6px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",resize:"vertical"}}/></div>

        );
      })}

  );
}

              <select value={category} onChange={e=>setCategory(e.target.value)} style={{width:"100%",fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)"}}>{GENERAL_CASE_CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:4}}>案件タイトル <span style={{color:"#A32D2D"}}>*</span></div>
              <input value={title} onChange={e=>{setTitle(e.target.value);if(e.target.value.trim())setShowError(false);}} placeholder="例: 車庫証明申請" style={{width:"100%",fontSize:13,padding:"6px 8px",borderRadius:6,border:showError?"1px solid #A32D2D":"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)"}}/></div>
          </div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:4}}>依頼者（会社）</div>
            <div style={{display:"flex",gap:6}}>
              <select value={requesterId} onChange={e=>{setRequesterId(e.target.value);const co=allCompanies.find(c=>c.company_id===e.target.value);if(co)setRequesterText(co.name);}} style={{flex:1,fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)"}}><option value="">選択 or 右に直接入力</option>{allCompanies.map(c=><option key={c.company_id} value={c.company_id}>{c.name}</option>)}</select>
              <input value={requesterText} onChange={e=>{setRequesterText(e.target.value);setRequesterId("");}} placeholder="直接入力" style={{flex:1,fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)"}}/>
            </div>
          </div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:4}}>クライアント（個人）</div>
            <select value={clientId} onChange={e=>setClientId(e.target.value)} style={{width:"100%",fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)"}}><option value="">なし</option>{clients.map(c=><option key={c.client_id} value={c.client_id}>{c.name_roman}</option>)}</select></div>
        </div>
        <div style={{padding:"10px 16px",borderTop:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8}}>
          {showError&&<span style={{fontSize:11,color:"#A32D2D"}}>タイトルを入力してください</span>}
          <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>キャンセル</button>
          <button onClick={handleSave} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#185FA5",fontWeight:500}}>登録</button>
        </div>
      </div>
    </div>
  );
}

function ClientInfoModal({client,onClose}){
  const cl=client;
  if(!cl)return null;
  const isGen=cl.client_type==="general";
  const days=!isGen&&cl.residence_expiry?getDays(cl.residence_expiry):null;
  const pdays=!isGen&&cl.passport_expiry?getDays(cl.passport_expiry):null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg)",borderRadius:12,border:"0.5px solid rgba(0,0,0,0.15)",width:440,maxHeight:"70vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 18px",borderBottom:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            <Avatar client={cl} size={36}/>
            <div>
              <div style={{fontSize:15,fontWeight:600}}>{cl.name_roman||cl.name_kana||"—"}</div>
              {cl.name_kana&&cl.name_roman&&<div style={{fontSize:11,color:"var(--text2)"}}>{cl.name_kana}</div>}

          </div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:12}}>
          {isGen?(
            <>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"#F1EFE8",color:"#5F5E5A",fontWeight:500}}>📄 一般クライアント</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><div style={{fontSize:10,color:"#999"}}>電話番号</div><div style={{fontSize:13}}>{cl.phone||"—"}</div></div>
                <div><div style={{fontSize:10,color:"#999"}}>メール</div><div style={{fontSize:13}}>{cl.email||"—"}</div></div>
              </div>
              <div><div style={{fontSize:10,color:"#999"}}>住所</div><div style={{fontSize:13}}>{cl.postal_code?"〒"+cl.postal_code+" ":""}{cl.address||"—"}</div></div>
              {cl.company_name&&<div><div style={{fontSize:10,color:"#999"}}>所属会社</div><div style={{fontSize:13}}>{cl.company_name}</div></div>}
              <div><div style={{fontSize:10,color:"#999"}}>備考</div><div style={{fontSize:12,whiteSpace:"pre-wrap"}}>{cl.notes||"—"}</div></div>
            </>
          ):(
            <>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                {cl.nationality&&<span style={{fontSize:12,color:"var(--text2)"}}>{cl.nationality}</span>}
                {cl.gender&&<span style={{fontSize:12,color:"var(--text2)"}}>· {cl.gender}</span>}
                {cl.residence_status&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:(STATUS_COLORS[cl.residence_status]||STATUS_COLORS.default).bg,color:(STATUS_COLORS[cl.residence_status]||STATUS_COLORS.default).color,border:"0.5px solid "+(STATUS_COLORS[cl.residence_status]||STATUS_COLORS.default).border,fontWeight:500}}>{cl.residence_status}</span>}
              </div>
              <div style={{background:"var(--bg2)",borderRadius:8,padding:12,display:"flex",flexDirection:"column",gap:8}}>
                <div style={{fontSize:11,fontWeight:500,color:"#666"}}>🛂 在留情報</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div><div style={{fontSize:10,color:"#999"}}>在留資格</div><div style={{fontSize:13}}>{cl.residence_status||"—"}</div></div>
                  <div><div style={{fontSize:10,color:"#999"}}>在留期限</div><div style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}>{cl.residence_expiry||"—"} {days!==null&&<AlertBadge days={days}/>}</div></div>
                  <div><div style={{fontSize:10,color:"#999"}}>在留カード番号</div><div style={{fontSize:13,fontFamily:"monospace"}}>{cl.residence_card||"—"}</div></div>
                  <div><div style={{fontSize:10,color:"#999"}}>入国日</div><div style={{fontSize:13}}>{cl.entry_date||"—"}</div></div>
                </div>
              </div>
              <div style={{background:"var(--bg2)",borderRadius:8,padding:12,display:"flex",flexDirection:"column",gap:8}}>
                <div style={{fontSize:11,fontWeight:500,color:"#666"}}>🛃 パスポート</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div><div style={{fontSize:10,color:"#999"}}>パスポート番号</div><div style={{fontSize:13,fontFamily:"monospace"}}>{cl.passport_number||"—"}</div></div>
                  <div><div style={{fontSize:10,color:"#999"}}>有効期限</div><div style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}>{cl.passport_expiry||"—"} {pdays!==null&&<AlertBadge days={pdays}/>}</div></div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {cl.phone&&<div><div style={{fontSize:10,color:"#999"}}>電話番号</div><div style={{fontSize:13}}>{cl.phone}</div></div>}
                {cl.company_name&&<div><div style={{fontSize:10,color:"#999"}}>所属会社</div><div style={{fontSize:13}}>{cl.company_name}</div></div>}

            </>

          <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 8e. 一般案件：詳細ビュー
// ============================================================
function GeneralCaseDetail({c,onUpdate,onDelete,clients,payments}){
  const [newDocName,setNewDocName]=useState("");
  const [showClientModal,setShowClientModal]=useState(false);
  const [openPaymentModal,setOpenPaymentModal]=useState(null);
  function updateField(f,v){onUpdate({...c,[f]:v});}
  function cycleDoc(docId){onUpdate({...c,docs:(c.docs||[]).map(d=>d.id!==docId?d:{...d,status:DOC_STATUS_CYCLE[d.status]||"未取得"})});}
  function addDoc(){if(!newDocName.trim())return;onUpdate({...c,docs:[...(c.docs||[]),{id:"x"+Date.now(),name:newDocName.trim(),group:null,status:"未取得"}]});setNewDocName("");}
  function removeDoc(docId){onUpdate({...c,docs:(c.docs||[]).filter(d=>d.id!==docId)});}
  const catColor=JOURNAL_CAT_COLOR[c.category]||{bg:"#F1EFE8",color:"#5F5E5A"};
  const docs=c.docs||[];
  const submitted=docs.filter(d=>d.status==="提出済").length;
  const linkedClient=clients.find(x=>x.client_id===c.client_id);
  const displayName=c.applicant||linkedClient?.name_roman||c.requester||"";
  return(
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:18,display:"flex",flexDirection:"column",gap:14}}>
      {/* ヘッダー */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            {displayName&&<div style={{fontSize:16,fontWeight:600,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
              {linkedClient?<span onClick={()=>setShowClientModal(true)} style={{cursor:"pointer",borderBottom:"1px dashed #999"}} title="クライアント情報を表示">{displayName}</span>:<span>{displayName}</span>}
            </div>}
            <div style={{fontSize:13,color:displayName?"var(--text3)":"#1a1a1a",fontWeight:displayName?400:500,marginBottom:3}}><input value={c.case_title||""} onChange={e=>updateField("case_title",e.target.value)} style={{fontSize:13,fontWeight:displayName?400:500,border:"none",background:"transparent",width:"100%",padding:0,color:displayName?"var(--text3)":"#1a1a1a"}}/></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <select value={c.category} onChange={e=>updateField("category",e.target.value)} style={{fontSize:11,padding:"2px 6px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:catColor.bg,color:catColor.color,fontWeight:500,cursor:"pointer"}}>{GENERAL_CASE_CATEGORIES.map(cat=><option key={cat}>{cat}</option>)}</select>
              {c.requester&&displayName!==c.requester&&<span style={{fontSize:12,color:"#666"}}>{c.requester}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <select value={c.status} onChange={e=>updateField("status",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)",cursor:"pointer"}}>
              {[...new Set([...GENERAL_STATUS_LIST,...CASE_STATUS_LIST,c.status])].map(s=><option key={s}>{s}</option>)}
            </select>
            {onDelete&&<button onClick={onDelete} style={{fontSize:10,padding:"4px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid #A32D2D",background:"transparent",color:"#A32D2D"}}>🗑 削除</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
          {[["受任日","accepted_date"],["申請日","applied_date"],["完了日","result_date"]].map(([label,field])=>(
            <div key={field}><div style={{fontSize:10,color:"#999",marginBottom:3}}>{label}</div>
              <input type="date" max="9999-12-31" min="1900-01-01" value={c[field]||""} onChange={e=>updateField(field,e.target.value||null)} style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>依頼者</div>
            <input value={c.requester||""} onChange={e=>updateField("requester",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>申請人</div>
            <input value={c.applicant||""} onChange={e=>updateField("applicant",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
        </div>
        <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>クライアント紐づけ</div>
          <select value={c.client_id||""} onChange={e=>{const cid=e.target.value;updateField("client_id",cid);if(cid){updateField("applicant_id",cid);const cl=clients.find(x=>x.client_id===cid);if(cl&&!c.applicant)updateField("applicant",cl.name_roman);}else{updateField("applicant_id","");}}} style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}>
            <option value="">なし</option>{clients.map(cl=><option key={cl.client_id} value={cl.client_id}>{cl.name_roman||cl.name_kana||cl.client_id}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>報酬</div>
            <input type="number" value={c.fee||""} onChange={e=>updateField("fee",Number(e.target.value)||0)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>書類の枚数</div>
            <input value={c.doc_count||""} onChange={e=>updateField("doc_count",e.target.value)} placeholder="例: 5" style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>職務上請求書No</div>
            <input value={c.official_req_no||""} onChange={e=>updateField("official_req_no",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
        </div>
        <div style={{marginTop:10}}><div style={{fontSize:10,color:"#999",marginBottom:3}}>📁 Googleドライブ</div>
          <div style={{display:"flex",gap:4}}>
            <input value={c.drive_path||""} onChange={e=>updateField("drive_path",e.target.value)} placeholder="ローカルパス" style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",flex:1}}/>
            {c.drive_path&&<button onClick={()=>{navigator.clipboard.writeText(c.drive_path);const b=document.getElementById("toast");if(b){b.textContent="📋 パスをコピーしました";b.style.opacity=1;setTimeout(()=>b.style.opacity=0,1800);}}} style={{fontSize:11,padding:"4px 8px",borderRadius:5,background:"var(--bg2)",border:"0.5px solid var(--border)",cursor:"pointer"}}>📂</button>}
          </div>
        </div>
      </div>
      {/* 報酬・入金サマリー */}
      {(()=>{
        const myPayments=(payments||[]).filter(p=>(p.case_ids||[]).includes(c.case_id));
        if(myPayments.length===0)return null;
        return(
          <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:12,fontWeight:500,color:"#666",marginBottom:10}}>💴 報酬・入金</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {myPayments.map(p=>{
                const isBundle=p.case_ids.length>1;
                const myItems=isBundle?(p.items||[]).filter(it=>it.applicant&&c.applicant&&it.applicant===c.applicant):(p.items||[]);
                const total=myItems.length>0?calcTaxedTotal(calcItemsTotal(myItems),p.tax_mode||"tax_incl")+(isBundle?0:calcExpBillable(p.expenses)):calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
                const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
                const myPaid=isBundle&&myItems.length>0?null:paid;
                const remaining=myPaid!==null?total-myPaid:null;
                const status=myPaid!==null?(myPaid>=total&&total>0?"入金済":myPaid>0?"一部入金":(p.invoice_date?"請求済":"未請求")):(p.invoice_date?"請求済":"未請求");
                const stColor=status==="入金済"?"#3B6D11":status==="一部入金"?"#854F0B":status==="請求済"?"#185FA5":"#999";
                const stBg=status==="入金済"?"#EAF3DE":status==="一部入金"?"#FAEEDA":status==="請求済"?"#E6F1FB":"#F5F5F5";
                return(
                  <div key={p.payment_id} onClick={()=>setOpenPaymentModal(p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"var(--bg2)",borderRadius:6,cursor:"pointer",border:"0.5px solid rgba(0,0,0,0.05)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
                      <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:3,background:stBg,color:stColor,whiteSpace:"nowrap"}}>{status}</span>
                      <span style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.bill_to_name||"—"}{isBundle&&<span style={{fontSize:10,marginLeft:4,color:"#999"}}>まとめ{p.case_ids.length}件</span>}</span>
                    </div>
                    <div style={{display:"flex",gap:14,alignItems:"center",fontSize:12,whiteSpace:"nowrap"}}>
                      <span style={{color:"#666"}}>請求 <strong>{fmt(total)}</strong></span>
                      {myPaid!==null&&myPaid>0&&<span style={{color:"#666"}}>入金 <strong>{fmt(myPaid)}</strong></span>}
                      {remaining!==null&&remaining>0&&myPaid>0&&<span style={{color:"#A32D2D"}}>残 <strong>{fmt(remaining)}</strong></span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* 書類チェックリスト（手動） */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:500,color:"#666"}}>書類チェックリスト</span>
          {docs.length>0&&<span style={{fontSize:11,color:"#999"}}>提出済 {submitted}/{docs.length}</span>}
        </div>
        {docs.length===0&&<div style={{fontSize:12,color:"#bbb",textAlign:"center",padding:4,marginBottom:6}}>書類を追加してください</div>}
        {docs.map(doc=>{
          const s=DOC_STATUS_STYLE[doc.status]||DOC_STATUS_STYLE["未取得"];
          const isIrr=doc.status==="不要";
          return(
            <div key={doc.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,background:s.bg}}>
              <div onClick={()=>!isIrr&&cycleDoc(doc.id)} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${s.chkBorder}`,background:s.chkBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:isIrr?"default":"pointer"}}>
                {(doc.status==="取得済"||doc.status==="提出済")&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
              </div>
              <span style={{flex:1,fontSize:12,color:s.textColor,textDecoration:isIrr?"line-through":""}}>{doc.name}</span>
              {doc.status==="提出済"&&<span style={{fontSize:10,color:"#3B6D11",fontWeight:500}}>提出済</span>}
              {doc.status==="取得済"&&<span style={{fontSize:10,color:"#854F0B",fontWeight:500}}>取得済</span>}
              <button onClick={()=>removeDoc(doc.id)} style={{fontSize:10,padding:"1px 5px",borderRadius:3,border:"0.5px solid #ddd",background:"transparent",cursor:"pointer",color:"#ccc"}}>×</button>
            </div>
          );
        })}
        <div style={{marginTop:6,display:"flex",gap:6}}>
          <input value={newDocName} onChange={e=>setNewDocName(e.target.value)} placeholder="書類名を入力…" style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}} onKeyDown={e=>e.key==="Enter"&&addDoc()}/>
          <button onClick={addDoc} style={{fontSize:11,padding:"5px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",color:"#444"}}>+ 追加</button>
        </div>
      </div>
      {/* 関係者・やり取り（共通） */}
      <ContactsSection contacts={c.contacts||[]} onChange={v=>updateField("contacts",v)}/>
      <CommLogSection logs={c.comm_log||[]} contacts={c.contacts||[]} onChange={v=>updateField("comm_log",v)}/>
      {/* 備考 */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#666",marginBottom:8}}>備考</div>
        <textarea value={c.notes||""} onChange={e=>updateField("notes",e.target.value)} rows={3} placeholder="メモを入力…" style={{width:"100%",fontSize:12,padding:"6px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",resize:"vertical"}}/>
      </div>
      {/* クライアント情報モーダル */}
      {showClientModal&&linkedClient&&<ClientInfoModal client={linkedClient} onClose={()=>setShowClientModal(false)}/>}
      {openPaymentModal&&(()=>{
        const p=openPaymentModal;
        const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
        const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
        const remaining=total-paid;
        return(
          <div onClick={()=>setOpenPaymentModal(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg)",borderRadius:12,padding:24,maxWidth:480,width:"90%",position:"relative"}}>
              <button onClick={()=>setOpenPaymentModal(null)} style={{position:"absolute",top:12,right:14,fontSize:16,background:"transparent",border:"none",cursor:"pointer",color:"#999"}}>✕</button>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{p.bill_to_name||"—"}</div>
              <div style={{fontSize:13,color:"#666",marginBottom:12}}>{c.applicant||c.case_title||""}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px",fontSize:13,color:"#333"}}>
                <div><span style={{color:"#999",fontSize:11}}>請求額</span><br/>{fmt(total)}</div>
                <div><span style={{color:"#999",fontSize:11}}>入金済</span><br/>{fmt(paid)}</div>
                <div><span style={{color:"#999",fontSize:11}}>残額</span><br/><span style={{color:"#A32D2D",fontWeight:500}}>{fmt(remaining)}</span></div>
                <div><span style={{color:"#999",fontSize:11}}>支払期限</span><br/>{p.due_date||"未設定"}</div>
                <div><span style={{color:"#999",fontSize:11}}>請求書番号</span><br/>{p.invoice_number||"—"}</div>
                <div><span style={{color:"#999",fontSize:11}}>請求日</span><br/>{p.invoice_date||"—"}</div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function CaseManagement({data,setData,navigateCaseId,clearNavigate}){
  const isMobile=useMobile();
  const {clients,cases,companies,payments}=data;
  const setCases=useCallback(fn=>{setData(prev=>{const nc=typeof fn==="function"?fn(prev.cases):fn;return{...prev,cases:nc};});},[setData]);
  const [subTab,setSubTab]=useState("immigration");
  const [selected,setSelected]=useState(()=>{
    if(navigateCaseId){const t=cases.find(c=>c.case_id===navigateCaseId);if(t)return t;}
    return null;
  });
  const [showDetail,setShowDetail]=useState(()=>!!navigateCaseId);
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("全て");
  const [showNew,setShowNew]=useState(false);

  useEffect(()=>{
    if(navigateCaseId){
      const t=cases.find(c=>c.case_id===navigateCaseId);
      if(t){
        setSelected(t);setFilterStatus("全て");setSearch("");
        setSubTab(t.template_id?"immigration":"general");
      }
      if(clearNavigate)clearNavigate();
    }
  },[navigateCaseId]);

  const immigrationCases=cases.filter(c=>c.template_id);
  const generalCases=cases.filter(c=>c.case_type==="general");
  const currentCases=subTab==="immigration"?immigrationCases:generalCases;

  const filtered=[...currentCases.filter(c=>{const q=search.toLowerCase();return(!q||[c.case_title,c.applicant||"",c.requester||""].some(s=>s.toLowerCase().includes(q)))&&(filterStatus==="全て"||c.status===filterStatus);})].sort((a,b)=>subTab==="immigration"?((a.applicant||"").localeCompare(b.applicant||"")||(a.case_id||"").localeCompare(b.case_id||"")):((b.accepted_date||"").localeCompare(a.accepted_date||"")));
  const activeStatuses=["全て",...new Set(currentCases.map(c=>c.status))];
  const sel=cases.find(c=>c.case_id===selected?.case_id)||null;
  const nextNo=cases.length>0?Math.max(...cases.map(d=>Number(d.no)||0))+1:1;
  const isGeneral=sel?.case_type==="general"||(!sel?.template_id&&sel?.category!=="国際"&&sel?.case_id?.startsWith("G"));

  return(
    <div style={{position:isMobile?"relative":"fixed",top:isMobile?undefined:52,left:isMobile?undefined:0,right:isMobile?undefined:0,bottom:isMobile?undefined:0,height:isMobile?"calc(100vh - 52px)":undefined,display:"flex",background:"#eeede8"}}>
      <div style={{width:isMobile?undefined:252,flex:isMobile?"1":undefined,display:isMobile&&showDetail?"none":"flex",flexDirection:"column",background:"var(--bg)",borderRight:isMobile?"none":"0.5px solid rgba(0,0,0,0.1)"}}>
        <div style={{padding:"12px 12px 8px",borderBottom:"0.5px solid rgba(0,0,0,0.08)",flex:"0 0 auto",background:"var(--bg)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:500}}>案件管理</span>
            <button onClick={()=>setShowNew(true)} style={{width:26,height:26,cursor:"pointer",borderRadius:6,background:"var(--bg2)",border:"0.5px solid rgba(0,0,0,0.2)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
          {/* サブタブ */}
          <div style={{display:"flex",gap:0,marginBottom:8,borderRadius:6,overflow:"hidden",border:"0.5px solid rgba(0,0,0,0.15)"}}>
            {[["immigration","🛂 入管"],["general","📄 一般"]].map(([id,label])=>(
              <button key={id} onClick={()=>{setSubTab(id);setSelected(null);setSearch("");setFilterStatus("全て");}} style={{flex:1,fontSize:11,padding:"5px 0",cursor:"pointer",border:"none",fontWeight:subTab===id?600:400,background:subTab===id?"#1a1a1a":"var(--bg2)",color:subTab===id?"#fff":"#888",transition:"all 0.15s"}}>{label}</button>
            ))}
          </div>
          <div style={{position:"relative"}}>
            <input type="text" placeholder="案件を検索…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",fontSize:12,padding:"5px 8px",paddingRight:search?22:8,borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
            {search&&<span onClick={()=>{setSearch("");setFilterStatus("全て");}} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"var(--text3)",cursor:"pointer",lineHeight:1}}>×</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,padding:"6px 12px 5px",flexWrap:"wrap"}}>
          {activeStatuses.map(s=><button key={s} onClick={()=>setFilterStatus(s)} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:"0.5px solid",cursor:"pointer",borderColor:filterStatus===s?"#378ADD":"rgba(0,0,0,0.12)",background:filterStatus===s?"#E6F1FB":"transparent",color:filterStatus===s?"#185FA5":"#666",fontWeight:filterStatus===s?500:400}}>{s}</button>)}
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{padding:20,textAlign:"center",color:"#bbb",fontSize:12}}>{subTab==="general"?"一般案件はまだありません":"該当する案件はありません"}</div>}
          {filtered.map(c=>{
            const isSel=sel?.case_id===c.case_id;
            const submitted=c.docs?c.docs.filter(d=>d.status==="提出済").length:0;
            const total=c.docs?c.docs.length:0;
            const catColor=JOURNAL_CAT_COLOR[c.category]||{bg:"#F1EFE8",color:"#5F5E5A"};
            return(
              <div key={c.case_id} onClick={()=>{setSelected(c);if(isMobile)setShowDetail(true);}} style={{padding:"9px 12px",cursor:"pointer",borderBottom:"0.5px solid rgba(0,0,0,0.06)",background:isSel?"#E6F1FB":"transparent",borderLeft:isSel?"3px solid #378ADD":"3px solid transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{fontSize:12,fontWeight:500,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1,display:"flex",alignItems:"center",gap:4}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{subTab==="immigration"?(c.applicant||c.case_title):(()=>{const name=c.applicant||c.requester||(c.client_id?((data.clients||[]).find(x=>x.client_id===c.client_id)||{}).name_roman:"");return name||c.case_title;})()}</span>
                    {(c.drive_path||c.drive_url)&&<span onClick={e=>{e.stopPropagation();if(c.drive_path){navigator.clipboard.writeText(c.drive_path);const b=document.getElementById("toast");if(b){b.textContent="📋 パスをコピーしました";b.style.opacity=1;setTimeout(()=>b.style.opacity=0,1800);}}else if(c.drive_url){window.open(c.drive_url,"_blank");}}} style={{flexShrink:0,fontSize:11,opacity:0.5,cursor:"pointer"}} title={c.drive_path?"パスをコピー":"Googleドライブを開く"}>📂</span>}
                  </div>
                </div>
                {subTab==="immigration"&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.case_title}</div>}
                {subTab==="general"&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.case_title}</div>}
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  {subTab==="general"&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:catColor.bg,color:catColor.color}}>{c.category}</span>}
                  {subTab==="immigration"&&c.applied_date&&<span style={{fontSize:10,color:"#854F0B",padding:"1px 5px",borderRadius:3,background:"#FAEEDA"}}>{c.applied_date.replace(/-/g,".")}申請済</span>}
                  <StatusBadge status={c.status} colorMap={CASE_STATUS_COLORS}/>
                  {total>0&&<span style={{fontSize:10,color:"#999"}}>書類 {submitted}/{total}</span>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:"6px 12px",borderTop:"0.5px solid rgba(0,0,0,0.08)",color:"#bbb",fontSize:11}}>{filtered.length} / {currentCases.length} 件</div>
      </div>
      <div style={{flex:1,display:isMobile&&!showDetail?"none":"flex",flexDirection:"column",overflow:"hidden"}}>
        {isMobile&&showDetail&&<button onClick={()=>setShowDetail(false)} style={{display:"flex",alignItems:"center",gap:4,padding:"8px 14px",border:"none",background:"var(--bg)",borderBottom:"0.5px solid var(--border)",cursor:"pointer",color:"var(--accent-text)",fontSize:13,fontWeight:500,width:"100%"}}>← 一覧に戻る</button>}
        {!sel?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#bbb"}}>案件を選択してください</div>
          :isGeneral?<GeneralCaseDetail c={sel} onUpdate={updated=>{setCases(prev=>prev.map(c=>c.case_id===updated.case_id?updated:c));setSelected(updated);}} onDelete={()=>{if(confirm(`「${sel.case_title}」を削除しますか？\n\n⚠️ 事件簿からも完全に消えます。\n記録を残したい場合は「キャンセル」を押して\nステータスを「キャンセル」に変更してください。`)){setCases(prev=>prev.filter(x=>x.case_id!==sel.case_id));setSelected(null);}}} clients={clients} payments={payments||[]}/>
          :<CaseDetail c={sel} onUpdate={updated=>{setCases(prev=>prev.map(c=>c.case_id===updated.case_id?updated:c));setSelected(updated);}} onDelete={()=>{if(confirm(`「${sel.case_title}」を削除しますか？\n\n⚠️ 事件簿からも完全に消えます。\n記録を残したい場合は「キャンセル」を押して\nステータスを「キャンセル」に変更してください。`)){setCases(prev=>prev.filter(x=>x.case_id!==sel.case_id));setSelected(null);}}} clients={clients} allCases={cases} payments={payments||[]}/>}
      </div>
      {showNew&&subTab==="immigration"&&<NewCaseModal onClose={()=>setShowNew(false)} clients={clients} nextNo={nextNo} onSave={nc=>{setCases(prev=>[nc,...prev]);setSelected(nc);setShowNew(false);}}/>}
      {showNew&&subTab==="general"&&<NewGeneralCaseModal onClose={()=>setShowNew(false)} clients={clients} companies={companies||[]} nextNo={nextNo} onSave={nc=>{setCases(prev=>[nc,...prev]);setSelected(nc);setShowNew(false);}}/>}
    </div>
  );
}

function JBadge({text,colors}){
  const c=colors||{bg:"#F1EFE8",color:"#5F5E5A"};
  return <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:c.bg,color:c.color,fontWeight:500,whiteSpace:"nowrap"}}>{text}</span>;
}

function JournalModal({entry,onClose,onSave,nextNo,clients,companies}){
  const isNew=!entry;
  const [form,setForm]=useState(entry||{no:nextNo,accepted_date:new Date().toISOString().slice(0,10),applied_date:"",result_date:"",category:"国際",case_title:"",requester:"",requester_id:"",applicant:"",applicant_id:"",status:"受任",result:"",new_card:"",period:"",next_renewal:"",fee:"",paid:"",notes:"",official_req_no:"",client_id:"",template_id:null,receipt_number:"",docs:null,hearing_items:null,additional_requests:null});
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  const isIntl=form.category==="国際";
  function selectApplicant(cid){const c=clients.find(x=>x.client_id===cid);if(c){up("applicant",c.name_roman);up("applicant_id",c.client_id);}}
  function selectRequester(coid){const co=(companies||COMPANY_DB).find(x=>x.company_id===coid);if(co){up("requester",co.name);up("requester_id",co.company_id);}}
  function handleSave(){if(!form.case_title||(!form.requester&&!form.applicant))return;onSave({...form,case_id:entry?entry.case_id:"J"+Date.now(),fee:Number(form.fee)||0});}

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"var(--bg)",borderRadius:12,border:"0.5px solid rgba(0,0,0,0.15)",width:580,maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"12px 16px",borderBottom:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:500}}>{isNew?"新規事件登録":"事件編集"} #{form.no}</span>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr",gap:10}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>受任番号</div><input value={form.no} onChange={e=>up("no",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"center"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>受任日</div><input type="date" max="9999-12-31" min="1900-01-01" value={form.accepted_date||""} onChange={e=>up("accepted_date",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>カテゴリー</div><select value={form.category} onChange={e=>up("category",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}>{JOURNAL_CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
          </div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>件名</div>
            {isIntl?<div style={{display:"flex",gap:6}}><select value={INTL_PRESETS.includes(form.case_title)?form.case_title:""} onChange={e=>{if(e.target.value)up("case_title",e.target.value);}} style={{flex:1,fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}><option value="">プリセットから選択</option>{INTL_PRESETS.map(p=><option key={p}>{p}</option>)}</select><input value={form.case_title} onChange={e=>up("case_title",e.target.value)} placeholder="または直接入力" style={{flex:1,fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
            :<input value={form.case_title} onChange={e=>up("case_title",e.target.value)} placeholder="件名を入力" style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>}
          </div>
          <div style={{background:"#F8F7F5",border:"0.5px solid rgba(0,0,0,0.08)",borderRadius:8,padding:12}}>
            <div style={{fontSize:11,color:"#999",fontWeight:500,marginBottom:8}}>依頼主・申請人</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>依頼主（会社・個人）</div><div style={{display:"flex",gap:4}}><select value={form.requester_id||""} onChange={e=>{if(e.target.value)selectRequester(e.target.value);else{up("requester","");up("requester_id","");}}} style={{width:120,fontSize:11,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}><option value="">会社を選択</option>{(companies||COMPANY_DB).map(co=><option key={co.company_id} value={co.company_id}>{co.name}</option>)}</select><input value={form.requester} onChange={e=>{up("requester",e.target.value);up("requester_id","");}} placeholder="直接入力も可" style={{flex:1,fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div></div>
              <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>申請人（個人名）</div><div style={{display:"flex",gap:4}}><select value={form.applicant_id||""} onChange={e=>{if(e.target.value)selectApplicant(e.target.value);else{up("applicant","");up("applicant_id","");}}} style={{width:120,fontSize:11,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}><option value="">台帳から選択</option>{clients.map(c=><option key={c.client_id} value={c.client_id}>{c.name_roman}</option>)}</select><input value={form.applicant} onChange={e=>{up("applicant",e.target.value);up("applicant_id","");}} placeholder="直接入力も可" style={{flex:1,fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/></div></div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>ステータス</div><select value={form.status} onChange={e=>up("status",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}>{JOURNAL_STATUS_LIST.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>申請日</div><input type="date" max="9999-12-31" min="1900-01-01" value={form.applied_date||""} onChange={e=>up("applied_date",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>結果日</div><input type="date" max="9999-12-31" min="1900-01-01" value={form.result_date||""} onChange={e=>up("result_date",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>結果</div><select value={form.result} onChange={e=>up("result",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}>{JOURNAL_RESULT_LIST.map(r=><option key={r} value={r}>{r||"（未定）"}</option>)}</select></div>
          </div>
          {isIntl&&<div style={{background:"#F8F7F5",border:"0.5px solid rgba(0,0,0,0.08)",borderRadius:8,padding:12}}>
            <div style={{fontSize:11,color:"#999",fontWeight:500,marginBottom:8}}>入管情報</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>新在留カード番号</div><input value={form.new_card||""} onChange={e=>up("new_card",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)"}}/></div>
              <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>期限</div><input value={form.period||""} onChange={e=>up("period",e.target.value)} placeholder="1年/3年/5年" style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)"}}/></div>
              <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>次回更新</div><input type="date" max="9999-12-31" min="1900-01-01" value={form.next_renewal||""} onChange={e=>up("next_renewal",e.target.value)} style={{width:"100%",fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)"}}/></div>
            </div>
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>報酬額（税込）</div><input type="number" value={form.fee} onChange={e=>up("fee",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"right"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>職務上請求番号</div><input value={form.official_req_no||""} onChange={e=>up("official_req_no",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
            <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>備考</div><input value={form.notes||""} onChange={e=>up("notes",e.target.value)} style={{width:"100%",fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/></div>
          </div>
        </div>
        <div style={{padding:"10px 16px",borderTop:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          {!isNew&&<button onClick={()=>{if(confirm(`この事件を削除しますか？\n\n⚠️ 事件簿から完全に消えます。\n記録を残したい場合は「キャンセル」を押して\nステータスを「キャンセル」に変更してください。`))onSave(null);}} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid #A32D2D",background:"transparent",color:"#A32D2D"}}>削除</button>}
          <div style={{display:"flex",gap:8,marginLeft:"auto"}}>
            <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>キャンセル</button>
            <button onClick={handleSave} disabled={!form.case_title||(!form.requester&&!form.applicant)} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#185FA5",fontWeight:500,opacity:(!form.case_title||(!form.requester&&!form.applicant))?0.4:1}}>保存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function CaseJournal({data,setData}){
  const isMobile=useMobile();
  const {cases,clients}=data;
  const setCases=useCallback(fn=>{setData(prev=>{const nc=typeof fn==="function"?fn(prev.cases):fn;return{...prev,cases:nc};});},[setData]);
  const [search,setSearch]=useState("");
  const [selCats,setSelCats]=useState(new Set());      // 複数選択（空=全て）
  const [selStatuses,setSelStatuses]=useState(new Set()); // 複数選択（空=全て）
  const [selApplicants,setSelApplicants]=useState(new Set()); // 複数選択（空=全て）
  const [filterYM,setFilterYM]=useState("全て");          // 受任年は単一（上位縛り）
  const [filterPayment,setFilterPayment]=useState("全て");
  const [sortKey,setSortKey]=useState("no");
  const [sortAsc,setSortAsc]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [openFilter,setOpenFilter]=useState(null); // "cat"|"status"|"applicant"|null

  const yearOptions=useMemo(()=>{const years=new Set(cases.filter(d=>d.accepted_date).map(d=>d.accepted_date.slice(0,4)));return["全て",...[...years].sort().reverse()];},[cases]);

  // 受任年フィルター後のベース
  const ymFiltered=useMemo(()=>cases.filter(d=>{
    if(filterYM!=="全て"&&(!d.accepted_date||!d.accepted_date.startsWith(filterYM)))return false;
    return true;
  }),[cases,filterYM]);

  const allCats=useMemo(()=>[...new Set(ymFiltered.map(d=>d.category).filter(Boolean))].sort(),[ymFiltered]);
  const allStatuses=useMemo(()=>[...new Set(ymFiltered.map(d=>d.status).filter(Boolean))].sort(),[ymFiltered]);
  const allApplicants=useMemo(()=>[...new Set(ymFiltered.map(d=>d.applicant||d.requester||"").filter(Boolean))].sort(),[ymFiltered]);

  const filtered=useMemo(()=>{
    return ymFiltered.filter(d=>{
      if(selCats.size>0&&!selCats.has(d.category))return false;
      if(selStatuses.size>0&&!selStatuses.has(d.status))return false;
      if(selApplicants.size>0&&!selApplicants.has(d.applicant||d.requester||""))return false;
      if(filterPayment==="未入金"&&(d.fee<=0||calcPaid(d)>=d.fee))return false;
      if(filterPayment==="入金済"&&calcPaid(d)<d.fee)return false;
      if(search){const q=search.toLowerCase();return[d.case_title,d.requester,d.applicant,d.notes,String(d.no)].some(s=>(s||"").toLowerCase().includes(q));}
      return true;
    }).sort((a,b)=>{let va=a[sortKey],vb=b[sortKey];if(typeof va==="string")va=(va||"").toLowerCase();if(typeof vb==="string")vb=(vb||"").toLowerCase();if(va<vb)return sortAsc?-1:1;if(va>vb)return sortAsc?1:-1;return 0;});
  },[ymFiltered,selCats,selStatuses,selApplicants,filterPayment,search,sortKey,sortAsc]);

  const summary=useMemo(()=>{const fee=filtered.reduce((s,d)=>s+(d.fee||0),0);return{fee,count:filtered.length};},[filtered]);
  function handleSort(key){if(sortKey===key)setSortAsc(!sortAsc);else{setSortKey(key);setSortAsc(key==="no"?false:true);}}
  function handleSave(entry){
    if(editEntry){
      if(entry===null)setCases(prev=>prev.filter(d=>d.case_id!==editEntry.case_id));
      else setCases(prev=>prev.map(d=>d.case_id===editEntry.case_id?entry:d));
      setEditEntry(null);
    } else {setCases(prev=>[entry,...prev]);setShowNew(false);}
  }
  const nextNo=cases.length>0?Math.max(...cases.map(d=>Number(d.no)||0))+1:1;
  const SortIcon=({col})=>sortKey!==col?<span style={{color:"#ddd",fontSize:9}}>⇅</span>:<span style={{color:"#185FA5",fontSize:9}}>{sortAsc?"▲":"▼"}</span>;
  const thS={fontSize:10,fontWeight:500,color:"#999",padding:"7px 6px",textAlign:"left",cursor:"pointer",userSelect:"none",background:"var(--bg2)",borderBottom:"0.5px solid rgba(0,0,0,0.1)",whiteSpace:"nowrap",position:"sticky",top:0,zIndex:2};
  const tdS={fontSize:12,padding:"8px 6px",borderBottom:"0.5px solid rgba(0,0,0,0.05)",whiteSpace:"nowrap"};
  const hasFilter=selCats.size>0||selStatuses.size>0||selApplicants.size>0||filterYM!=="全て"||filterPayment!=="全て"||search;
  function clearAll(){setSearch("");setSelCats(new Set());setSelStatuses(new Set());setSelApplicants(new Set());setFilterYM("全て");setFilterPayment("全て");}

  // 複数選択ドロップダウン

    const isOpen=openFilter===id;

                  {selected.has(v)&&<span style={{color:"#fff",fontSize:9,lineHeight:1}}>✓</span>}
                </div>
                {v}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // 列幅state
  const [colWidths,setColWidths]=useState({no:42,accepted:88,cat:68,title:180,req:120,app:140,status:72,applied:80,result_date:80,result:46,fee:80,notes:120});
  const resizing=useRef(null);
  function startResize(col,e){
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX, startW=colWidths[col];
    resizing.current={col,startX,startW};
    const onMove=ev=>{const diff=ev.clientX-startX;setColWidths(p=>({...p,[col]:Math.max(40,startW+diff)}));};
    const onUp=()=>{resizing.current=null;window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  }
  function RH({col}){return <div className="resizer" onMouseDown={e=>startResize(col,e)} onClick={e=>e.stopPropagation()}/>;}

  return(
    <div style={{position:isMobile?"relative":"fixed",top:isMobile?undefined:52,left:isMobile?undefined:0,right:isMobile?undefined:0,bottom:isMobile?undefined:0,height:isMobile?"calc(100vh - 52px)":undefined,display:"flex",flexDirection:"column",background:"var(--bg2)"}} onClick={()=>openFilter&&setOpenFilter(null)}>
      <div style={{background:"var(--bg)",borderBottom:"0.5px solid rgba(0,0,0,0.1)",padding:"10px 16px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:15,fontWeight:500}}>事件簿</span>
          <button onClick={()=>setShowNew(true)} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#185FA5",fontWeight:500}}>+ 新規登録</button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
          <div style={{position:"relative",display:"inline-block"}}>
            <input type="text" placeholder="検索…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:180,fontSize:12,padding:"5px 8px",paddingRight:search?22:8,borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"#eeede8"}}/>
            {search&&<span onClick={()=>setSearch("")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"var(--text3)",cursor:"pointer",lineHeight:1}}>×</span>}
          </div>
          <select value={filterYM} onChange={e=>setFilterYM(e.target.value)} style={{fontSize:11,padding:"4px 6px",borderRadius:5,border:`0.5px solid ${filterYM!=="全て"?"#378ADD":"rgba(0,0,0,0.15)"}`,background:filterYM!=="全て"?"#E6F1FB":"var(--bg3)",color:filterYM!=="全て"?"#185FA5":"inherit",fontWeight:filterYM!=="全て"?500:400}}>
            <option value="全て">受任年：全て</option>
            {yearOptions.filter(x=>x!=="全て").map(y=><option key={y} value={y}>{y}年</option>)}
          </select>
          <MultiSelect id="cat" label="カテゴリー" options={allCats} selected={selCats} onChange={setSelCats}/>
          <MultiSelect id="status" label="ステータス" options={allStatuses} selected={selStatuses} onChange={setSelStatuses}/>
          <MultiSelect id="applicant" label="依頼主／申請人" options={allApplicants} selected={selApplicants} onChange={setSelApplicants}/>
          <select value={filterPayment} onChange={e=>setFilterPayment(e.target.value)} style={{fontSize:11,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"#eeede8"}}>
            <option value="全て">入金：全て</option>
            <option value="未入金">未入金あり</option>
            <option value="入金済">入金済のみ</option>
          </select>
          {hasFilter&&<button onClick={clearAll} style={{fontSize:10,padding:"3px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"transparent",color:"#999"}}>× クリア</button>}
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",background:"var(--bg)"}}>
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,tableLayout:"fixed",minWidth:900}}>
          <colgroup>
            <col style={{width:28}}/><col style={{width:colWidths.no}}/><col style={{width:colWidths.accepted}}/>
            <col style={{width:colWidths.cat}}/><col style={{width:colWidths.title}}/><col style={{width:colWidths.req}}/>
            <col style={{width:colWidths.app}}/><col style={{width:colWidths.status}}/><col style={{width:colWidths.applied}}/>
            <col style={{width:colWidths.result_date}}/><col style={{width:colWidths.result}}/>
            <col style={{width:colWidths.fee}}/><col style={{width:colWidths.notes}}/>
          </colgroup>
          <thead><tr>
            <th style={{...thS,width:28}}/>
            <th style={{...thS}} className="resizable-th" onClick={()=>handleSort("no")}>No <SortIcon col="no"/><RH col="no"/></th>
            <th style={{...thS}} className="resizable-th" onClick={()=>handleSort("accepted_date")}>受任日 <SortIcon col="accepted_date"/><RH col="accepted"/></th>
            <th style={{...thS}} className="resizable-th">カテゴリー<RH col="cat"/></th>
            <th style={{...thS}} className="resizable-th" onClick={()=>handleSort("case_title")}>件名 <SortIcon col="case_title"/><RH col="title"/></th>
            <th style={{...thS}} className="resizable-th" onClick={()=>handleSort("requester")}>依頼主 <SortIcon col="requester"/><RH col="req"/></th>
            <th style={{...thS}} className="resizable-th" onClick={()=>handleSort("applicant")}>申請人 <SortIcon col="applicant"/><RH col="app"/></th>
            <th style={{...thS}} className="resizable-th">ステータス<RH col="status"/></th>
            <th style={{...thS}} className="resizable-th">申請日<RH col="applied"/></th>
