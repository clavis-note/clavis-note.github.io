            <th style={{...thS}} className="resizable-th">備考<RH col="notes"/></th>
          </tr></thead>
          <tbody>
            {filtered.map(d=>{
              return(
                <tr key={d.case_id} style={{cursor:"pointer"}} onClick={()=>setEditEntry(d)} onMouseEnter={e=>e.currentTarget.style.background="var(--bg2)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{...tdS,textAlign:"center"}}><span style={{fontSize:10,color:"#378ADD"}}>編集</span></td>
                  <td style={{...tdS,color:"#999",fontSize:11,textAlign:"center"}}>{d.no}</td>
                  <td style={{...tdS,fontSize:11}}>{d.accepted_date||""}</td>
                  <td style={tdS}><JBadge text={d.category||"国際"} colors={JOURNAL_CAT_COLOR[d.category]}/></td>
                  <td style={{...tdS,fontWeight:500,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{d.case_title}</td>
                  <td style={{...tdS,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",fontSize:11,color:"#666"}}>{d.requester||"—"}</td>
                  <td style={{...tdS,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis"}}>{d.applicant||"—"}</td>
                  <td style={tdS}><JBadge text={d.status} colors={CASE_STATUS_COLORS[d.status]}/></td>
                  <td style={{...tdS,fontSize:11}}>{d.applied_date||""}</td>
                  <td style={{...tdS,fontSize:11}}>{d.result_date||""}</td>
                  <td style={tdS}>{d.result&&<JBadge text={d.result} colors={["許可","済","可"].includes(d.result)?{bg:"#EAF3DE",color:"#3B6D11"}:["不許可","不可"].includes(d.result)?{bg:"#FCEBEB",color:"#A32D2D"}:{bg:"#FAEEDA",color:"#854F0B"}}/>}</td>
                  <td style={{...tdS,textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{d.fee?fmt(d.fee):""}</td>
                  <td style={{...tdS,fontSize:11,color:"#666",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis"}}>{d.notes}</td>
                </tr>
              );
            })}
            {filtered.length===0&&<tr><td colSpan={13} style={{padding:40,textAlign:"center",color:"#bbb"}}>該当する事件がありません</td></tr>}
          </tbody>
        </table>
      </div>
      <div style={{background:"var(--bg)",borderTop:"0.5px solid rgba(0,0,0,0.1)",padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"#999"}}>{summary.count} / {cases.length} 件表示</span>
        <div style={{display:"flex",gap:20}}>
          <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#999"}}>報酬額計</div><div style={{fontSize:13,fontWeight:500,color:"#1a1a1a",fontVariantNumeric:"tabular-nums"}}>{fmt(summary.fee)}</div></div>
        </div>
      </div>
      {showNew&&<JournalModal onClose={()=>setShowNew(false)} onSave={handleSave} nextNo={nextNo} clients={clients} companies={data.companies}/>}
      {editEntry&&<JournalModal entry={editEntry} onClose={()=>setEditEntry(null)} onSave={handleSave} clients={clients} companies={data.companies}/>}
    </div>
  );
}

function NewPaymentModal({onClose,onSave,cases,clients,payments,feeMaster}){
  const [mode,setMode]=useState("single");
  const [caseId,setCaseId]=useState("");
  const [selectedCaseIds,setSelectedCaseIds]=useState([]);
  const [billType,setBillType]=useState("individual");
  const [billToName,setBillToName]=useState("");
  const [taxMode,setTaxMode]=useState("tax_incl");
  const [isFollow,setIsFollow]=useState(false);
  const [items,setItems]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [expSuffix,setExpSuffix]=useState("");
  const [customName,setCustomName]=useState("");
  const [customPrice,setCustomPrice]=useState("");
  const [invoiceDate,setInvoiceDate]=useState(new Date().toISOString().slice(0,10));
  const [dueDate,setDueDate]=useState("");

  // 案件リスト（すでに請求に紐づいてる案件は除外）
  const billedCaseIds=new Set((payments||[]).flatMap(p=>p.case_ids));
  const availableCases=cases.filter(c=>{
    if(["相談中","キャンセル","取下"].includes(c.status)&&!c.fee) return false;
    if(billedCaseIds.has(c.case_id)) return false;
    return true;
  });
  const bundlableCases=availableCases.filter(c=>isFollowCase(c,clients));

  const selCase=cases.find(x=>x.case_id===caseId);
  const selClient=selCase?clients.find(x=>x.client_id===selCase.client_id):null;
  const isGeneralCase=selCase?.case_type==="general"||(!selCase?.template_id&&selCase?.category!=="国際"&&selCase?.case_id?.startsWith("G"));
  const fm=feeMaster||FEE_MASTER;
  const feeItems=isGeneralCase?(fm.general_biz||{items:{}}).items:(fm[isFollow?"follow":"general"]||{items:{}}).items;

  function handleCaseChange(id){
    setCaseId(id);setItems([]);setExpenses([]);
    const c=cases.find(x=>x.case_id===id);
    const cl=c?clients.find(x=>x.client_id===c.client_id):null;
    const followDetected=c?isFollowCase(c,clients):false;
    setIsFollow(followDetected);
    if(cl){
      const dt=followDetected?"company":"individual";
      setBillType(dt);setBillToName(dt==="company"?(cl.company_name||c.requester||""):(cl.name_roman||c.applicant||""));
    } else if(c){
      const dt=followDetected?"company":"individual";
      setBillType(dt);setBillToName(dt==="company"?(c.requester||""):(c.applicant||""));
    }
  }
  function addFeeItem(key){
    const f=feeItems[key];if(!f)return;
    if(items.find(i=>i.name===f.name))return;
    setItems(p=>[...p,{id:"i"+Date.now(),name:f.name,unit_price:f.price,quantity:1}]);
  }
  function addCustom(){
    if(!customName||!customPrice)return;
    setItems(p=>[...p,{id:"i"+Date.now(),name:customName,unit_price:parseInt(customPrice)||0,quantity:1}]);
    setCustomName("");setCustomPrice("");
  }
  function addExpensePreset(preset){
    const suffix=expSuffix?`（${expSuffix}分）`:"";
    setExpenses(p=>[...p,{id:"e"+Date.now(),date:new Date().toISOString().slice(0,10),name:preset.name+suffix,amount:preset.price,billable:true}]);
  }

  function handleSave(){
    const caseIds=mode==="single"?[caseId]:selectedCaseIds;
    const clientIds=mode==="single"&&selCase?[selCase.client_id]:[...new Set(selectedCaseIds.map(id=>cases.find(x=>x.case_id===id)?.client_id).filter(Boolean))];
    if(caseIds.length===0||items.length===0) return;
    onSave({
      payment_id:"P"+Date.now(),
      case_ids:caseIds,client_ids:clientIds,
      bill_type:mode==="bundle"?"company":billType,
      bill_to_name:mode==="bundle"?"株式会社フォロー":billToName,
      tax_mode:taxMode,
      invoice_number:"INV-"+new Date().getFullYear()+"-"+String(Date.now()).slice(-3),
      invoice_date:invoiceDate,due_date:dueDate,
      items:items.map(it=>({...it,original_date:invoiceDate})),
      expenses,payments_history:[],notes:""
    });
  }

  const hasContent=(mode==="single"&&caseId)||(mode==="bundle"&&selectedCaseIds.length>0);
  const total=calcItemsTotal(items);
  const expBillable=calcExpBillable(expenses);

  return(

              <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>請求先</div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                {[["company","会社"],["individual","本人"]].map(([val,label])=>(
                  <button key={val} onClick={()=>{setBillType(val);setBillToName(val==="company"?selClient?.company_name:selClient?.name_roman);}}
                    style={{fontSize:12,padding:"4px 12px",cursor:"pointer",borderRadius:5,border:`0.5px solid ${billType===val?"var(--accent)":"rgba(0,0,0,0.15)"}`,
                      background:billType===val?"var(--accent-bg)":"transparent",color:billType===val?"var(--accent-text)":"var(--text2)",fontWeight:billType===val?500:400}}>{label}</button>

            </div>}
            {caseId&&<div>

                <span>料金マスタから追加</span>
                {isGeneralCase?<span style={{padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:500,background:"#F1EFE8",color:"#5F5E5A",border:"0.5px solid #D3D1C7"}}>一般業務</span>
                :<button onClick={()=>setIsFollow(!isFollow)}

                    background:isFollow?"#FAEEDA":"var(--accent-bg)",color:isFollow?"#854F0B":"var(--accent-text)",

              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>

                    <span style={{fontSize:12}}>{item.name}</span>

                    <input type="number" value={item.quantity} min={1} onChange={e=>setItems(p=>p.map(i=>i.id===item.id?{...i,quantity:parseInt(e.target.value)||1}:i))}
                      style={{fontSize:12,padding:"2px 4px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"right",width:"100%"}}/>
                    <button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{border:"none",background:"none",cursor:"pointer",color:"#ccc",fontSize:14}}>×</button>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"flex-end",padding:"8px 10px",borderTop:"0.5px solid rgba(0,0,0,0.1)",background:"var(--bg2)"}}>
                  <span style={{fontSize:12,fontWeight:500}}>報酬小計 {fmt(total)}</span>
                </div>
              </div>
            </div>}

            {/* その他報酬追加 */}
            <div>
              <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>その他の報酬項目を追加</div>
              <div style={{display:"flex",gap:6}}>
                <input value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="項目名"
                  style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
                <input type="number" value={customPrice} onChange={e=>setCustomPrice(e.target.value)} placeholder="金額"
                  style={{width:90,fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"right"}}/>
                <button onClick={addCustom} style={{fontSize:12,padding:"5px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",color:"var(--text2)"}}>追加</button>
              </div>
            </div>

            {/* 立替金セクション */}
            <div style={{background:"#FBF9F5",border:"0.5px solid rgba(0,0,0,0.08)",borderRadius:8,padding:12}}>
              <div style={{fontSize:11,color:"#854F0B",fontWeight:500,marginBottom:8}}>立替金・経費</div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}}>付記：</span>
                <input value={expSuffix} onChange={e=>setExpSuffix(e.target.value)} placeholder="例: SAPKOTA"
                  style={{width:120,fontSize:11,padding:"3px 6px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)"}}/>
                {expSuffix&&<span style={{fontSize:10,color:"#854F0B"}}>→「○○（{expSuffix}分）」</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                {EXPENSE_PRESETS.map((pr,i)=>(
                  <button key={i} onClick={()=>addExpensePreset(pr)}
                    style={{fontSize:10,padding:"3px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)",color:"var(--text2)"}}>
                    + {pr.name}{pr.price>0?`（${fmt(pr.price)}）`:""}
                  </button>
                ))}
              </div>
              {expenses.length>0&&<div style={{marginBottom:10}}>
                {expenses.map(exp=>(
                  <div key={exp.id} style={{display:"flex",gap:6,padding:"5px 0",borderBottom:"0.5px solid rgba(0,0,0,0.06)",alignItems:"center"}}>
                    <div onClick={()=>setExpenses(p=>p.map(e=>e.id===exp.id?{...e,billable:!e.billable}:e))}
                      style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${exp.billable?"#3B6D11":"#ccc"}`,cursor:"pointer",
                        background:exp.billable?"#3B6D11":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {exp.billable&&<span style={{color:"#fff",fontSize:9}}>✓</span>}
                    </div>
                    <span style={{fontSize:12,flex:1}}>{exp.name}</span>
                    <span style={{fontSize:12,fontWeight:500}}>{fmt(exp.amount)}</span>
                    <button onClick={()=>setExpenses(p=>p.filter(e=>e.id!==exp.id))} style={{border:"none",background:"none",cursor:"pointer",color:"#ccc",fontSize:14}}>×</button>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"flex-end",fontSize:11,padding:"6px 0"}}>
                  <span style={{fontWeight:500,color:"#854F0B"}}>請求対象 {fmt(expBillable)} / 全経費 {fmt(calcExpAll(expenses))}</span>
                </div>
              </div>}
            </div>

            {/* 日付 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>請求日</div>
                <input type="date" max="9999-12-31" min="1900-01-01" value={invoiceDate} onChange={e=>setInvoiceDate(e.target.value)}
                  style={{width:"100%",fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>支払期限</div>
                <input type="date" max="9999-12-31" min="1900-01-01" value={dueDate} onChange={e=>setDueDate(e.target.value)}
                  style={{width:"100%",fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
              </div>
            </div>
          </>}
        </div>

        <div style={{padding:"10px 16px",borderTop:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:12}}>
            {items.length>0&&<span style={{fontWeight:500}}>請求合計 {fmt(calcGrandTotal(items,expenses,taxMode))}</span>}
            {items.length>0&&taxMode==="tax_incl"&&<span style={{fontSize:10,color:"var(--text3)",marginLeft:4}}>（税込）</span>}
            {items.length>0&&taxMode==="tax_excl"&&<span style={{fontSize:10,color:"var(--text3)",marginLeft:4}}>（税抜{fmt(total)} + 税{fmt(calcTax(total,taxMode))} + 立替{fmt(expBillable)}）</span>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"var(--text2)"}}>キャンセル</button>
            <button onClick={handleSave} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",fontWeight:500}}>作成</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function generateEstimate(p, cases, clients, office) {
  const ofc = office || {};
  const cs = p.case_ids.map(id => cases.find(x => x.case_id === id)).filter(Boolean);
  const itemsTotal = calcItemsTotal(p.items);
  const taxMode = p.tax_mode || "tax_incl";
  const taxedItemsTotal = calcTaxedTotal(itemsTotal, taxMode);
  const expBillable = calcExpBillable(p.expenses);
  const grandTotal = taxedItemsTotal + expBillable;

  const billCompany = (p.bill_to_name || "") + " 御中";
  const estDate = p.estimate_date ? new Date(p.estimate_date).toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"}) : "";
  const estNumber = p.estimate_number || "";
  const estValid = p.estimate_valid ? new Date(p.estimate_valid).toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"}) : "";

  let subject;
  if (p.subject && p.subject.trim()) {
    subject = p.subject.trim();
  } else {
    const names = cs.map(c => c.applicant || c.case_title).filter(Boolean);
    if (names.length === 0) subject = "";
    else if (names.length <= 2) subject = names.join("、");
    else subject = names[0] + " 他" + (names.length - 1) + "名";
  }

  const items = (p.items || []).map(item => ({
    name: item.applicant ? item.applicant + " ／ " + item.name : item.name,
    qty: item.quantity || 1,
    price: item.unit_price * (item.quantity || 1)
  }));
  (p.expenses || []).filter(e => e.billable).forEach(e => {
    items.push({ name: "【立替】" + e.name, qty: 1, price: e.amount });
  });
  if (taxMode === "tax_excl") {
    const itemsTax = calcTax(itemsTotal, taxMode);
    items.push({ name: "消費税（10%）", qty: 1, price: itemsTax });
  }

  const MIN_ROWS = 10;
  let itemsHtml = items.map(item =>
    `<tr><td>${item.name}</td><td class="center">${item.qty}</td><td class="right">${item.price.toLocaleString()}</td><td class="right">${(item.price * item.qty).toLocaleString()}</td></tr>`
  ).join("");
  for (let i = 0; i < Math.max(0, MIN_ROWS - items.length); i++) {
    itemsHtml += `<tr class="empty-row"><td></td><td></td><td></td><td></td></tr>`;
  }

  const fmtYen = n => "¥ " + n.toLocaleString();

  const fullHtml = `<!DOCTYPE html>

function generateInvoice(p, cases, clients, office) {
  const ofc = office || {};
  const cs = p.case_ids.map(id => cases.find(x => x.case_id === id)).filter(Boolean);
  const itemsTotal = calcItemsTotal(p.items);
  const taxMode = p.tax_mode || "tax_incl";
  const taxedItemsTotal = calcTaxedTotal(itemsTotal, taxMode);
  const expBillable = calcExpBillable(p.expenses);
  const grandTotal = taxedItemsTotal + expBillable;
  const paidTotal = (p.payments_history || []).reduce((s, h) => s + (h.amount || 0), 0);
  const remainingTotal = grandTotal - paidTotal;
  const hasPaid = paidTotal > 0;

  const billCompany = (p.bill_to_name || "") + " 御中";

    ? new Date(p.invoice_date).toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"})
    : new Date().toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"});
  const dueDate = p.due_date
    ? new Date(p.due_date).toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"})
    : "";

  // Build subject from case titles
  let subject;
  if (p.subject && p.subject.trim()) {

function PaymentDetail({p,cases,clients,office,onUpdate,onDelete,onSplit,onItemSplit}){
  const isMobile=useMobile();
  const cs=p.case_ids.map(id=>cases.find(x=>x.case_id===id)).filter(Boolean);
  const itemsTotal=calcItemsTotal(p.items);
  const expBillable=calcExpBillable(p.expenses);
  const taxMode=p.tax_mode||"tax_incl";
  const itemsTax=calcTax(itemsTotal, taxMode);
  const taxedItemsTotal=calcTaxedTotal(itemsTotal, taxMode);
  const grandTotal=taxedItemsTotal+expBillable;
  const totalPaid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
  const unpaid=grandTotal-totalPaid;

  const [newPayDate,setNewPayDate]=useState(new Date().toISOString().slice(0,10));
  const [newPayAmt,setNewPayAmt]=useState("");
  const [newPayMethod,setNewPayMethod]=useState("振込");
  const [newPayNote,setNewPayNote]=useState("");
  const [newItemName,setNewItemName]=useState("");
  const [newItemPrice,setNewItemPrice]=useState("");
  const [expSuffix,setExpSuffix]=useState("");

  function update(field,val){onUpdate({...p,[field]:val});}
  function addPayment(){
    if(!newPayAmt)return;
    const amt=parseInt(newPayAmt)||0;
    const history=[...(p.payments_history||[]),{id:"h"+Date.now(),date:newPayDate,amount:amt,method:newPayMethod,note:newPayNote}];
    onUpdate({...p,payments_history:history});
    setNewPayAmt("");setNewPayNote("");setNewPayMethod("振込");
  }
  function removeItem(id){onUpdate({...p,items:p.items.filter(i=>i.id!==id)});}
  function updateItem(id,field,val){onUpdate({...p,items:p.items.map(i=>i.id===id?{...i,[field]:val}:i)});}
  function addItem(){
    if(!newItemName||!newItemPrice)return;
    onUpdate({...p,items:[...p.items,{id:"i"+Date.now(),name:newItemName,unit_price:parseInt(newItemPrice)||0,quantity:1}]});
    setNewItemName("");setNewItemPrice("");
  }
  function toggleExpBillable(id){onUpdate({...p,expenses:(p.expenses||[]).map(e=>e.id===id?{...e,billable:!e.billable}:e)});}
  function removeExpense(id){onUpdate({...p,expenses:(p.expenses||[]).filter(e=>e.id!==id)});}

  const scBadge=PAY_STATUS_COLORS[paymentStatus(p)]||{bg:"#F1EFE8",color:"#5F5E5A"};

  return(
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:18,display:"flex",flexDirection:"column",gap:14}}>
      {/* ヘッダー */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",flexDirection:isMobile?"column":"row",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:isMobile?8:0}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:500,marginBottom:3}}>{p.bill_to_name} 宛</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:scBadge.bg,color:scBadge.color,fontWeight:500}}>{paymentStatus(p)}</span>
              {p.bill_type==="company"&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"#FAEEDA",color:"#854F0B"}}>会社請求</span>}
              {p.case_ids.length>1&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"var(--accent-bg)",color:"var(--accent-text)"}}>まとめ {p.case_ids.length}件</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>generateEstimate(p,cases,clients,office)}
            style={{fontSize:11,padding:"5px 12px",cursor:"pointer",borderRadius:6,border:"0.5px solid #854F0B",background:"#FEF8EE",color:"#854F0B",fontWeight:500,whiteSpace:"nowrap"}}>
            📋 見積書を発行
          </button>
          <button onClick={()=>generateInvoice(p,cases,clients,office)}
            style={{fontSize:11,padding:"5px 12px",cursor:"pointer",borderRadius:6,border:"0.5px solid #378ADD",background:"#EBF4FF",color:"#378ADD",fontWeight:500,whiteSpace:"nowrap"}}>
            📄 請求書を発行
          </button>
          {(()=>{const pd=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0); return pd>0;})()&&<button onClick={()=>generateReceipt(p,cases,clients,office)}
            style={{fontSize:11,padding:"5px 12px",cursor:"pointer",borderRadius:6,border:"0.5px solid #2E8B57",background:"#EBF8EF",color:"#2E8B57",fontWeight:500,whiteSpace:"nowrap"}}>
            🧾 領収書を発行
          </button>}
          </div>
        </div>
        <div style={{fontSize:11,color:"var(--text2)",marginBottom:6}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {cs.map(c=>(
            <span key={c.case_id} style={{fontSize:11,padding:"2px 7px",borderRadius:3,background:"var(--bg2)",color:"var(--text2)",display:"inline-flex",alignItems:"center",gap:4}}>
              {c.applicant||c.case_title}
            </span>
          ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(3,1fr)",gap:8,marginBottom:8}}>
          {[["見積書番号","estimate_number","text"],["見積日","estimate_date","date"],["見積有効期限","estimate_valid","date"]].map(([label,field,type])=>(
            <div key={field}>
              <div style={{fontSize:10,color:"#854F0B",marginBottom:3}}>{label}</div>
              <input type={type} value={p[field]||""} onChange={e=>update(field,e.target.value)}
                style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(3,1fr)",gap:8}}>
          {[["請求書番号","invoice_number","text"],["請求日","invoice_date","date"],["支払期限","due_date","date"]].map(([label,field,type])=>(
            <div key={field}>
              <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>{label}</div>
              <input type={type} value={p[field]||""} onChange={e=>update(field,e.target.value)}
                style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
            </div>
          ))}
        </div>
        <div style={{marginTop:8}}>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>件名（空欄なら自動生成：1〜2名は連名、3名以上は「○○ 他N名」）</div>
          <input type="text" value={p.subject||""} onChange={e=>update("subject",e.target.value)} placeholder="例: 在留資格手続き 26.4更新"
            style={{width:"100%",fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)"}}/>
        </div>
      </div>

      {/* 報酬明細 */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--text2)"}}>報酬明細</div>
          <div style={{display:"flex",gap:4}}>
            {[["tax_incl","税込入力"],["tax_excl","税抜入力"]].map(([val,label])=>(
              <button key={val} onClick={()=>update("tax_mode",val)}
                style={{fontSize:10,padding:"2px 8px",cursor:"pointer",borderRadius:4,
                  border:`0.5px solid ${taxMode===val?"var(--accent)":"rgba(0,0,0,0.12)"}`,
                  background:taxMode===val?"var(--accent-bg)":"transparent",
                  color:taxMode===val?"var(--accent-text)":"var(--text2)",fontWeight:taxMode===val?500:400}}>{label}</button>
            ))}
          </div>
        </div>
        {(()=>{
          const hasOrigDate=p.items.some(i=>i.original_date);
          const canSplitItem=p.items.length>1&&onItemSplit;
          const cols=hasOrigDate
            ?(canSplitItem?"minmax(100px,1fr) 72px 82px 46px 72px 32px 22px":"minmax(100px,1fr) 72px 82px 46px 72px 22px")
            :(canSplitItem?"minmax(100px,1fr) 90px 50px 80px 32px 24px":"minmax(100px,1fr) 90px 50px 80px 24px");
          return(
          <div style={{border:"0.5px solid rgba(0,0,0,0.08)",borderRadius:6,overflow:"auto",minWidth:380}}>
            <div style={{display:"grid",gridTemplateColumns:cols,padding:"5px 10px",background:"var(--bg2)",fontSize:10,color:"var(--text3)",fontWeight:500,gap:6}}>
              <span>項目</span>
              {hasOrigDate&&<span>元請求日</span>}
              <span style={{textAlign:"right"}}>単価</span><span style={{textAlign:"right"}}>数量</span><span style={{textAlign:"right"}}>金額</span>
              {canSplitItem&&<span/>}
              <span/>
            </div>
            {p.items.map(item=>(
              <div key={item.id} style={{display:"grid",gridTemplateColumns:cols,padding:"6px 10px",borderTop:"0.5px solid rgba(0,0,0,0.06)",alignItems:"center",gap:6}}>
                <div style={{minWidth:0}}>
                  {p.case_ids.length>1&&<input value={item.applicant||""} onChange={e=>updateItem(item.id,"applicant",e.target.value)}
                    placeholder="対象者" style={{fontSize:10,color:"var(--accent-text)",background:"transparent",border:"none",borderBottom:"0.5px dashed rgba(0,0,0,0.15)",
                    padding:"0 0 1px",width:"100%",marginBottom:2,outline:"none"}}/>}
                  <div style={{fontSize:12,lineHeight:"1.3"}}>{item.name}</div>
                </div>
                {hasOrigDate&&<span style={{fontSize:10,color:"var(--text3)"}}>{item.original_date||"—"}</span>}
                <input type="number" value={item.unit_price} onChange={e=>updateItem(item.id,"unit_price",parseInt(e.target.value)||0)}
                  style={{fontSize:12,padding:"2px 4px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"right",width:"100%"}}/>
                <input type="number" value={item.quantity} min={1} onChange={e=>updateItem(item.id,"quantity",parseInt(e.target.value)||1)}
                  style={{fontSize:12,padding:"2px 4px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",textAlign:"right",width:"100%"}}/>
                <span style={{fontSize:12,fontWeight:500,textAlign:"right"}}>{fmt(item.unit_price*item.quantity)}</span>
                {canSplitItem&&<button onClick={()=>onItemSplit(p,item.id)}
                  style={{fontSize:9,padding:"1px 4px",borderRadius:3,border:"0.5px solid #854F0B",background:"#FAEEDA",color:"#854F0B",cursor:"pointer",lineHeight:"14px",whiteSpace:"nowrap"}}
                  title="この明細を個別請求に切り出す">切出</button>}
                <button onClick={()=>removeItem(item.id)} style={{border:"none",background:"none",cursor:"pointer",color:"#ccc",fontSize:14}}>×</button>
              </div>
            ))}
            {/* 明細追加行 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 90px 80px",gap:6,padding:"7px 10px",borderTop:"0.5px solid rgba(0,0,0,0.06)",alignItems:"center"}}>
              <input value={newItemName} onChange={e=>setNewItemName(e.target.value)} placeholder="項目名"
                style={{fontSize:12,padding:"3px 6px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg2)"}}
                onKeyDown={e=>e.key==="Enter"&&addItem()}/>
              <input type="number" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} placeholder="金額"
                style={{fontSize:12,padding:"3px 4px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg2)",textAlign:"right"}}
                onKeyDown={e=>e.key==="Enter"&&addItem()}/>
              <button onClick={addItem} style={{fontSize:11,padding:"3px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",color:"var(--text2)"}}>+ 追加</button>
            </div>
            <div style={{padding:"6px 10px",borderTop:"0.5px solid rgba(0,0,0,0.1)",background:"var(--bg2)",display:"flex",flexDirection:"column",gap:2,alignItems:"flex-end"}}>
              {taxMode==="tax_incl" ? <>
                <span style={{fontSize:12,fontWeight:500}}>報酬業務計 {fmt(itemsTotal)}</span>
                <span style={{fontSize:11,color:"var(--text2)"}}>うち消費税（10%） ({fmt(itemsTax)})</span>
              </> : <>
                <span style={{fontSize:12,color:"var(--text2)"}}>小計 {fmt(itemsTotal)}</span>
                <span style={{fontSize:11,color:"var(--text2)"}}>消費税（10%） {fmt(itemsTax)}</span>
                <span style={{fontSize:12,fontWeight:500}}>報酬業務計（税込） {fmt(taxedItemsTotal)}</span>
              </>}
            </div>
          </div>
          );
        })()}
      </div>

      {/* 立替金・経費 */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#854F0B",marginBottom:10}}>立替金・経費</div>
        {(p.expenses||[]).length>0&&<div style={{border:"0.5px solid rgba(0,0,0,0.08)",borderRadius:6,overflow:"hidden",marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"18px 80px 1fr 80px 24px",gap:6,padding:"5px 10px",background:"#FBF9F5",fontSize:10,color:"var(--text3)",fontWeight:500}}>
            <span>請求</span><span>日付</span><span>件名</span><span style={{textAlign:"right"}}>金額</span><span/>
          </div>
          {(p.expenses||[]).map(exp=>(
            <div key={exp.id} style={{display:"grid",gridTemplateColumns:"18px 80px 1fr 80px 24px",gap:6,padding:"6px 10px",borderTop:"0.5px solid rgba(0,0,0,0.06)",alignItems:"center",
              opacity:exp.billable?1:0.5}}>
              <div onClick={()=>toggleExpBillable(exp.id)}
                style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${exp.billable?"#3B6D11":"#ccc"}`,cursor:"pointer",
                  background:exp.billable?"#3B6D11":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {exp.billable&&<span style={{color:"#fff",fontSize:9}}>✓</span>}
              </div>
              <span style={{fontSize:11,color:"var(--text3)"}}>{exp.date}</span>
              <span style={{fontSize:12}}>{exp.name}</span>
              <span style={{fontSize:12,textAlign:"right",fontWeight:500}}>{fmt(exp.amount)}</span>
              <button onClick={()=>removeExpense(exp.id)} style={{border:"none",background:"none",cursor:"pointer",color:"#ccc",fontSize:14}}>×</button>
            </div>
          ))}
          <div style={{padding:"6px 10px",borderTop:"0.5px solid rgba(0,0,0,0.1)",background:"#FBF9F5",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:10,color:"var(--text3)"}}>☑ = 請求に含める</span>
            <span style={{fontSize:12,fontWeight:500,color:"#854F0B"}}>立替金計（請求分） {fmt(expBillable)}</span>
          </div>
        </div>}
        {/* プリセット追加 */}
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}}>付記：</span>
          <input value={expSuffix} onChange={e=>setExpSuffix(e.target.value)} placeholder="例: SAPKOTA"
            style={{width:120,fontSize:11,padding:"3px 6px",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"var(--bg)"}}/>
          {expSuffix&&<span style={{fontSize:10,color:"#854F0B"}}>→「○○（{expSuffix}分）」</span>}
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {EXPENSE_PRESETS.slice(0,6).map((pr,i)=>(
            <button key={i} onClick={()=>{
              const suffix=expSuffix?`（${expSuffix}分）`:"";
              onUpdate({...p,expenses:[...(p.expenses||[]),{id:"e"+Date.now()+Math.random(),date:new Date().toISOString().slice(0,10),name:pr.name+suffix,amount:pr.price,billable:true}]});
            }} style={{fontSize:10,padding:"2px 7px",cursor:"pointer",borderRadius:4,border:"0.5px solid rgba(0,0,0,0.12)",background:"#FBF9F5",color:"#854F0B"}}>
              + {pr.name}
            </button>
          ))}
        </div>
      </div>

      {/* 請求合計・入金 */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:10}}>請求合計・入金状況</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
          <div style={{textAlign:"center",padding:"10px 8px",background:"var(--bg2)",borderRadius:8}}>
            <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>請求合計</div>
            <div style={{fontSize:16,fontWeight:500}}>{fmt(grandTotal)}</div>
            <div style={{fontSize:10,color:"var(--text2)",marginTop:2}}>報酬{fmt(taxedItemsTotal)}{taxMode==="tax_incl"?"（税込）":"（税込換算）"} + 立替{fmt(expBillable)}</div>
          </div>
          <div style={{textAlign:"center",padding:"10px 8px",background:"var(--bg2)",borderRadius:8}}>
            <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>入金済</div>
            <div style={{fontSize:16,fontWeight:500,color:"#3B6D11"}}>{fmt(totalPaid)}</div>
          </div>
          <div style={{textAlign:"center",padding:"10px 8px",background:unpaid>0?"#FCEBEB":"#EAF3DE",borderRadius:8}}>
            <div style={{fontSize:10,color:unpaid>0?"#A32D2D":"#3B6D11",marginBottom:3}}>請求残高</div>
            <div style={{fontSize:16,fontWeight:500,color:unpaid>0?"#A32D2D":"#3B6D11"}}>{fmt(Math.max(0,unpaid))}</div>
          </div>
        </div>

        {/* 入金履歴 */}
        {(p.payments_history||[]).length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:6}}>入金履歴</div>
          {[...p.payments_history].sort((a,b)=>a.date.localeCompare(b.date)).map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 8px",borderRadius:5,background:"var(--bg2)",marginBottom:3}}>
              <span style={{fontSize:11,color:"var(--text3)",minWidth:90}}>{h.date}</span>
              <span style={{fontSize:12,fontWeight:500}}>{fmt(h.amount)}</span>
              {h.method&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--bg3)",color:"var(--text2)"}}>{h.method}</span>}
              {h.note&&<span style={{fontSize:11,color:"var(--text2)",flex:1}}>{h.note}</span>}
              <button onClick={()=>generateReceipt(p,cases,clients,office,h.id)} title="この入金分の領収書を発行" style={{marginLeft:"auto",fontSize:10,padding:"3px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid #2E8B57",background:"#EBF8EF",color:"#2E8B57",fontWeight:500,whiteSpace:"nowrap"}}>🧾 領収書</button>
            </div>
          ))}
        </div>}

        {/* 入金追加 */}
        <div style={{background:"var(--bg2)",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>入金を追加</div>
          <div style={{display:"grid",gridTemplateColumns:"110px 100px 90px 1fr 60px",gap:8,alignItems:"center"}}>
            <input type="date" max="9999-12-31" min="1900-01-01" value={newPayDate} onChange={e=>setNewPayDate(e.target.value)}
              style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/>
            <input type="number" value={newPayAmt} onChange={e=>setNewPayAmt(e.target.value)} placeholder="金額"
              style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",textAlign:"right"}}/>
            <select value={newPayMethod} onChange={e=>setNewPayMethod(e.target.value)}
              style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}>
              {["振込","現金","PayPay","その他"].map(m=><option key={m}>{m}</option>)}
            </select>
            <input value={newPayNote} onChange={e=>setNewPayNote(e.target.value)} placeholder="メモ（任意）"
              style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/>
            <button onClick={addPayment} style={{fontSize:12,padding:"4px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",fontWeight:500}}>追加</button>
          </div>
        </div>
      </div>

      {/* 備考 */}
      <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:8}}>備考</div>
        <textarea value={p.notes||""} onChange={e=>update("notes",e.target.value)} rows={2}
          placeholder="メモを入力…" style={{width:"100%",fontSize:12,padding:"6px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",resize:"vertical"}}/>
      </div>

      {/* 請求削除 */}
      <div style={{display:"flex",justifyContent:"flex-end",padding:"4px 0"}}>
        <button onClick={()=>{
          const histCount=(p.payments_history||[]).length;
          const msg=histCount>0
            ?`「${p.bill_to_name} 宛」（${p.invoice_number}）を削除しますか？\n\n⚠ 入金履歴 ${histCount}件も一緒に削除されます。`
            :`「${p.bill_to_name} 宛」（${p.invoice_number}）を削除しますか？`;
          if(confirm(msg)) onDelete(p.payment_id);
        }} style={{fontSize:11,padding:"4px 12px",cursor:"pointer",borderRadius:5,border:"0.5px solid #A32D2D",background:"transparent",color:"#A32D2D"}}>
          この請求を削除
        </button>
      </div>
    </div>
  );
}

function MergeConfirmModal({targets,billCandidates,onClose,onConfirm}){
  const [billTo,setBillTo]=useState(billCandidates[0]||"");
  const [customBillTo,setCustomBillTo]=useState("");
  const [useCustom,setUseCustom]=useState(false);
  const billType=(billTo==="株式会社フォロー"&&!useCustom)?"company":"individual";
  const finalBillTo=useCustom?customBillTo:billTo;
  const totalItems=targets.reduce((s,t)=>s+t.items.length,0);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:"var(--bg)",borderRadius:12,border:"0.5px solid rgba(0,0,0,0.15)",width:420,maxHeight:"70vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"12px 16px",borderBottom:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:500}}>まとめ請求の宛先</span>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
        </div>
        <div style={{padding:16,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
          <div style={{fontSize:12,color:"var(--text2)"}}>{targets.length}件の請求（明細{totalItems}行）を統合します。</div>
          <div>
            <div style={{fontSize:10,color:"var(--text3)",marginBottom:6}}>請求先を選択</div>
            {billCandidates.map(name=>(
              <div key={name} onClick={()=>{setBillTo(name);setUseCustom(false);}}
                style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,marginBottom:3,cursor:"pointer",
                  background:(!useCustom&&billTo===name)?"var(--accent-bg)":"var(--bg2)",
                  border:`0.5px solid ${(!useCustom&&billTo===name)?"var(--accent)":"rgba(0,0,0,0.1)"}`}}>
                <div style={{width:14,height:14,borderRadius:"50%",border:`1.5px solid ${(!useCustom&&billTo===name)?"var(--accent)":"#ccc"}`,
                  background:(!useCustom&&billTo===name)?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {(!useCustom&&billTo===name)&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                </div>
                <span style={{fontSize:12}}>{name}</span>
                {name==="株式会社フォロー"&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"#FAEEDA",color:"#854F0B"}}>会社</span>}
              </div>
            ))}
            <div onClick={()=>setUseCustom(true)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,marginBottom:3,cursor:"pointer",
                background:useCustom?"var(--accent-bg)":"var(--bg2)",
                border:`0.5px solid ${useCustom?"var(--accent)":"rgba(0,0,0,0.1)"}`}}>
              <div style={{width:14,height:14,borderRadius:"50%",border:`1.5px solid ${useCustom?"var(--accent)":"#ccc"}`,
                background:useCustom?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {useCustom&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
              </div>
              <span style={{fontSize:12}}>手入力</span>
            </div>
            {useCustom&&<input value={customBillTo} onChange={e=>setCustomBillTo(e.target.value)} placeholder="宛先名を入力"
              autoFocus style={{width:"100%",fontSize:13,padding:"6px 10px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",marginTop:4}}/>}
          </div>
          <div style={{fontSize:10,color:"var(--text3)",background:"var(--bg2)",borderRadius:6,padding:"8px 10px"}}>
            統合元：{targets.map(t=>t.bill_to_name).join("、")}<br/>
            ⚠ 統合後、元の個別請求は削除されます。各明細には元の請求日が保持されます。
          </div>
        </div>
        <div style={{padding:"10px 16px",borderTop:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"var(--text2)"}}>キャンセル</button>
          <button onClick={()=>{if(finalBillTo)onConfirm(finalBillTo,billType);}}
            disabled={!finalBillTo}
            style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",fontWeight:500,opacity:finalBillTo?1:0.5}}>統合する</button>
        </div>
      </div>
    </div>
  );
}

function PaymentManagement({data,setData,navigatePaymentId,clearNavigate}){
  const isMobile=useMobile();
  const {cases,clients,payments}=data;
  const [selectedId,setSelectedId]=useState(()=>{
    if(navigatePaymentId)return navigatePaymentId;
    return (payments||[])[0]?.payment_id||null;
  });
  const [showDetail,setShowDetail]=useState(()=>!!navigatePaymentId);
  const [showNew,setShowNew]=useState(false);
  const [filterStatus,setFilterStatus]=useState("全て");
  const [searchPay,setSearchPay]=useState("");
  const [mergeMode,setMergeMode]=useState(false);
  const [mergeIds,setMergeIds]=useState([]);

  useEffect(()=>{
    if(navigatePaymentId){
      setSelectedId(navigatePaymentId);setFilterStatus("全て");setSearchPay("");
      if(clearNavigate)clearNavigate();
    }
  },[navigatePaymentId]);

  const selected=(payments||[]).find(p=>p.payment_id===selectedId)||null;

  function handleUpdate(updated){
    setData(prev=>({...prev,payments:(prev.payments||[]).map(p=>p.payment_id===updated.payment_id?updated:p)}));
  }
  function handleDelete(paymentId){
    setData(prev=>({...prev,payments:(prev.payments||[]).filter(p=>p.payment_id!==paymentId)}));
    setSelectedId(null);
  }
  function handleNew(np){
    setData(prev=>({...prev,payments:[np,...(prev.payments||[])]}));
    setSelectedId(np.payment_id);
    setShowNew(false);
  }
  function handleSplit(payment, caseId){
    const c=cases.find(x=>x.case_id===caseId);
    if(!c) return;
    const applicant=(c.applicant||"").split(" ")[0];
    // items振り分け: 申請人名を含むitemsをこの案件のものと判定
    const splitItems=[];
    const remainItems=[];
    payment.items.forEach(item=>{
      if(applicant && item.name.includes(applicant)){
        splitItems.push(item);
      } else if(payment.case_ids.length===1){
        splitItems.push(item);
      } else {
        remainItems.push(item);
      }
    });
    // 名前マッチしなかった場合、case_titleでも試す
    if(splitItems.length===0){
      const title=(c.case_title||"").split(" ")[0];
      payment.items.forEach(item=>{
        if(title && item.name.includes(title)){
          splitItems.push(item);
          const idx=remainItems.indexOf(item);
          if(idx>=0) remainItems.splice(idx,1);
        }
      });
    }
    // それでもマッチしない場合：明細行の切出を案内
    if(splitItems.length===0){
      alert(`「${c.applicant||c.case_title}」に対応する明細を自動で特定できませんでした。\n\n報酬明細の各行にある「切出」ボタンから、個別に切り出してください。`);
      return;
    }
    const splitLabel=c.applicant||c.case_title||"";
    if(!confirm(`「${splitLabel}」を個別請求に切り出しますか？\n\n切り出される明細: ${splitItems.length}件`)) return;
    // 新しい個別請求
    const newPayment={
      payment_id:"PM_SPLIT_"+Date.now(),
      case_ids:[caseId],
      client_ids:c.client_id?[c.client_id]:[],
      bill_type:"individual",
      bill_to_name:c.applicant||c.case_title||"",
      tax_mode:payment.tax_mode||"tax_incl",
      invoice_number:"",
      invoice_date:payment.invoice_date||"",
      due_date:payment.due_date||"",
      items:splitItems.map((item,i)=>({...item,id:"i"+i,original_date:item.original_date||payment.invoice_date||""})),
      expenses:[],
      payments_history:[],
      notes:`（${payment.bill_to_name}から切り出し）`
    };
    // 元の請求を更新
    const updatedOriginal={
      ...payment,
      case_ids:payment.case_ids.filter(id=>id!==caseId),
      client_ids:[...new Set(payment.case_ids.filter(id=>id!==caseId).map(id=>cases.find(x=>x.case_id===id)?.client_id).filter(Boolean))],
      items:remainItems
    };
    setData(prev=>({...prev,payments:[newPayment,...(prev.payments||[]).map(p=>p.payment_id===payment.payment_id?updatedOriginal:p)]}));
    setSelectedId(newPayment.payment_id);
  }
  function handleItemSplit(payment, itemId){
    const item=payment.items.find(i=>i.id===itemId);
    if(!item) return;
    // 項目名の括弧内から個人名を抽出（例:「在留期間更新（DIPAK）」→DIPAK）
    const nameMatch=item.name.match(/[（(]([^）)]+)[）)]/);
    const billName=nameMatch?nameMatch[1]:(item.source_bill||payment.bill_to_name||"");
    if(!confirm(`「${item.name}」を「${billName} 宛」の個別請求に切り出しますか？`)) return;
    const newPayment={
      payment_id:"PM_ISPLIT_"+Date.now(),
      case_ids:payment.case_ids.length===1?[...payment.case_ids]:[],
      client_ids:[],
      bill_type:"individual",
      bill_to_name:billName,
      tax_mode:payment.tax_mode||"tax_incl",
      invoice_number:"",
      invoice_date:item.original_date||payment.invoice_date||"",
      due_date:"",
      items:[{...item,id:"i0"}],
      expenses:[],
      payments_history:[],
      notes:`（${payment.bill_to_name}から明細切出）`
    };
    const updatedOriginal={...payment,items:payment.items.filter(i=>i.id!==itemId)};
    setData(prev=>({...prev,payments:[newPayment,...(prev.payments||[]).map(p=>p.payment_id===payment.payment_id?updatedOriginal:p)]}));
    setSelectedId(newPayment.payment_id);
  }
  function toggleMerge(id){
    setMergeIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }
  const [mergeConfirm,setMergeConfirm]=useState(null);
  function handleMergeStart(){
    if(mergeIds.length<2) return;
    const targets=(payments||[]).filter(p=>mergeIds.includes(p.payment_id));
    if(targets.length<2) return;
    // 宛先候補を収集
    const billCandidates=["株式会社フォロー"];
    targets.forEach(t=>{
      if(t.bill_to_name&&!billCandidates.includes(t.bill_to_name)) billCandidates.push(t.bill_to_name);
      t.case_ids.forEach(cid=>{
        const c=cases.find(x=>x.case_id===cid);
        if(c?.applicant&&!billCandidates.includes(c.applicant)) billCandidates.push(c.applicant);
      });
    });
    setMergeConfirm({targets,billCandidates});
  }
  function handleMergeExecute(billToName,billType){
    const targets=mergeConfirm.targets;
    const merged={
      payment_id:"PM_MERGED_"+Date.now(),
      case_ids:[...new Set(targets.flatMap(t=>t.case_ids))],
      client_ids:[...new Set(targets.flatMap(t=>t.client_ids))],
      bill_type:billType,
      bill_to_name:billToName,
      tax_mode:(targets.find(t=>t.bill_type==="company")||targets[0]).tax_mode||"tax_incl",
      invoice_number:"",
      invoice_date:new Date().toISOString().slice(0,10),
      due_date:"",
      items:targets.flatMap((t,ti)=>{
        const caseLabel=t.case_ids.length===1
          ?(cases.find(c=>c.case_id===t.case_ids[0])?.applicant||t.bill_to_name||"").split(" ")[0]
          :t.bill_to_name||"";
        return t.items.map((item,ii)=>({...item,id:"i"+ti+"_"+ii,
          original_date:item.original_date||t.invoice_date||"",
          source_bill:item.source_bill||t.bill_to_name||"",
          applicant:item.applicant||caseLabel||"",
          name:item.name
        }));
      }),
      expenses:targets.flatMap((t,ti)=>(t.expenses||[]).map((e,ei)=>({...e,id:"e"+ti+"_"+ei}))),
      payments_history:targets.flatMap((t,ti)=>(t.payments_history||[]).map((h,hi)=>({...h,id:"h"+ti+"_"+hi}))),
      notes:targets.map(t=>t.notes).filter(Boolean).join(" / ")
    };
    setData(prev=>({...prev,payments:[merged,...(prev.payments||[]).filter(p=>!mergeIds.includes(p.payment_id))]}));
    setSelectedId(merged.payment_id);
    setMergeMode(false);setMergeIds([]);setMergeConfirm(null);
  }

  const allPayments=payments||[];
  const unpaidTotal=allPayments.filter(p=>paymentStatus(p)!=="入金済").reduce((s,p)=>{
    const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
    const paid=(p.payments_history||[]).reduce((a,h)=>a+h.amount,0);
    return s+(total-paid);
  },0);

  const statusList=["全て","未請求","請求済","一部入金","入金済"];
  const stCounts=statusList.map(s=>({label:s,count:s==="全て"?allPayments.length:allPayments.filter(p=>paymentStatus(p)===s).length}));
  const filtered=allPayments.filter(p=>{
    if(filterStatus!=="全て"&&paymentStatus(p)!==filterStatus)return false;
    if(searchPay){const q=searchPay.toLowerCase();return[p.bill_to_name,p.invoice_number,...(p.case_ids||[]).map(id=>(cases.find(c=>c.case_id===id)?.case_title||"")),p.notes].some(s=>(s||"").toLowerCase().includes(q));}
    return true;
  });

  return(
    <div style={{position:isMobile?"relative":"fixed",top:isMobile?undefined:52,left:isMobile?undefined:0,right:isMobile?undefined:0,bottom:isMobile?undefined:0,height:isMobile?"calc(100vh - 52px)":undefined,display:"flex"}}>
      {/* サイドバー */}
      <div style={{width:isMobile?undefined:280,flex:isMobile?"1":undefined,display:isMobile&&showDetail?"none":"flex",flexDirection:"column",background:"var(--bg)",borderRight:isMobile?"none":"0.5px solid rgba(0,0,0,0.1)"}}>
        <div style={{padding:"12px 12px 8px",borderBottom:"0.5px solid rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:500}}>報酬管理</span>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>{setMergeMode(p=>!p);setMergeIds([]);}}
                style={{fontSize:10,padding:"3px 8px",cursor:"pointer",borderRadius:5,
                  border:`0.5px solid ${mergeMode?"#A32D2D":"rgba(0,0,0,0.15)"}`,
                  background:mergeMode?"#FCEBEB":"transparent",
                  color:mergeMode?"#A32D2D":"var(--text3)",fontWeight:mergeMode?500:400}}>{mergeMode?"✕ 解除":"まとめる"}</button>
              <button onClick={()=>setShowNew(true)} style={{width:26,height:26,cursor:"pointer",borderRadius:6,background:"var(--bg2)",border:"0.5px solid var(--border2)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>
          <div style={{background:"#FCEBEB",borderRadius:6,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#A32D2D"}}>売掛残金合計</span>
            <span style={{fontSize:13,fontWeight:500,color:"#A32D2D"}}>{fmt(Math.max(0,unpaidTotal))}</span>
          </div>
          <div style={{position:"relative",marginTop:8}}>
            <input type="text" placeholder="検索…" value={searchPay} onChange={e=>setSearchPay(e.target.value)} style={{width:"100%",fontSize:12,padding:"5px 8px",paddingRight:searchPay?22:8,borderRadius:6,border:"0.5px solid var(--border2)",background:"var(--bg2)",color:"var(--text)"}}/>
            {searchPay&&<span onClick={()=>{setSearchPay("");setFilterStatus("全て");}} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"var(--text3)",cursor:"pointer",lineHeight:1}}>×</span>}
          </div>
        </div>

        <div style={{display:"flex",gap:4,padding:"6px 12px 5px",flexWrap:"wrap"}}>
          {stCounts.map(({label,count})=>{
            const sc=PAY_STATUS_COLORS[label]||{bg:"var(--bg3)",color:"var(--text2)"};
            return(
              <button key={label} onClick={()=>setFilterStatus(label)} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:"0.5px solid",cursor:"pointer",
                borderColor:filterStatus===label?sc.color:"rgba(0,0,0,0.12)",background:filterStatus===label?sc.bg:"transparent",
                color:filterStatus===label?sc.color:"var(--text2)",fontWeight:filterStatus===label?500:400}}>{label} {count>0&&`(${count})`}</button>
            );
          })}
        </div>

        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.map(p=>{
            const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
            const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
            const unpaid2=total-paid;
            const isSel=selected?.payment_id===p.payment_id;
            const st=paymentStatus(p);
            const scBadge=PAY_STATUS_COLORS[st]||{bg:"#F1EFE8",color:"#5F5E5A"};
            const caseNames=p.case_ids.map(id=>cases.find(c=>c.case_id===id)?.case_title).filter(Boolean).join(" / ");
            return(
              <div key={p.payment_id} onClick={()=>mergeMode?toggleMerge(p.payment_id):(setSelectedId(p.payment_id),isMobile&&setShowDetail(true))}
                style={{padding:"9px 12px",cursor:"pointer",borderBottom:"0.5px solid rgba(0,0,0,0.06)",display:"flex",gap:8,alignItems:"flex-start",
                  background:mergeMode&&mergeIds.includes(p.payment_id)?"#E6F1FB":isSel&&!mergeMode?"#E6F1FB":"transparent",
                  borderLeft:isSel&&!mergeMode?"3px solid var(--accent)":"3px solid transparent"}}>
                {mergeMode&&<div style={{width:18,height:18,borderRadius:3,border:`1.5px solid ${mergeIds.includes(p.payment_id)?"var(--accent)":"#ccc"}`,
                  background:mergeIds.includes(p.payment_id)?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                  {mergeIds.includes(p.payment_id)&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
                </div>}
                <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500,marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.bill_to_name||"—"} 宛</div>
                <div style={{fontSize:11,color:"var(--text3)",marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{caseNames||"—"}</div>
                <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:scBadge.bg,color:scBadge.color,fontWeight:500}}>{st}</span>
                  {p.bill_type==="company"&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"#FAEEDA",color:"#854F0B"}}>会社請求</span>}
                  {p.case_ids.length>1&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"var(--accent-bg)",color:"var(--accent-text)"}}>まとめ</span>}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:500}}>{fmt(total)}</span>
                  {unpaid2>0&&<span style={{fontSize:11,color:"#A32D2D"}}>残 {fmt(unpaid2)}</span>}
                </div>
                </div>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{padding:30,textAlign:"center",color:"var(--text3)",fontSize:12}}>該当する請求がありません</div>}
        </div>

        {mergeMode&&mergeIds.length>=2&&(
          <div style={{padding:"8px 12px",borderTop:"0.5px solid var(--accent)",background:"var(--accent-bg)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--accent-text)",fontWeight:500}}>{mergeIds.length}件選択中</span>
            <button onClick={handleMergeStart} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"none",background:"var(--accent)",color:"#fff",fontWeight:500}}>統合する</button>
          </div>
        )}

        <div style={{padding:"6px 12px",borderTop:"0.5px solid rgba(0,0,0,0.08)",color:"var(--text3)",fontSize:11}}>
          {filtered.length} / {allPayments.length} 件
        </div>
      </div>

      {/* 詳細ビュー */}
      <div style={{flex:1,display:isMobile&&!showDetail?"none":"flex",flexDirection:"column",overflow:"hidden",background:"var(--bg3)"}}>
        {isMobile&&showDetail&&<button onClick={()=>setShowDetail(false)} style={{display:"flex",alignItems:"center",gap:4,padding:"8px 14px",border:"none",background:"var(--bg)",borderBottom:"0.5px solid var(--border)",cursor:"pointer",color:"var(--accent-text)",fontSize:13,fontWeight:500,width:"100%"}}>← 一覧に戻る</button>}
        {!selected
          ?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)"}}>請求を選択してください</div>
          :<PaymentDetail p={selected} cases={cases} clients={clients} office={data.office} onUpdate={handleUpdate} onDelete={handleDelete} onSplit={handleSplit} onItemSplit={handleItemSplit}/>
        }
      </div>

      {showNew&&<NewPaymentModal onClose={()=>setShowNew(false)} onSave={handleNew} cases={cases} clients={clients} payments={allPayments} feeMaster={data.fee_master}/>}
      {mergeConfirm&&<MergeConfirmModal targets={mergeConfirm.targets} billCandidates={mergeConfirm.billCandidates}
        onClose={()=>setMergeConfirm(null)} onConfirm={handleMergeExecute}/>}
    </div>
  );
}

function MasterOffice({office,setOffice}){
  const o=office||{};
  const up=(k,v)=>setOffice(prev=>({...prev,[k]:v}));
  const handleImage=(field)=>(e)=>{
    const f=e.target.files?.[0]; if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>up(field,ev.target.result);
    reader.readAsDataURL(f);
  };
  const bankLines=o.bank_lines||[];
  const addBank=()=>up("bank_lines",[...bankLines,""]);
  const updateBank=(i,v)=>{const a=[...bankLines];a[i]=v;up("bank_lines",a);};
  const removeBank=(i)=>up("bank_lines",bankLines.filter((_,j)=>j!==i));
  const inputS={fontSize:13,padding:"6px 10px",borderRadius:6,border:"0.5px solid var(--border2)",background:"var(--bg2)",color:"var(--text)",width:"100%"};
  const labelS={fontSize:10,color:"var(--text3)",fontWeight:500,marginBottom:4,letterSpacing:"0.05em"};
  return(
    <div style={{padding:20,overflowY:"auto",height:"100%"}}>
      <div style={{maxWidth:640,margin:"0 auto"}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:16}}>🏠 事務所設定</div>
        <div style={{fontSize:11,color:"var(--text2)",marginBottom:20,lineHeight:1.6}}>
          ここで設定した内容が、請求書・見積書・領収書・アプリヘッダーに自動反映されます。
        </div>
        <div style={{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:12,padding:20,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--accent-text)",marginBottom:14}}>基本情報</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div><div style={labelS}>事務所名</div><input value={o.name||""} onChange={e=>up("name",e.target.value)} style={inputS} placeholder="○○行政書士事務所"/></div>
            <div><div style={labelS}>行政書士名（請求書表示名）</div><input value={o.representative||""} onChange={e=>up("representative",e.target.value)} style={inputS} placeholder="行政書士　山田　太郎"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:12,marginBottom:12}}>
            <div><div style={labelS}>郵便番号</div><input value={o.postal||""} onChange={e=>up("postal",e.target.value)} style={inputS} placeholder="000-0000"/></div>
            <div><div style={labelS}>住所（都道府県〜番地）</div><input value={o.address1||""} onChange={e=>up("address1",e.target.value)} style={inputS} placeholder="東京都立川市○○町1-2-3"/></div>

function CompanyRoster({coName,clients,onNavigateToClient}){
  const [showRetired,setShowRetired]=useState(false);
  const roster=(clients||[]).filter(cl=>{
    if(cl.archived)return false;
    if(cl.company_name===coName) return true;
    return (cl.work_history||[]).some(w=>w.company_name===coName);
  });
  const getLatestWork=(cl)=>{
    const wh=(cl.work_history||[]).filter(w=>w.company_name===coName);
    if(wh.length===0) return cl.company_name===coName?{start_date:cl.work_start_date,end_date:null}:null;
    return wh.sort((a,b)=>(b.start_date||"").localeCompare(a.start_date||""))[0];
  };
  const getLatestSalary=(cl)=>{
    const wh=(cl.work_history||[]).filter(w=>w.company_name===coName);
    const wids=wh.map(w=>w.id);
    const sals=(cl.salary_history||[]).filter(s=>wids.includes(s.work_id));
    if(sals.length===0&&cl.company_name===coName){
      const all=[...(cl.salary_history||[])].sort((a,b)=>(b.effective_date||"").localeCompare(a.effective_date||""));
      return all[0]||null;
    }
    return sals.sort((a,b)=>(b.effective_date||"").localeCompare(a.effective_date||""))[0]||null;
  };
  const isRetired=(cl)=>{
    const w=getLatestWork(cl);
    return (w&&w.end_date)?true:(cl.client_status==="resigned"||cl.client_status==="returned");
  };
  const filtered=showRetired?roster:roster.filter(cl=>!isRetired(cl));
  const sorted=[...filtered].sort((a,b)=>{
    const aR=isRetired(a)?1:0, bR=isRetired(b)?1:0;
    if(aR!==bR)return aR-bR;
    return (a.store||"").localeCompare(b.store||"");
  });

  function exportExcel(){
    if(!window.XLSX){alert("SheetJS読み込みエラー");return;}
    const wb=XLSX.utils.book_new();
    const header=["店舗名","従業員名","入社日","給与（月額）","住所","在留カード番号","有効期限","生年月日","国籍","備考","退職日"];
    const rows=sorted.map(cl=>{
      const w=getLatestWork(cl);
      const sal=getLatestSalary(cl);
      return[
        cl.store||"",
        cl.name_roman||"",
        w?.start_date||cl.work_start_date||"",
        sal?.monthly_salary||"",
        (cl.postal_code?`〒${cl.postal_code} `:"")+(cl.address||""),
        cl.residence_card||"",
        cl.residence_expiry||"",
        cl.dob||"",
        cl.nationality||"",
        cl.notes||"",
        w?.end_date||""
      ];
    });
    const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
    ws["!cols"]=[14,24,12,12,40,18,12,12,10,24,12].map(w=>({wch:w}));
    const today=new Date().toISOString().slice(0,10);
    XLSX.utils.book_append_sheet(wb,ws,`従業員一覧${today}`.slice(0,31));
    XLSX.writeFile(wb,`${coName||"会社"}_従業員名簿_${today}.xlsx`);
  }

  const thS={fontSize:11,padding:"6px 8px",textAlign:"left",fontWeight:500,color:"var(--text2)",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",position:"sticky",top:0,background:"var(--bg)",zIndex:1};
  const tdS={fontSize:12,padding:"5px 8px",borderBottom:"0.5px solid rgba(0,0,0,0.06)",color:"var(--text)",whiteSpace:"nowrap"};

  return(
    <div style={{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:10,padding:"16px 18px",marginTop:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13,fontWeight:500}}>📋 従業員名簿</span>
          <span style={{fontSize:11,color:"var(--text3)"}}>{filtered.length}名{showRetired?` (うち退職${roster.filter(cl=>isRetired(cl)).length}名)`:""}</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <label style={{fontSize:11,color:"var(--text2)",display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
            <input type="checkbox" checked={showRetired} onChange={e=>setShowRetired(e.target.checked)}/> 退職者を含む
          </label>
          <button onClick={exportExcel} style={{fontSize:11,padding:"4px 12px",borderRadius:5,cursor:"pointer",border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",fontWeight:500}}>📥 Excel出力</button>
        </div>
      </div>
      {sorted.length===0?(
        <div style={{padding:20,textAlign:"center",color:"var(--text3)",fontSize:12}}>この会社に紐づくクライアントはいません</div>
      ):(
        <div style={{maxHeight:400,overflowY:"auto",border:"0.5px solid var(--border)",borderRadius:6}}>
          <table>
            <thead><tr>
              {["店舗","氏名","入社日","月給","住所","在留カード番号","有効期限","生年月日","国籍","備考","退職日"].map(h=><th key={h} style={thS}>{h}</th>)}
            </tr></thead>
            <tbody>{sorted.map(cl=>{
              const w=getLatestWork(cl);
              const sal=getLatestSalary(cl);
              const retired=isRetired(cl);
              const rowStyle={...tdS,...(retired?{color:"var(--text3)",background:"rgba(0,0,0,0.02)"}:{})};
              return(
                <tr key={cl.client_id}>
                  <td style={rowStyle}>{cl.store||"—"}</td>
                  <td style={rowStyle}>{onNavigateToClient?<span onClick={()=>onNavigateToClient(cl.client_id)} style={{color:"var(--accent-text)",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:2}}>{cl.name_roman||"—"}</span>:(cl.name_roman||"—")}</td>
                  <td style={rowStyle}>{w?.start_date||cl.work_start_date||"—"}</td>
                  <td style={{...rowStyle,textAlign:"right"}}>{sal?.monthly_salary?sal.monthly_salary.toLocaleString():"—"}</td>
                  <td style={{...rowStyle,maxWidth:240,overflow:"hidden",textOverflow:"ellipsis"}}>{cl.address||"—"}</td>
                  <td style={rowStyle}>{cl.residence_card||"—"}</td>
                  <td style={rowStyle}>{cl.residence_expiry||"—"}</td>
                  <td style={rowStyle}>{cl.dob||"—"}</td>
                  <td style={rowStyle}>{cl.nationality||"—"}</td>
                  <td style={{...rowStyle,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{cl.notes||""}</td>
                  <td style={rowStyle}>{w?.end_date||""}</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function MasterFee({feeMaster,setFeeMaster}){
  const [tab,setTab]=useState("follow");
  const fm=feeMaster||FEE_MASTER;
  const current=fm[tab]||{items:{}};
  const items=Object.entries(current.items||{});
  const [adding,setAdding]=useState(false);
  const [newKey,setNewKey]=useState("");
  const [newName,setNewName]=useState("");
  const [newPrice,setNewPrice]=useState("");

  function updatePrice(key,price){
    setFeeMaster(prev=>{
      const next=JSON.parse(JSON.stringify(prev||FEE_MASTER));
      if(next[tab]&&next[tab].items&&next[tab].items[key]) next[tab].items[key].price=price;
      return next;
    });
  }
  function deleteItem(key){
    if(!confirm(`「${current.items[key]?.name}」を削除しますか？`))return;
    setFeeMaster(prev=>{
      const next=JSON.parse(JSON.stringify(prev||FEE_MASTER));
      delete next[tab].items[key];
      return next;
    });
  }
  function addItem(){
    if(!newKey||!newName)return;
    setFeeMaster(prev=>{
      const next=JSON.parse(JSON.stringify(prev||FEE_MASTER));
      if(!next[tab]) next[tab]={label:tab==="follow"?"フォロー特別":tab==="general_biz"?"一般業務":"入管一般",items:{}};
      next[tab].items[newKey]={name:newName,price:parseInt(newPrice)||0};
      return next;
    });
    setNewKey("");setNewName("");setNewPrice("");setAdding(false);
  }
  const inputS={fontSize:13,padding:"5px 8px",borderRadius:6,border:"0.5px solid var(--border2)",background:"var(--bg2)",color:"var(--text)"};

  return(
    <div style={{padding:18}}>
      <div style={{display:"flex",gap:0,borderBottom:"0.5px solid var(--border)",marginBottom:16}}>
        {[["follow","フォロー特別"],["general","入管一般"],["general_biz","一般業務"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{fontSize:12,padding:"8px 16px",border:"none",borderBottom:tab===id?"2px solid var(--accent)":"2px solid transparent",
              background:"transparent",cursor:"pointer",color:tab===id?"var(--accent-text)":"var(--text2)",fontWeight:tab===id?500:400}}>{label}</button>
        ))}
      </div>
      <div style={{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 100px 40px",padding:"8px 16px",background:"var(--bg2)",fontSize:10,color:"var(--text3)",fontWeight:500}}>
          <span>キー</span><span>項目名</span><span style={{textAlign:"right"}}>金額</span><span/>
        </div>
        {items.map(([key,item])=>(
          <div key={key} style={{display:"grid",gridTemplateColumns:"1fr 1fr 100px 40px",padding:"8px 16px",borderTop:"0.5px solid rgba(0,0,0,0.06)",alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--text3)"}}>{key}</span>
            <span style={{fontSize:12}}>{item.name}</span>
            <input type="number" value={item.price} onChange={e=>updatePrice(key,parseInt(e.target.value)||0)}
              style={{...inputS,width:"100%",textAlign:"right",fontSize:12,padding:"3px 6px"}}/>
            <button onClick={()=>deleteItem(key)} style={{border:"none",background:"none",cursor:"pointer",color:"#ccc",fontSize:14,textAlign:"center"}}>×</button>
          </div>
        ))}
        {adding?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 100px 70px",padding:"8px 16px",borderTop:"0.5px solid var(--border)",gap:8,alignItems:"center",background:"var(--bg2)"}}>
            <input value={newKey} onChange={e=>setNewKey(e.target.value)} placeholder="キー（英数）" style={{...inputS,fontSize:11,padding:"4px 6px"}}/>
            <IMEInput value={newName} onChange={v=>setNewName(v)} placeholder="項目名" style={{...inputS,fontSize:12,padding:"4px 6px"}}/>
            <input type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} placeholder="金額" style={{...inputS,fontSize:12,padding:"4px 6px",textAlign:"right"}}/>
            <div style={{display:"flex",gap:4}}>
              <button onClick={addItem} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",cursor:"pointer",fontWeight:500}}>追加</button>
              <button onClick={()=>setAdding(false)} style={{fontSize:10,padding:"3px 6px",borderRadius:4,border:"0.5px solid var(--border)",background:"transparent",color:"var(--text3)",cursor:"pointer"}}>✕</button>
            </div>

    </div>
  );
}
