function getSystemAlerts(office){
  const alerts=[];
  const o=office||{};
  // 届出済証明書の有効期限アラート
  if(o.credential_expiry){
    const days=getDays(o.credential_expiry);
    if(days!==null&&days<=365){
      const level=days<=0?"⛔ 期限切れ":days<=90?"🔴 要更新":days<=180?"🟡 更新準備":"📋 更新予定";
      alerts.push({id:"sys-cred",icon:"📜",label:`${level} 届出済証明書`,due:o.credential_expiry,days,note:`有効期限${days<=0?"切れ！至急更新を！":`まで${days}日`}`});
    }
  }
  // 研修日程アラート（申込期間の事前通知）
  const schedule=o.training_schedule||DEFAULT_TRAINING_SCHEDULE;
  const today=new Date(new Date().toDateString());
  if(schedule&&schedule.sessions){
    // 更新 or 新規どちらを表示するか（特例措置：どちらでもOK）
    const isRenewal=o.credential_expiry; // 有効期限登録あり=更新対象
    schedule.sessions.forEach(s=>{
      const eStart=new Date(s.enroll_start);
      const eEnd=new Date(s.enroll_end);
      const daysToStart=Math.ceil((eStart-today)/86400000);
      const daysToEnd=Math.ceil((eEnd-today)/86400000);
      // 申込期間の30日前から、終了日まで表示
      if(daysToStart<=30&&daysToEnd>=0){
        const inPeriod=daysToStart<=0&&daysToEnd>=0;
        const icon=inPeriod?"🔔":"📅";
        const status=inPeriod?`申込受付中（〜${s.enroll_end}）`:`申込開始まで${daysToStart}日`;
        alerts.push({id:`sys-train-${s.no}`,icon,label:`研修 第${s.no}回 ${s.type}`,due:inPeriod?s.enroll_end:s.enroll_start,days:inPeriod?daysToEnd:daysToStart,note:`${status}｜受講料 ¥${s.cost.toLocaleString()}`});
      }
    });
  }
  return alerts;
}

function loadMinWages(){try{const r=localStorage.getItem(MIN_WAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return DEFAULT_MIN_WAGES;}

function calcHourlyFromMonthly(monthly,weeklyH){if(!monthly||!weeklyH||weeklyH<=0)return null;return Math.round(monthly/(weeklyH*(365/7/12)));}

const GOOGLE_CLIENT_ID = "531890884615-pv6jvdhqegkera9nbqm3ppskisg1ar2a.apps.googleusercontent.com";
const GOOGLE_SCOPES = "https://www.googleapis.com/auth/drive.file";
const DRIVE_FILE_NAME = "clavis-note-sync.json";

let googleTokenClient = null;
let googleAccessToken = null;

function initGoogleClient() {
  return new Promise((resolve) => {
    if (typeof google === 'undefined' || !google.accounts) {
      console.log("Google API not loaded yet");
      resolve(false);
      return;
    }
    googleTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GOOGLE_SCOPES,
      callback: (response) => {
        if (response.access_token) {
          googleAccessToken = response.access_token;
          localStorage.setItem("clavis-google-token", response.access_token);
        }
      },
    });
    resolve(true);
  });
}

function googleSignIn() {
  return new Promise((resolve, reject) => {
    if (!googleTokenClient) {
      reject(new Error("Google client not initialized"));
      return;
    }
    googleTokenClient.callback = (response) => {
      if (response.error) {
        reject(new Error(response.error));
        return;
      }
      googleAccessToken = response.access_token;
      localStorage.setItem("clavis-google-token", response.access_token);
      resolve(response.access_token);
    };
    googleTokenClient.requestAccessToken({ prompt: "consent" });
  });
}

function googleSignOut() {
  if (googleAccessToken) {
    google.accounts.oauth2.revoke(googleAccessToken);
    googleAccessToken = null;
    localStorage.removeItem("clavis-google-token");
  }
}

async function findDriveFile() {
  if (!googleAccessToken) return null;
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and trashed=false&spaces=drive&fields=files(id,name,modifiedTime)`,
    { headers: { Authorization: `Bearer ${googleAccessToken}` } }
  );
  if (!res.ok) throw new Error("Drive search failed");
  const data = await res.json();
  return data.files && data.files.length > 0 ? data.files[0] : null;
}

async function uploadToDrive(jsonData) {
  if (!googleAccessToken) throw new Error("Not signed in");
  const existingFile = await findDriveFile();
  const metadata = { name: DRIVE_FILE_NAME, mimeType: "application/json" };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file", new Blob([JSON.stringify(jsonData)], { type: "application/json" }));
  
  let url = "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,modifiedTime";
  let method = "POST";
  if (existingFile) {
    url = `https://www.googleapis.com/upload/drive/v3/files/${existingFile.id}?uploadType=multipart&fields=id,name,modifiedTime`;
    method = "PATCH";
  }
  
  const res = await fetch(url, {
    method,
    headers: { Authorization: `Bearer ${googleAccessToken}` },
    body: form,
  });
  if (!res.ok) throw new Error("Upload failed");
  return await res.json();
}

async function downloadFromDrive() {
  if (!googleAccessToken) throw new Error("Not signed in");
  const file = await findDriveFile();
  if (!file) return null;
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
    { headers: { Authorization: `Bearer ${googleAccessToken}` } }
  );
  if (!res.ok) throw new Error("Download failed");
  return { data: await res.json(), modifiedTime: file.modifiedTime };
}

const STORAGE_KEY = "clavis-note-data";

function loadData(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){ console.error("loadData error:",e); }
  return null;
}

function saveData(data){
  try {
    // 自動バックアップ世代管理（5分以上経過時のみ新世代作成）
    const BK_PREFIX="clavis-note-auto-bk-";
    const BK_GENERATIONS=3;
    const BK_INTERVAL=5*60*1000; // 5分
    try {
      const lastBkMeta=localStorage.getItem(BK_PREFIX+"meta");
      const lastBkTime=lastBkMeta?JSON.parse(lastBkMeta).t:0;
      const now=Date.now();
      if(now-lastBkTime>=BK_INTERVAL){
        const currentData=localStorage.getItem(STORAGE_KEY);
        if(currentData){
          // 世代シフト: 3→削除, 2→3, 1→2, current→1
          for(let i=BK_GENERATIONS;i>=2;i--){
            const prev=localStorage.getItem(BK_PREFIX+(i-1));
            if(prev) localStorage.setItem(BK_PREFIX+i,prev);
            else try{localStorage.removeItem(BK_PREFIX+i);}catch(e){}
          }
          localStorage.setItem(BK_PREFIX+"1",JSON.stringify({data:currentData,timestamp:new Date().toISOString()}));
          localStorage.setItem(BK_PREFIX+"meta",JSON.stringify({t:now}));
        }
      }
    } catch(bkErr){ console.warn("auto-backup error:",bkErr); }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  catch(e){ console.error("saveData error:",e); }
}

function getAutoBackups(){
  const BK_PREFIX="clavis-note-auto-bk-";
  const backups=[];
  for(let i=1;i<=3;i++){
    try{
      const raw=localStorage.getItem(BK_PREFIX+i);
      if(raw){
        const parsed=JSON.parse(raw);
        backups.push({gen:i,timestamp:parsed.timestamp,data:parsed.data});
      }
    }catch(e){}
  }
  return backups;
}

function restoreAutoBackup(gen){
  const BK_PREFIX="clavis-note-auto-bk-";
  try{
    const raw=localStorage.getItem(BK_PREFIX+gen);
    if(!raw) return null;
    const parsed=JSON.parse(raw);
    return JSON.parse(parsed.data);
  }catch(e){console.error("restore error:",e);return null;}
}

function getDays(d){ if(!d)return null; return Math.ceil((new Date(d)-new Date(new Date().toDateString()))/86400000); }
function alertLevel(d){ if(d===null)return"none"; if(d<=0)return"expired"; if(d<=30)return"critical"; if(d<=90)return"warning"; return"ok"; }
function getTokureiInfo(client,cases){
  const days=getDays(client.residence_expiry);
  if(days===null||days>0)return{isTokurei:false};
  const hasActive=(cases||[]).some(cs=>{
    const match=cs.applicant_id===client.client_id||cs.client_id===client.client_id||(cs.applicant||"").includes(client.name_roman||"__NOMATCH__");
    return match&&(cs.status==="申請中"||cs.status==="追加資料対応中"||cs.status==="結果待ち"||cs.status==="完了（結果待ち）");
  });
  if(!hasActive)return{isTokurei:false};
  const exp=new Date(client.residence_expiry);
  exp.setMonth(exp.getMonth()+2);
  const tokureiExpiry=exp.toISOString().slice(0,10);
  const tokureiDays=getDays(tokureiExpiry);
  return{isTokurei:true,tokureiExpiry,tokureiDays};
}
function getEffectiveDays(client,cases){
  const info=getTokureiInfo(client,cases);
  if(info.isTokurei)return info.tokureiDays;
  return getDays(client.residence_expiry);
}

async function cropFace(base64, mediaType, region, orientation){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const x=Math.round(img.width*region.x_pct);
        const y=Math.round(img.height*region.y_pct);
        const w=Math.round(img.width*region.w_pct);
        const h=Math.round(img.height*region.h_pct);
        if(w<10||h<10){resolve(null);return;}
        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");
        if(orientation==="landscape"){
          // 横向きカード→顔を縦向きに補正（90度回転）
          canvas.width=h; canvas.height=w;
          ctx.translate(h/2,w/2);
          ctx.rotate(Math.PI/2);
          ctx.drawImage(img,x,y,w,h,-w/2,-h/2,w,h);
        } else {
          canvas.width=w; canvas.height=h;
          ctx.drawImage(img,x,y,w,h,0,0,w,h);
        }
        resolve(canvas.toDataURL("image/jpeg",0.9));
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=`data:${mediaType};base64,${base64}`;
  });
}

// 税計算ユーティリティ
const TAX_RATE = 0.10;
function calcTax(amount, mode){
  if(mode==="tax_incl") return Math.floor(amount - amount / (1 + TAX_RATE));
  return Math.floor(amount * TAX_RATE);
}
function calcTaxedTotal(amount, mode){
  if(mode==="tax_incl") return amount;
  return amount + Math.floor(amount * TAX_RATE);
}
function calcItemsTotal(items){ return (items||[]).reduce((s,i)=>s+i.unit_price*i.quantity,0); }
function calcExpBillable(expenses){ return (expenses||[]).filter(e=>e.billable).reduce((s,e)=>s+e.amount,0); }
function calcExpAll(expenses){ return (expenses||[]).reduce((s,e)=>s+e.amount,0); }
function calcGrandTotal(items, expenses, taxMode){
  return calcTaxedTotal(calcItemsTotal(items), taxMode) + calcExpBillable(expenses);
}
function paymentStatus(p){
  const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
  const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
  if(total<=0) return "未請求";
  if(paid>=total) return "入金済";
  if(paid>0) return "一部入金";
  if(p.invoice_date) return "請求済";
  return "未請求";
}
function isFollowClient(clientId, clients){
  const cl=(clients||[]).find(x=>x.client_id===clientId);
  if(!cl) return false;
  if(cl.company_name?.includes("フォロー")) return true;
  // 扶養家族の場合、扶養元がフォロー所属なら本人もフォロー扱い
  if(cl.dependent_of){
    const dep=(clients||[]).find(x=>x.client_id===cl.dependent_of);
    if(dep?.company_name?.includes("フォロー")) return true;
  }
  return false;
}
function isFollowCase(c, clients){
  if(c.client_id && isFollowClient(c.client_id, clients)) return true;
  if((c.requester||"").includes("フォロー")) return true;
  if((c.company_name||"").includes("フォロー")) return true;
  return false;
}

// IME対応テキスト入力（ローカルstateで変換中を保護）
function IMEInput({value,onChange,style,...props}){
  const [local,setLocal]=useState(value||"");
  const composing=React.useRef(false);
  // 親からのvalue変更を反映（ただしcomposing中は無視）
  useEffect(()=>{if(!composing.current)setLocal(value||"");},[value]);
  return <input value={local} style={style} {...props}
    onCompositionStart={()=>{composing.current=true;}}
    onCompositionEnd={e=>{composing.current=false;setLocal(e.target.value);onChange(e.target.value);}}
    onChange={e=>{setLocal(e.target.value);if(!composing.current)onChange(e.target.value);}}/>;
}

  }
  const lv=alertLevel(days); if(lv==="none")return null;
  const s={expired:{bg:"#FCEBEB",color:"#A32D2D",label:"期限切れ"},critical:{bg:"#FCEBEB",color:"#A32D2D",label:"残"+days+"日"},warning:{bg:"#FAEEDA",color:"#854F0B",label:"残"+days+"日"},ok:{bg:"#EAF3DE",color:"#3B6D11",label:"残"+days+"日"}}[lv];
  return <span style={{fontSize:11,padding:"2px 7px",borderRadius:4,background:s.bg,color:s.color,fontWeight:500}}>{s.label}</span>;
}

function sanitizeDate(v){
  if(!v)return v;
  // まず年5桁以上を4桁に切り詰め
  const m=v.match(/^(\d{4})\d*-(\d{1,2})-(\d{1,2})/);
  if(!m)return v;
  let y=parseInt(m[1]), mo=parseInt(m[2]), d=parseInt(m[3]);
  if(y<1950)y=1950; if(y>2099)y=2099;
  if(mo<1)mo=1; if(mo>12)mo=12;
  // 月ごとの最大日数（うるう年考慮）
  const maxDay=new Date(y,mo,0).getDate();
  if(d<1)d=1; if(d>maxDay)d=maxDay;
  return `${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function trimDateYear(v){if(!v||v.length<=10)return v;const p=v.split("-");p[0]=p[0].slice(0,4);return p.join("-");}

function useDashAccordion(key,defaultOpen=true){
  const k="clavis-dash-"+key;
  const [open,setOpen]=useState(()=>{const v=localStorage.getItem(k);return v===null?defaultOpen:v==="1";});
  const toggle=useCallback(()=>setOpen(prev=>{const n=!prev;localStorage.setItem(k,n?"1":"0");return n;}),[k]);
  return [open,toggle];
}

function calcPaid(c){ return (c.payment_logs||[]).reduce((s,l)=>s+l.amount,0); }
function payStatus(c){
  const paid=calcPaid(c);
  if(!c.fee||c.fee<=0) return "未請求";
  if(paid>=c.fee) return "入金済";
  if(paid>0) return "一部入金";
  if(c.invoice_date) return "請求済";
  return "未請求";
}
function DashUnpaidList({payments,cases,onUpdatePayment,onClickItem}){
  const [open,toggle]=useDashAccordion("unpaid",true);
  const unpaidPayments=payments.filter(p=>{
    const st=paymentStatus(p);
    return st!=="入金済"&&calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl")>0;
  });
  const totalUnpaid=unpaidPayments.reduce((s,p)=>{
    const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
    const paid=(p.payments_history||[]).reduce((a,h)=>a+h.amount,0);
    return s+(total-paid);
  },0);
  const [openId,setOpenId]=useState(null);
  const [draftAmount,setDraftAmount]=useState("");
  const [draftDate,setDraftDate]=useState("");
  const [draftMethod,setDraftMethod]=useState("振込");
  const [draftNote,setDraftNote]=useState("");
  const today=new Date().toISOString().slice(0,10);

  function handleOpen(p){
    const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
    const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
    setOpenId(p.payment_id);
    setDraftAmount(String(total-paid));
    setDraftDate(today);
    setDraftMethod("振込");
    setDraftNote("");
  }
  function handleClose(){setOpenId(null);}
  function handleSave(p){
    const amt=Number(draftAmount)||0;
    if(amt<=0) return;
    const newHist={id:"h"+Date.now(),date:draftDate||today,amount:amt,method:draftMethod,note:draftNote};
    onUpdatePayment({...p,payments_history:[...(p.payments_history||[]),newHist]});
    handleClose();
  }

  return(
    <div style={{background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:10,overflow:"hidden"}}>
      <div onClick={toggle} style={{padding:"10px 16px",borderBottom:open?"0.5px solid rgba(0,0,0,0.08)":"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",userSelect:"none"}}>

        <span style={{fontSize:12,fontWeight:500,color:"#A32D2D"}}>{fmt(totalUnpaid)} <span style={{fontSize:10,color:"#999"}}>{open?"▲":"▼"}</span></span>
      </div>
      {open&&(unpaidPayments.length===0?(
        <div style={{padding:20,textAlign:"center",color:"#bbb",fontSize:12}}>未入金はありません 🎉</div>
      ):(
        <div style={{padding:"4px 0"}}>
          {unpaidPayments.map(p=>{
            const total=calcGrandTotal(p.items,p.expenses,p.tax_mode||"tax_incl");
            const paid=(p.payments_history||[]).reduce((s,h)=>s+h.amount,0);
            const remaining=total-paid;
            const dueDays=getDays(p.due_date);
            const isOverdue=dueDays!==null&&dueDays<0;
            const st=paymentStatus(p);
            const isOpen=openId===p.payment_id;
            const caseNames=p.case_ids.map(id=>cases.find(c=>c.case_id===id)?.case_title).filter(Boolean).join(" / ");
            return(
              <div key={p.payment_id} style={{borderBottom:"0.5px solid rgba(0,0,0,0.04)"}}>
                <div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:10,background:isOpen?"var(--accent-bg)":isOverdue?"#FFF8F8":"transparent"}}>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>{if(onClickItem)onClickItem(p);}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1a1a1a"}}>{p.bill_to_name||"—"} <span style={{fontSize:10,color:"#aaa"}}>ℹ</span></div>
                    <div style={{fontSize:11,color:"#888"}}>{caseNames}</div>
                    <div style={{fontSize:11,color:"#666",marginTop:1}}>
                      {st==="一部入金"?`入金済 ${fmt(paid)} / 残 ${fmt(remaining)}`:fmt(remaining)}
                    </div>
                  </div>
                  <div style={{textAlign:"right",marginRight:6}}>
                    <div style={{fontSize:13,fontWeight:500,color:"#A32D2D"}}>{fmt(remaining)}</div>
                    {p.due_date&&<div style={{fontSize:10,color:isOverdue?"#A32D2D":"#999"}}>{isOverdue?"期限超過":p.due_date}</div>}
                    {!p.due_date&&<div style={{fontSize:10,color:"#999"}}>期限未設定</div>}
                  </div>
                  {!isOpen?(
                    <button onClick={()=>handleOpen(p)} style={{fontSize:11,padding:"5px 10px",borderRadius:6,border:"0.5px solid var(--accent)",background:"transparent",color:"var(--accent-text)",cursor:"pointer",whiteSpace:"nowrap",fontWeight:500}}>

                  ):(
                    <button onClick={handleClose} style={{fontSize:11,padding:"5px 10px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#999",cursor:"pointer"}}>✕</button>
                  )}
                </div>
                {isOpen&&(
                  <div style={{background:"var(--bg2)",padding:"12px 16px",display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                    <div>
                      <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>入金額</div>
                      <input type="number" value={draftAmount} onChange={e=>setDraftAmount(e.target.value)}
                        style={{width:110,fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",textAlign:"right"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>入金日</div>
                      <input type="date" max="9999-12-31" min="1900-01-01" value={draftDate} onChange={e=>setDraftDate(e.target.value)}
                        style={{fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>入金方法</div>
                      <select value={draftMethod} onChange={e=>setDraftMethod(e.target.value)}
                        style={{fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)"}}>
                        {["振込","現金","PayPay","その他"].map(m=><option key={m}>{m}</option>)}
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>メモ（任意）</div>
                      <input value={draftNote} onChange={e=>setDraftNote(e.target.value)} placeholder="例：三菱UFJ確認済"
                        style={{width:"100%",fontSize:13,padding:"6px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",boxSizing:"border-box"}}/>
                    </div>
                    <button onClick={()=>handleSave(p)}
                      style={{fontSize:12,padding:"7px 18px",borderRadius:6,border:"none",background:"var(--accent)",color:"#fff",cursor:"pointer",fontWeight:500,marginBottom:1}}>
                      記録
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

    if(!newName||!newUrl) return;

                      style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,border:"0.5px solid rgba(0,0,0,0.08)",background:"var(--bg2)",textDecoration:"none",color:"#1a1a1a"}}>
                      <span style={{fontSize:16,flexShrink:0}}>{link.icon}</span>
                      <span style={{fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{link.name}</span>
                    </a>
                  )}

                    <div style={{position:"absolute",top:-4,right:-4,display:"flex",gap:2}}>
                      <button onClick={()=>startEdit(link)} style={{width:18,height:18,borderRadius:"50%",border:"0.5px solid #378ADD",background:"#E6F1FB",cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#185FA5"}}>✎</button>
                      <button onClick={()=>moveLink(link.id,-1)} style={{width:18,height:18,borderRadius:"50%",border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg)",cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#666"}}>↑</button>
                      <button onClick={()=>removeLink(link.id)} style={{width:18,height:18,borderRadius:"50%",border:"0.5px solid #A32D2D",background:"#FCEBEB",cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#A32D2D"}}>×</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ImageCropModal({src,onSave,onClose}){
  const containerRef=React.useRef(null);
  const imgRef=React.useRef(null);
  const dragRef=React.useRef(null);
  const [rect,setRect]=React.useState({x:0,y:0,w:0,h:0}); // 0〜1の比率
  const [imgLoaded,setImgLoaded]=React.useState(false);

  function getPos(e){
    const el=containerRef.current; if(!el)return{x:0,y:0};
    const b=el.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{
      x:Math.max(0,Math.min((cx-b.left)/b.width,1)),
      y:Math.max(0,Math.min((cy-b.top)/b.height,1))
    };
  }
  function onStart(e){
    e.preventDefault();
    const p=getPos(e);
    dragRef.current={sx:p.x,sy:p.y};
    setRect({x:p.x,y:p.y,w:0,h:0});
  }
  function onMove(e){
    e.preventDefault();
    if(!dragRef.current)return;
    const p=getPos(e);
    const d=dragRef.current;
    setRect({x:Math.min(d.sx,p.x),y:Math.min(d.sy,p.y),w:Math.abs(p.x-d.sx),h:Math.abs(p.y-d.sy)});
  }
  function onEnd(e){e.preventDefault();dragRef.current=null;}

  function handleSave(){
    const img=imgRef.current;
    if(!img||!imgLoaded||rect.w<0.01||rect.h<0.01){onSave(src);onClose();return;}
    const nw=img.naturalWidth, nh=img.naturalHeight;
    const off=document.createElement("canvas");
    off.width=Math.round(rect.w*nw); off.height=Math.round(rect.h*nh);
    off.getContext("2d").drawImage(img,rect.x*nw,rect.y*nh,rect.w*nw,rect.h*nh,0,0,off.width,off.height);
    onSave(off.toDataURL("image/jpeg",0.92));
    onClose();
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.75)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"var(--bg)",borderRadius:12,padding:16,maxWidth:480,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:13,fontWeight:500}}>📷 顔写真の範囲を選択</div>
        <div style={{fontSize:11,color:"var(--text3)"}}>ドラッグで選択 → 切り取り。選択なしでそのまま保存も可</div>
        <div style={{overflow:"hidden",borderRadius:8,border:"0.5px solid var(--border)"}}>
          <div ref={containerRef} style={{position:"relative",cursor:"crosshair",userSelect:"none",touchAction:"none"}}
            onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
            onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>
            <img ref={imgRef} src={src} style={{width:"100%",display:"block",pointerEvents:"none"}} onLoad={()=>setImgLoaded(true)} alt=""/>
            {rect.w>0.01&&rect.h>0.01&&<div style={{position:"absolute",left:`${rect.x*100}%`,top:`${rect.y*100}%`,width:`${rect.w*100}%`,height:`${rect.h*100}%`,border:"2px solid #378ADD",background:"rgba(55,138,221,0.15)",pointerEvents:"none",boxSizing:"border-box"}}/>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{fontSize:12,padding:"6px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid var(--border)",background:"transparent",color:"var(--text2)"}}>キャンセル</button>
          <button onClick={()=>{onSave(src);onClose();}} style={{fontSize:12,padding:"6px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid var(--border)",background:"transparent",color:"var(--text2)"}}>そのまま保存</button>
          <button onClick={handleSave} disabled={!imgLoaded} style={{fontSize:12,padding:"6px 16px",cursor:imgLoaded?"pointer":"wait",borderRadius:6,border:"none",background:imgLoaded?"#378ADD":"#aaa",color:"#fff",fontWeight:500}}>✂️ 切り取り</button>
        </div>
      </div>
    </div>
  );
}

function TabCaseHistory({c,cases,onNavigateCase}){
  const myCases=(cases||[]).filter(cs=>cs.applicant_id===c.client_id||cs.client_id===c.client_id||(c.name_roman&&c.name_roman.length>1&&(cs.applicant||"").includes(c.name_roman)));
  const sorted=[...myCases].sort((a,b)=>(b.accepted_date||"").localeCompare(a.accepted_date||""));
  const stColors=CASE_STATUS_COLORS;
  const [modalCase,setModalCase]=useState(null);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:13,fontWeight:500}}>案件履歴</span>
        <span style={{fontSize:11,color:"var(--text3)"}}>{sorted.length}件</span>
      </div>
      {sorted.length===0?(
        <div style={{padding:20,textAlign:"center",color:"var(--text3)",fontSize:12}}>この方に紐づく案件はありません</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {sorted.map(cs=>{
            const st=stColors[cs.status]||{bg:"#F1EFE8",color:"#5F5E5A"};
            const fee=cs.fee||0, paid=cs.paid||0;
            const paidFromLogs=(cs.payment_logs||[]).reduce((s,p)=>s+(p.amount||0),0);

            const unpaid=fee-actualPaid;
            return(
              <div key={cs.case_id} onClick={()=>setModalCase(cs)}
                style={{padding:"10px 14px",background:"var(--bg2)",borderRadius:8,cursor:"pointer",border:"0.5px solid var(--border)",transition:"background 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
                onMouseLeave={e=>e.currentTarget.style.background="var(--bg2)"}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:"var(--text3)",fontFamily:"monospace"}}>{cs.case_id}</span>
                    <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:st.bg,color:st.color,fontWeight:500}}>{cs.status}</span>
                  </div>
                  {cs.accepted_date&&<span style={{fontSize:10,color:"var(--text3)"}}>受任 {cs.accepted_date.replace(/-/g,"/")}</span>}
                </div>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text)",marginBottom:3}}>{cs.case_title}</div>
                <div style={{display:"flex",gap:12,fontSize:11,color:"var(--text2)"}}>
                  {fee>0&&<span>報酬 ¥{fee.toLocaleString()}</span>}
                  {fee>0&&actualPaid>0&&<span>入金 ¥{actualPaid.toLocaleString()}</span>}
                  {unpaid>0&&<span style={{color:"#A32D2D"}}>未収 ¥{unpaid.toLocaleString()}</span>}
                  {cs.receipt_number&&<span>受付# {cs.receipt_number}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {/* 案件詳細モーダル */}
      {modalCase&&(()=>{
        const cs=modalCase;
        const st=stColors[cs.status]||{bg:"#F1EFE8",color:"#5F5E5A"};
        const catColor=JOURNAL_CAT_COLOR[cs.category]||{bg:"#F1EFE8",color:"#5F5E5A"};
        const fee=cs.fee||0;
        const paidFromLogs=(cs.payment_logs||[]).reduce((s,p)=>s+(p.amount||0),0);
        const actualPaid=paidFromLogs||cs.paid||0;
        const unpaid=fee-actualPaid;
        const docs=cs.docs||[];
        const submitted=docs.filter(d=>d.status==="提出済").length;
        const contacts=cs.contacts||[];
        const commLog=cs.comm_log||[];
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}} onClick={()=>setModalCase(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg)",borderRadius:12,border:"0.5px solid rgba(0,0,0,0.15)",width:560,maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
              <div style={{padding:"14px 18px",borderBottom:"0.5px solid rgba(0,0,0,0.1)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{cs.case_title}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,fontFamily:"monospace",color:"var(--text3)"}}>{cs.case_id}</span>
                    <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:catColor.bg,color:catColor.color,fontWeight:500}}>{cs.category}</span>
                    <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:st.bg,color:st.color,fontWeight:500}}>{cs.status}</span>
                  </div>
                </div>
                <button onClick={()=>setModalCase(null)} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
              </div>
              <div style={{overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:14}}>
                {/* 基本情報 */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  {[["受任日",cs.accepted_date],["申請日",cs.applied_date],["結果日",cs.result_date]].map(([label,val])=>(
                    <div key={label}><div style={{fontSize:10,color:"#999"}}>{label}</div><div style={{fontSize:12}}>{val?val.replace(/-/g,"/"):"—"}</div></div>
                  ))}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {cs.applicant&&<div><div style={{fontSize:10,color:"#999"}}>申請人</div><div style={{fontSize:12}}>{cs.applicant}</div></div>}
                  {cs.requester&&<div><div style={{fontSize:10,color:"#999"}}>依頼者</div><div style={{fontSize:12}}>{cs.requester}</div></div>}
                </div>
                {/* 報酬 */}
                {fee>0&&<div style={{display:"flex",gap:16,padding:"8px 12px",background:"var(--bg2)",borderRadius:6}}>
                  <div><div style={{fontSize:10,color:"#999"}}>報酬</div><div style={{fontSize:13,fontWeight:500}}>¥{fee.toLocaleString()}</div></div>
                  <div><div style={{fontSize:10,color:"#999"}}>入金</div><div style={{fontSize:13,color:"#3B6D11"}}>¥{actualPaid.toLocaleString()}</div></div>
                  {unpaid>0&&<div><div style={{fontSize:10,color:"#999"}}>未収</div><div style={{fontSize:13,color:"#A32D2D",fontWeight:500}}>¥{unpaid.toLocaleString()}</div></div>}
                </div>}
                {/* 入管固有 */}
                {cs.category==="国際"&&(cs.receipt_number||cs.result||cs.period)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  {cs.receipt_number&&<div><div style={{fontSize:10,color:"#999"}}>受付番号</div><div style={{fontSize:12}}>{cs.receipt_number}</div></div>}
                  {cs.result&&<div><div style={{fontSize:10,color:"#999"}}>結果</div><div style={{fontSize:12}}>{cs.result}</div></div>}
                  {cs.period&&<div><div style={{fontSize:10,color:"#999"}}>在留期間</div><div style={{fontSize:12}}>{cs.period}</div></div>}
                </div>}
                {cs.next_renewal&&<div><div style={{fontSize:10,color:"#999"}}>次回更新</div><div style={{fontSize:12}}>{cs.next_renewal.replace(/-/g,"/")}</div></div>}
                {/* 書類チェック概要 */}
                {docs.length>0&&<div>
                  <div style={{fontSize:11,color:"#666",fontWeight:500,marginBottom:6}}>書類チェックリスト（{submitted}/{docs.length}）</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {docs.map(d=>{const s=DOC_STATUS_STYLE[d.status]||DOC_STATUS_STYLE["未取得"];return(
                      <span key={d.id} style={{fontSize:10,padding:"2px 6px",borderRadius:3,background:s.bg||"#f5f5f3",color:s.textColor,border:"0.5px solid rgba(0,0,0,0.08)"}}>{d.status==="提出済"?"✓ ":d.status==="取得済"?"◐ ":""}{d.name}</span>
                    );})}
                  </div>
                </div>}
                {/* 関係者 */}
                {contacts.length>0&&<div>
                  <div style={{fontSize:11,color:"#666",fontWeight:500,marginBottom:6}}>👤 関係者</div>
                  {contacts.map(ct=>(
                    <div key={ct.id} style={{fontSize:12,marginBottom:3,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:500}}>{ct.name}</span>
                      {ct.role&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"#EEEDFE",color:"#534AB7"}}>{ct.role}</span>}
                      {ct.org&&<span style={{fontSize:11,color:"#888"}}>{ct.org}</span>}
                      {ct.phone&&<span style={{fontSize:11,color:"#666"}}>📞 {ct.phone}</span>}
                    </div>
                  ))}
                </div>}
                {/* やり取り履歴 */}
                {commLog.length>0&&<div>
                  <div style={{fontSize:11,color:"#666",fontWeight:500,marginBottom:6}}>💬 やり取り履歴（直近5件）</div>
                  {commLog.slice(0,5).map(l=>{
                    const mIcon={"電話":"📞","メール":"✉️","LINE":"💬","対面":"🤝","郵送":"📮","その他":"📝"}[l.method]||"📝";
                    return(
                      <div key={l.id} style={{padding:"4px 0",borderBottom:"0.5px solid rgba(0,0,0,0.05)"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1}}>
                          <span style={{fontSize:10,color:"#999"}}>{l.date}</span>
                          <span style={{fontSize:10}}>{mIcon} {l.method}</span>
                          {l.contact_name&&<span style={{fontSize:10,color:"#534AB7",fontWeight:500}}>{l.contact_name}</span>}
                        </div>
                        <div style={{fontSize:11,color:"#444"}}>{l.content}</div>
                      </div>
                    );
                  })}
                </div>}
                {/* 備考 */}
                {cs.notes&&<div><div style={{fontSize:10,color:"#999"}}>備考</div><div style={{fontSize:12,whiteSpace:"pre-wrap"}}>{cs.notes}</div></div>}
              </div>
              <div style={{padding:"10px 18px",borderTop:"0.5px solid rgba(0,0,0,0.08)",display:"flex",justifyContent:"flex-end",gap:8}}>
                {onNavigateCase&&<button onClick={()=>{setModalCase(null);onNavigateCase(cs.case_id);}} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#185FA5",fontWeight:500}}>案件管理で開く →</button>}
                <button onClick={()=>setModalCase(null)} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>閉じる</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function TabWorkHistory({c,editMode,update,companies}){
  // クライアントの会社→都道府県解決
  const companyList=companies||COMPANY_DB;
  const clientCo=companyList.find(co=>co.name===c.company_name);
  const clientPref=clientCo?.pref||"";

  // 基本情報の勤務先を「現職」として職歴に自動同期
  useEffect(()=>{
    if(!c.company_name||!c.work_start_date||c.work_start_date==="未定")return;
    if(c.client_status==="resigned"||c.client_status==="returned")return;
    const has=(c.work_history||[]).some(w=>w.company_name===c.company_name&&!w.end_date);
    if(has)return;
    const newW={
      id:"W"+Date.now(),
      company_name:c.company_name,
      country:"日本",
      start_date:c.work_start_date,
      end_date:null,
      job_title:""
    };
    update("work_history",[...(c.work_history||[]),newW]);
  },[c.company_name,c.work_start_date,c.client_status]);

  const total=c.work_history.reduce((s,w)=>{const m=calcMonths(w.start_date,w.end_date);return s+(isNaN(m)?0:m);},0);
  const totalJP=c.work_history.filter(w=>(w.country||"日本")==="日本").reduce((s,w)=>{const m=calcMonths(w.start_date,w.end_date);return s+(isNaN(m)?0:m);},0);
  const totalOverseas=total-totalJP;
  const overseasCountries=[...new Set(c.work_history.filter(w=>w.country&&w.country!=="日本").map(w=>w.country))];
  const sortedWork=[...c.work_history].sort((a,b)=>(b.start_date||"").localeCompare(a.start_date||""));
  const [addingWork,setAddingWork]=useState(false);
  const [editWorkId,setEditWorkId]=useState(null);
  const [addSalaryFor,setAddSalaryFor]=useState(null);
  const [editSalaryId,setEditSalaryId]=useState(null);
  const [wf,setWf]=useState({});
  const [sf,setSf]=useState({});

  const inputS={fontSize:12,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg)",width:"100%"};
  const btnS={fontSize:11,padding:"4px 10px",borderRadius:5,cursor:"pointer",border:"0.5px solid var(--border)",background:"transparent",color:"var(--text2)"};

  function resetWork(){setWf({});setAddingWork(false);setEditWorkId(null);}
  function startAddWork(){setWf({company_name:"",country:"日本",start_date:"",end_date:"",job_title:"",init_monthly_salary:"",init_weekly_hours:40,init_employment_type:"正社員",init_pref:clientPref||"東京都"});setAddingWork(true);setEditWorkId(null);}
  function startEditWork(w){setWf({...w});setEditWorkId(w.id);setAddingWork(false);}
  function saveWork(){
    if(!wf.company_name||!wf.start_date)return;
    const w2={...wf};
    delete w2.init_monthly_salary;
    delete w2.init_weekly_hours;
    delete w2.init_employment_type;
    delete w2.init_pref;
    if(w2.start_date) w2.start_date=sanitizeDate(w2.start_date);
    if(w2.end_date) w2.end_date=sanitizeDate(w2.end_date);
    if(editWorkId){
      update("work_history",c.work_history.map(w=>w.id===editWorkId?{...w,...w2}:w));
    }else{
      const newId="W"+Date.now();
      const newWork={...w2,id:newId};
      update("work_history",[...c.work_history,newWork]);
      // 給与情報が入力されていれば同時登録
      if(wf.init_monthly_salary&&Number(wf.init_monthly_salary)>0){
        const monthly=Number(wf.init_monthly_salary)||0;
        const weeklyH=Number(wf.init_weekly_hours)||40;
        const pref=wf.init_pref||"東京都";
        const hourlyForCheck=calcHourlyFromMonthly(monthly,weeklyH);
        const minCheck=checkMinWage(hourlyForCheck,pref,loadMinWages());
        const newSalary={
          id:"S"+Date.now(),
          work_id:newId,
          effective_date:newWork.start_date,
          monthly_salary:monthly,
          hourly_wage:0,
          weekly_hours:weeklyH,
          employment_type:wf.init_employment_type||"正社員",
          pref:pref,
          min_wage_check:minCheck
        };
        update("salary_history",[...(c.salary_history||[]),newSalary]);
      }
    }
    resetWork();
  }
  function deleteWork(id){
    if(!confirm("この職歴を削除しますか？\n紐づく給与履歴も削除されます。"))return;
    update("work_history",c.work_history.filter(w=>w.id!==id));
    update("salary_history",c.salary_history.filter(s=>s.work_id!==id));
  }

  function resetSalary(){setSf({});setAddSalaryFor(null);setEditSalaryId(null);}
  function startAddSalary(workId){const w=c.work_history.find(x=>x.id===workId);const wCo=w?companyList.find(co=>co.name===w.company_name):null;setSf({effective_date:w?.start_date||"",monthly_salary:"",hourly_wage:"",weekly_hours:40,employment_type:"正社員",min_wage_check:true,pref:wCo?.pref||clientPref||"東京都"});setAddSalaryFor(workId);setEditSalaryId(null);}
  function startEditSalary(s){setSf({...s});setEditSalaryId(s.id);setAddSalaryFor(s.work_id);}
  function saveSalary(){
    if(!sf.effective_date||!addSalaryFor)return;
    const effDate=sanitizeDate(sf.effective_date)||sf.effective_date;
    const monthly=Number(sf.monthly_salary)||0;
    const weeklyH=Number(sf.weekly_hours)||0;
    const autoHourly=calcHourlyFromMonthly(monthly,weeklyH);
    const hourly=autoHourly||Number(sf.hourly_wage)||0;
    const pref=sf.pref||"";
    const minCheck=checkMinWage(hourly,pref,loadMinWages());
    const entry={...sf,effective_date:effDate,monthly_salary:monthly,hourly_wage:hourly,weekly_hours:weeklyH,min_wage_check:minCheck,pref,work_id:addSalaryFor};
    if(editSalaryId){
      update("salary_history",c.salary_history.map(s=>s.id===editSalaryId?{...s,...entry}:s));
    }else{
      update("salary_history",[...c.salary_history,{...entry,id:"S"+Date.now()}]);
    }
    resetSalary();
  }
  function deleteSalary(id){update("salary_history",c.salary_history.filter(s=>s.id!==id));}

  const workFormJSX=(
    <div style={{background:"var(--bg)",border:"0.5px solid var(--accent)",borderRadius:8,padding:12,marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:500,color:"var(--accent-text)",marginBottom:8}}>{editWorkId?"職歴編集":"職歴追加"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:8,marginBottom:8}}>
        <div><div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>会社名・店名</div><IMEInput value={wf.company_name||""} onChange={v=>setWf(p=>({...p,company_name:v}))} style={inputS}/></div>
        <div><div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>国</div><select value={wf.country||"日本"} onChange={e=>setWf(p=>({...p,country:e.target.value}))} style={inputS}><option value="日本">🇯🇵 日本</option><option value="ネパール">🇳🇵 ネパール</option><option value="インド">🇮🇳 インド</option><option value="中国">🇨🇳 中国</option><option value="ベトナム">🇻🇳 ベトナム</option><option value="フィリピン">🇵🇭 フィリピン</option><option value="ミャンマー">🇲🇲 ミャンマー</option><option value="バングラデシュ">🇧🇩 バングラデシュ</option><option value="スリランカ">🇱🇰 スリランカ</option></select></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <div><div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>開始日</div><input type="date" max="9999-12-31" min="1900-01-01" value={wf.start_date||""} onChange={e=>setWf(p=>({...p,start_date:e.target.value}))} style={inputS}/></div>
        <div><div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>終了日（空欄=在職中）</div><input type="date" max="9999-12-31" min="1900-01-01" value={wf.end_date||""} onChange={e=>setWf(p=>({...p,end_date:e.target.value}))} style={inputS}/></div>
        <div><div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>職種</div><IMEInput value={wf.job_title||""} onChange={v=>setWf(p=>({...p,job_title:v}))} placeholder="調理師" style={inputS}/></div>
      </div>
      {!editWorkId&&(
        <div style={{background:"#FEFAF3",border:"0.5px solid #EF9F27",borderRadius:6,padding:10,marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:500,color:"#854F0B",marginBottom:6}}>💴 給与情報を同時登録（任意）</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 100px",gap:6}}>
            <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>月給</div><input type="number" value={wf.init_monthly_salary||""} onChange={e=>setWf(p=>({...p,init_monthly_salary:e.target.value}))} placeholder="例: 200000" style={{...inputS,fontSize:11,textAlign:"right"}}/></div>
            <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>週時間</div><input type="number" value={wf.init_weekly_hours||""} onChange={e=>setWf(p=>({...p,init_weekly_hours:e.target.value}))} style={{...inputS,fontSize:11,textAlign:"right"}}/></div>
            <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>雇用形態</div><select value={wf.init_employment_type||"正社員"} onChange={e=>setWf(p=>({...p,init_employment_type:e.target.value}))} style={{...inputS,fontSize:11}}><option>正社員</option><option>パート</option><option>アルバイト</option></select></div>
            <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>勤務地</div><select value={wf.init_pref||"東京都"} onChange={e=>setWf(p=>({...p,init_pref:e.target.value}))} style={{...inputS,fontSize:11}}>{loadMinWages().map(w=><option key={w.pref} value={w.pref}>{w.pref}</option>)}</select></div>
          </div>
          <div style={{fontSize:9,color:"var(--text3)",marginTop:6}}>※ 月給を入れて保存すると、職歴と一緒に給与履歴にも自動登録されます。空欄なら職歴のみ登録。</div>
        </div>
      )}
      <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
        <button onClick={resetWork} style={btnS}>キャンセル</button>
        <button onClick={saveWork} disabled={!wf.company_name||!wf.start_date} style={{...btnS,background:"var(--accent-bg)",color:"var(--accent-text)",borderColor:"var(--accent)",opacity:(!wf.company_name||!wf.start_date)?0.4:1}}>保存</button>
      </div>
    </div>
  );

  const sfPref=sf.pref||"";
  const sfAutoHourly=calcHourlyFromMonthly(Number(sf.monthly_salary)||0,Number(sf.weekly_hours)||0);
  // 月給+週時間があれば自動計算優先。月給なしなら時給欄を使う
  const sfHourlyForCheck=sfAutoHourly||Number(sf.hourly_wage)||0;
  const sfMinWages=loadMinWages();
  const sfMinCheck=checkMinWage(sfHourlyForCheck,sfPref,sfMinWages);
  const sfPrefWage=getMinWageForPref(sfPref,sfMinWages);

  const salaryFormJSX=(
    <div style={{background:"#FEFAF3",border:"0.5px solid #EF9F27",borderRadius:6,padding:10,marginTop:6}}>
      <div style={{fontSize:10,fontWeight:500,color:"#854F0B",marginBottom:6}}>{editSalaryId?"給与編集":"給与追加"}</div>
      <div style={{display:"grid",gridTemplateColumns:"100px 1fr 1fr 80px 90px 100px",gap:6,marginBottom:6}}>
        <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>適用日</div><input type="date" max="9999-12-31" min="1900-01-01" value={sf.effective_date||""} onChange={e=>setSf(p=>({...p,effective_date:e.target.value}))} style={{...inputS,fontSize:11}}/></div>
        <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>月給</div><input type="number" value={sf.monthly_salary||""} onChange={e=>setSf(p=>({...p,monthly_salary:e.target.value}))} style={{...inputS,fontSize:11,textAlign:"right"}}/></div>
        <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>時給（月給なしの場合）</div><input type="number" value={sf.hourly_wage||""} onChange={e=>setSf(p=>({...p,hourly_wage:e.target.value}))} placeholder={sfAutoHourly?"自動: ¥"+sfAutoHourly:""} style={{...inputS,fontSize:11,textAlign:"right"}}/></div>
        <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>週時間</div><input type="number" value={sf.weekly_hours||""} onChange={e=>setSf(p=>({...p,weekly_hours:e.target.value}))} style={{...inputS,fontSize:11,textAlign:"right"}}/></div>
        <div><div style={{fontSize:9,color:"var(--text3)",marginBottom:2}}>雇用形態</div><select value={sf.employment_type||"正社員"} onChange={e=>setSf(p=>({...p,employment_type:e.target.value}))} style={{...inputS,fontSize:11}}><option>正社員</option><option>パート</option><option>アルバイト</option></select></div>
        <div><div style={{fontSize:9,color:sf.pref?"var(--text3)":"#A32D2D",marginBottom:2}}>勤務地{!sf.pref&&" ⚠"}</div><select value={sf.pref||""} onChange={e=>setSf(p=>({...p,pref:e.target.value}))} style={{...inputS,fontSize:11,borderColor:sf.pref?"rgba(0,0,0,0.15)":"#A32D2D"}}><option value="">選択してください</option>{loadMinWages().map(w=><option key={w.pref} value={w.pref}>{w.pref}</option>)}</select></div>
      </div>
      {/* 自動計算プレビュー */}
      {sfHourlyForCheck>0&&(
        <div style={{display:"flex",gap:10,alignItems:"center",padding:"6px 8px",borderRadius:5,background:sfMinCheck===false?"#FCEBEB":sfMinCheck===true?"#EAF3DE":"#F5F5F3",marginBottom:6,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"var(--text)"}}>{sfAutoHourly?"時給換算":"時給"}: <strong>¥{sfHourlyForCheck.toLocaleString()}</strong></span>
          {sfAutoHourly&&<span style={{fontSize:10,color:"var(--text3)"}}>({fmt(Number(sf.monthly_salary))}÷週{sf.weekly_hours}h)</span>}
          {sfPref&&sfPrefWage?(
            <>
              <span style={{fontSize:10,color:"var(--text2)"}}>{sfPref}最賃: ¥{sfPrefWage.toLocaleString()}</span>
              <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,fontWeight:500,background:sfMinCheck?"#EAF3DE":"#FCEBEB",color:sfMinCheck?"#3B6D11":"#A32D2D"}}>{sfMinCheck?"最賃OK":"⚠ 最賃割れ"}</span>
              {sfMinCheck===false&&<span style={{fontSize:10,color:"#A32D2D"}}>差額 ¥{(sfPrefWage-sfHourlyForCheck).toLocaleString()}/h</span>}
            </>
          ):(
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,fontWeight:500,background:"#FAEEDA",color:"#854F0B"}}>⚠ 照合不能（勤務地が未設定）</span>
          )}
        </div>
      )}
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <div style={{flex:1}}/>
        <button onClick={resetSalary} style={{...btnS,fontSize:10,padding:"3px 8px"}}>キャンセル</button>
        <button onClick={saveSalary} disabled={!sf.effective_date} style={{...btnS,fontSize:10,padding:"3px 8px",background:"#FAEEDA",color:"#854F0B",borderColor:"#EF9F27",opacity:!sf.effective_date?0.4:1}}>保存</button>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {total>0&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:3,background:"#EAF3DE",color:"#3B6D11"}}>合計 {fmtMonths(total)}{totalJP>0&&" ／ 🇯🇵 内日本 "+fmtMonths(totalJP)}{totalOverseas>0&&" ／ 🌏 "+(overseasCountries.join("・"))+" "+fmtMonths(totalOverseas)}</span>}
          {editMode&&!addingWork&&!editWorkId&&<button onClick={startAddWork} style={{...btnS,background:"var(--accent-bg)",color:"var(--accent-text)",borderColor:"var(--accent)"}}>＋ 職歴追加</button>}
        </div>
      </div>
      {(addingWork||editWorkId)&&!editWorkId&&workFormJSX}
      {sortedWork.length===0&&!addingWork?(
        <div style={{fontSize:12,color:"var(--text3)",background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:10,padding:14}}>職歴データなし</div>
      ):sortedWork.map(w=>{
        const salaries=c.salary_history.filter(s=>s.work_id===w.id).sort((a,b)=>(b.effective_date||"").localeCompare(a.effective_date||""));
        const isEditingThis=editWorkId===w.id;
        return(
          <div key={w.id} style={{background:"var(--bg)",border:isEditingThis?"0.5px solid var(--accent)":"0.5px solid var(--border)",borderRadius:10,padding:"14px 16px",marginBottom:12}}>
            {isEditingThis?workFormJSX:(
              <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:salaries.length>0||addSalaryFor===w.id?10:0}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:w.end_date?"#ccc":"#1D9E75",marginTop:5,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--text)",display:"flex",alignItems:"center",gap:8}}>
                    {w.company_name}
                    {!w.end_date&&<span style={{fontSize:10,padding:"2px 6px",background:"#E1F5EE",color:"#0F6E56",borderRadius:3}}>現職</span>}
                    {editMode&&<span style={{display:"flex",gap:3,marginLeft:"auto"}}>
                      <button onClick={()=>startEditWork(w)} style={{fontSize:10,padding:"2px 6px",borderRadius:3,border:"0.5px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text3)"}}>編集</button>
                      <button onClick={()=>deleteWork(w.id)} style={{fontSize:10,padding:"2px 6px",borderRadius:3,border:"0.5px solid #A32D2D",background:"transparent",cursor:"pointer",color:"#A32D2D"}}>削除</button>
                    </span>}
                  </div>
                  <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>
                    {w.job_title} · {w.start_date} 〜 {w.end_date||"現在"} ({fmtMonths(calcMonths(w.start_date,w.end_date))}) <span style={{display:"inline-block",fontSize:10,padding:"1px 5px",borderRadius:3,marginLeft:4,background:(w.country||"日本")==="日本"?"#DBEAFE":"#FEF3C7",color:(w.country||"日本")==="日本"?"#1E40AF":"#92400E"}}>{(w.country||"日本")==="日本"?"🇯🇵 日本":"🌏 "+w.country}</span>
                  </div>
                </div>
              </div>
            )}
            {/* 給与一覧 */}
            {salaries.length>0&&!isEditingThis?(
              <div style={{marginLeft:16,borderLeft:"2px solid var(--border)",paddingLeft:10}}>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,letterSpacing:"0.04em"}}>給与履歴</div>
                {salaries.map((s,i)=>{
                  const calc=s.monthly_salary&&s.weekly_hours?Math.round(s.monthly_salary/(s.weekly_hours*(365/7/12))):null;
                  return(
                    <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:5,background:i===0?"var(--bg2)":"transparent",marginBottom:3}}>
                      <span style={{fontSize:10,color:"var(--text3)",minWidth:84}}>{s.effective_date}〜</span>
                      <span style={{flex:1,fontSize:12,fontWeight:i===0?500:400,color:"var(--text)"}}>
                        {s.monthly_salary?"月給 ¥"+s.monthly_salary.toLocaleString():""}
                        {s.hourly_wage?" / 時給 ¥"+s.hourly_wage.toLocaleString():""}
                        <span style={{fontSize:10,color:"var(--text2)"}}> {s.employment_type} 週{s.weekly_hours}h</span>
                      </span>
                      {calc&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"#E6F1FB",color:"#185FA5"}}>換算 ¥{calc.toLocaleString()}/h</span>}
                      <span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:s.min_wage_check===true?"#EAF3DE":s.min_wage_check===false?"#FCEBEB":"#FAEEDA",color:s.min_wage_check===true?"#3B6D11":s.min_wage_check===false?"#A32D2D":"#854F0B"}}>{s.min_wage_check===true?"最賃OK":s.min_wage_check===false?"要確認":"照合不能"}</span>
                      {editMode&&<>
                        <button onClick={()=>startEditSalary(s)} style={{fontSize:9,padding:"1px 5px",borderRadius:3,border:"0.5px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text3)"}}>編集</button>
                        <button onClick={()=>deleteSalary(s.id)} style={{fontSize:9,padding:"1px 5px",borderRadius:3,border:"0.5px solid #A32D2D",background:"transparent",cursor:"pointer",color:"#A32D2D"}}>✕</button>
                      </>}
                    </div>
                  );
                })}
              </div>
            ):!isEditingThis&&salaries.length===0?<div style={{marginLeft:16,fontSize:11,color:"var(--text3)"}}>給与データなし</div>:null}
            {/* 給与追加/編集フォーム */}
            {addSalaryFor===w.id&&salaryFormJSX}
            {/* 給与追加ボタン */}
            {editMode&&!isEditingThis&&addSalaryFor!==w.id&&(
              <div style={{marginLeft:16,marginTop:6}}>
                <button onClick={()=>startAddSalary(w.id)} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:"0.5px solid #EF9F27",background:"transparent",cursor:"pointer",color:"#854F0B"}}>＋ 給与追加</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ClientLedger({data,setData,navigateClientId,clearNavigate,onNavigateToCase}){
  const isMobile=useMobile();
  const clients=data.clients;
  const setClients=useCallback(fn=>{
    setData(prev=>{const nc=typeof fn==="function"?fn(prev.clients):fn; return{...prev,clients:nc};});
  },[setData]);

  const [selected,setSelected]=useState(()=>{
    if(navigateClientId){const t=data.clients.find(c=>c.client_id===navigateClientId);if(t)return t;}
    return clients[0]||null;
  });
  const [showDetail,setShowDetail]=useState(()=>!!navigateClientId);
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("全て");
  const [showArchived,setShowArchived]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [editData,setEditData]=useState(null);
  const [tab,setTab]=useState("基本情報");
  const [poiReading,setPoiReading]=useState(false);
  const [poiError,setPoiError]=useState(null);
  const [poiResult,setPoiResult]=useState(null);
  const [poiDragOver,setPoiDragOver]=useState(false);

  // ポイポイ式：ファイル処理の共通関数（ボタン・D&D両方から呼ばれる）
  const processPoipoiFiles=async(files)=>{
    if(!files||files.length===0)return;
    const apiKey=(data.office||{}).api_key;
    if(!apiKey){alert("APIキーが設定されていません。\nマスター管理 → 🏠事務所設定 → 🤖AI設定 から設定してください。");return;}
    if(!editMode){alert("編集モードにしてからお使いください。");return;}
      setPoiReading(true);setPoiError(null);setPoiResult(null);
      let totalFilled=[];
      let lastResult=null;
      let processedCount=0;
      const t=document.getElementById("toast");
      // 先勝ち管理：editDataはReact stateで非同期更新のため、ローカルで追跡
      const alreadyFilled={};
      const ed0=editData||{};
      let localWorkHistory=Array.isArray(ed0.work_history)?[...ed0.work_history]:[];
      const MERGE_FIELDS=["name_roman","name_kana","nationality","dob","gender","phone","email","postal_code","address","residence_status","residence_expiry","residence_card","passport_number","passport_expiry","company_name","store","work_start_date"];
      MERGE_FIELDS.forEach(f=>{if(ed0[f]) alreadyFilled[f]=true;});
      try{
        for(let fi=0;fi<files.length;fi++){
          const f=files[fi];
          if(t&&files.length>1){t.textContent=`📷 読取中… (${fi+1}/${files.length}) ${f.name}`;t.style.opacity=1;}
          // Excel判定
          const isExcel=/\.(xlsx|xls|csv)$/i.test(f.name)||f.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||f.type==="application/vnd.ms-excel"||f.type==="text/csv";
          let base64,mediaType;
          if(isExcel&&window.XLSX){
            // SheetJSでExcelをテキスト化→テキストとしてAPI送信
            const ab=await f.arrayBuffer();
            const wb=XLSX.read(ab,{type:"array"});
            let allText="";
            wb.SheetNames.forEach(sn=>{
              const ws=wb.Sheets[sn];
              allText+=`\n【シート: ${sn}】\n`+XLSX.utils.sheet_to_csv(ws,{FS:"\t"});
            });
            // テキストとして送る（画像でもPDFでもなく）
            const resp=await fetch("https://api.anthropic.com/v1/messages",{
              method:"POST",
              headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
              body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,
                messages:[{role:"user",content:`以下はExcelファイル「${f.name}」の内容です。在留申請書や入管関連書類から読み取れる情報をすべてJSON形式で返してください。余計なテキストは一切不要です。\n\n以下のフィールドを持つJSONを返してください。読み取れない項目はnullにしてください。\n{"name_roman":"ローマ字氏名","name_kana":"カタカナ氏名","nationality":"国籍","date_of_birth":"YYYY-MM-DD","gender":"男 or 女","phone":"電話番号","email":"メールアドレス","postal_code":"郵便番号（ハイフンなし7桁）","address":"住所","residence_status":"在留資格","residence_expiry":"YYYY-MM-DD","residence_card":"在留カード番号","passport_number":"パスポート番号","passport_expiry":"YYYY-MM-DD","company_name":"勤務先","store":"支店名","work_start_date":"YYYY-MM-DD","work_history":[{"company":"勤務先名","country":"国名","start":"YYYY-MM","end":"YYYY-MM"}],"company_info":{"corporate_number":"法人番号","employment_insurance_number":"雇用保険適用事業所番号","capital":"資本金","annual_revenue":"年間売上高","employee_count":"従業員数","foreign_employee_count":"外国人職員数","address":"所在地","phone":"電話番号"}}\n\n【データ】\n${allText}`}]
              })
            });
            if(!resp.ok){const e=await resp.text();throw new Error(`API Error ${resp.status}: ${e}`);}
            const rd=await resp.json();
            const txt=rd.content.map(b=>b.text||"").join("");
            const jm=txt.match(/\{[\s\S]*\}/);
            if(!jm) throw new Error(`${f.name}: 読み取り結果を解析できませんでした`);
            lastResult=JSON.parse(jm[0]);
          } else {
            base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
            const isPDF=f.type==="application/pdf"||f.name.toLowerCase().endsWith(".pdf");
            mediaType=isPDF?"application/pdf":(f.type||"image/jpeg");
            if(!isPDF&&!mediaType.startsWith("image/")) mediaType="image/jpeg";
            lastResult=await readDocument(base64,mediaType,apiKey);
          }
          // 結果をマージ（後のファイルで上書き、ただしnullは上書きしない）
          if(lastResult){
            // 先勝ちマージ：ローカル変数で追跡し、既に埋まったフィールドは上書きしない
            const FIELD_MAP={"name_roman":"name_roman","name_kana":"name_kana","nationality":"nationality","date_of_birth":"dob","gender":"gender","phone":"phone","email":"email","postal_code":"postal_code","address":"address","residence_status":"residence_status","residence_expiry":"residence_expiry","residence_card":"residence_card","passport_number":"passport_number","passport_expiry":"passport_expiry","company_name":"company_name","store":"store","work_start_date":"work_start_date"};
            Object.entries(FIELD_MAP).forEach(([src,dst])=>{
              if(lastResult[src] && !alreadyFilled[dst]){
                update(dst,lastResult[src]);
                alreadyFilled[dst]=true;
              }
            });
            // 職歴だけは累積（ローカル変数で追跡して正しく追加）
            if(lastResult.work_history&&Array.isArray(lastResult.work_history)&&lastResult.work_history.length>0){
              const newEntries=lastResult.work_history.map((w,i)=>({
                id:"wh-poi-"+Date.now()+"-"+fi+"-"+i,company_name:w.company||"",country:w.country||"",
                start_date:w.start?w.start+"-01":"",end_date:w.end?w.end+"-01":"",
              }));
              localWorkHistory=[...localWorkHistory,...newEntries];
              update("work_history",localWorkHistory);
            }

            const filled=Object.entries(lastResult).filter(([k,v])=>v!==null&&k!=="work_history"&&k!=="company_info").map(([k])=>k);
            totalFilled=[...totalFilled,...filled];
            processedCount++;
          }
        }
        const uniqueFilled=[...new Set(totalFilled)];
        setPoiResult({filled:uniqueFilled,result:lastResult});
        if(t){t.textContent=files.length>1?`📷 ${files.length}件の書類を読み取りました！（${uniqueFilled.length}項目）`:`📷 書類を読み取りました！（${uniqueFilled.length}項目）`;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
      }catch(e){
        console.error("ポイポイ式エラー:",e);
        setPoiError(e.message||"読み取りに失敗しました");
        if(processedCount>0&&t){t.textContent=`⚠️ ${processedCount}件読取済・エラー発生: ${e.message}`;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,4000);}
      }finally{setPoiReading(false);}
  };

  // ポイポイ式：ボタンクリック（ファイル選択ダイアログ）
  const handlePoipoi=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept="image/*,.pdf,.xlsx,.xls,.csv";inp.capture="environment";inp.multiple=true;
    inp.onchange=async(ev)=>{const files=Array.from(ev.target.files||[]);await processPoipoiFiles(files);};
    inp.click();
  };

  // ポイポイ式：ドラッグ&ドロップ
  const handlePoiDragOver=(e)=>{e.preventDefault();e.stopPropagation();if(editMode&&!poiReading)setPoiDragOver(true);};
  const handlePoiDragLeave=(e)=>{e.preventDefault();e.stopPropagation();setPoiDragOver(false);};
  const handlePoiDrop=async(e)=>{
    e.preventDefault();e.stopPropagation();setPoiDragOver(false);
    if(!editMode){alert("編集モードにしてからお使いください。");return;}
    const files=Array.from(e.dataTransfer.files||[]);
    await processPoipoiFiles(files);
  };

  useEffect(()=>{
    if(navigateClientId){
      const t=clients.find(c=>c.client_id===navigateClientId);
      if(t){setSelected(t);setEditMode(false);setEditData(null);setTab("基本情報");setSearch("");setFilterStatus("全て");}
      if(clearNavigate)clearNavigate();
    }
  },[navigateClientId]);

  const statusList=["全て","🛂 入管","📄 一般",...new Set(clients.filter(c=>!c.archived&&c.client_type!=="general").map(c=>c.residence_status))];
  const filtered=clients.filter(c=>{
    if(!showArchived&&c.archived)return false;
    const q=search.toLowerCase();
    const matchQ=(!q||(c.name_roman||"").toLowerCase().includes(q)||(c.name_kana||"").toLowerCase().includes(q)||(c.company_name||"").toLowerCase().includes(q)||(c.store||"").toLowerCase().includes(q));
    if(filterStatus==="全て") return matchQ;
    if(filterStatus==="🛂 入管") return matchQ&&c.client_type!=="general";
    if(filterStatus==="📄 一般") return matchQ&&c.client_type==="general";
    return matchQ&&c.client_type!=="general"&&c.residence_status===filterStatus;
  });
  const alertClients=clients.filter(c=>{
    if(c.archived||c.client_type==="general"||c.residence_status==="家族滞在"||c.client_status==="returned")return false;
    const d=getEffectiveDays(c,data.cases); return d!==null&&d<=90;
  }).sort((a,b)=>getEffectiveDays(a,data.cases)-getEffectiveDays(b,data.cases));

  function startEdit(){setEditData(JSON.parse(JSON.stringify(selected)));setEditMode(true);}
  function cancelEdit(){
    // 名前未入力の新規クライアントはキャンセル時に削除
    if(editData && !editData.name_roman){
      setClients(prev=>prev.filter(c=>c.client_id!==editData.client_id));
      setSelected(clients.find(c=>c.client_id!==editData.client_id)||null);
    }
    setEditMode(false);setEditData(null);
  }
  function saveEdit(){
    const d={...editData};
    // 全日付フィールドをsanitize
    ["dob","entry_date","residence_expiry","passport_expiry","work_start_date"].forEach(f=>{
      if(d[f]&&d[f]!=="未定") d[f]=sanitizeDate(d[f]);
    });
    (d.work_history||[]).forEach(w=>{
      if(w.start_date) w.start_date=sanitizeDate(w.start_date);
      if(w.end_date) w.end_date=sanitizeDate(w.end_date);
    });
    (d.salary_history||[]).forEach(s=>{
      if(s.effective_date) s.effective_date=sanitizeDate(s.effective_date);
    });
    // 基本情報 → work_history 自動同期
    if(d.company_name && d.work_start_date && d.work_start_date!=="未定"){
      const wh=d.work_history||[];
      const currentWork=wh.find(w=>w.company_name===d.company_name && !w.end_date);
      if(currentWork){
        // 既存の現在勤務 → start_dateを同期
        d.work_history=wh.map(w=>w.id===currentWork.id?{...w,start_date:d.work_start_date,company_name:d.company_name,country:w.country||"日本",job_title:w.job_title||"調理師"}:w);
      }else{
        // 現在勤務が無い → 自動生成
        d.work_history=[...wh,{id:"W"+Date.now(),company_name:d.company_name,country:"日本",start_date:d.work_start_date,end_date:null,job_title:"調理師"}];
      }
    }
    setClients(prev=>prev.map(c=>c.client_id===d.client_id?d:c));setSelected(d);setEditMode(false);setEditData(null);
  }
  function update(f,v){setEditData(p=>({...p,[f]:v}));}
  function archiveClient(){setClients(prev=>prev.map(c=>c.client_id===selected.client_id?{...c,archived:!c.archived}:c));setEditMode(false);}
  function handleSelectClient(c){
    if(editMode&&editData){
      if(!confirm("編集中の内容が保存されていません。破棄しますか？"))return;
      // 名前未入力の新規クライアントは破棄時に削除
      if(!editData.name_roman){
        setClients(prev=>prev.filter(x=>x.client_id!==editData.client_id));
      }
    }
    setSelected(c);setEditMode(false);setEditData(null);setTab("基本情報");
    if(isMobile) setShowDetail(true);
  }
  function handleAddClient(){
    if(editMode&&editData){
      if(!confirm("編集中の内容が保存されていません。破棄しますか？"))return;
      if(!editData.name_roman){
        setClients(prev=>prev.filter(x=>x.client_id!==editData.client_id));
      }
    }
    const newId="C"+Date.now();
    const newClient={
      client_id:newId, client_type:"immigration", name_roman:"", name_kana:"", nationality:"ネパール", dob:"", gender:"男",
      passport_number:"", passport_expiry:"", entry_date:"", residence_card:"",
      residence_status:"技能", residence_expiry:"", phone:"", email:"",
      company_name:"", store:"", work_start_date:"", notes:"", address:"", postal_code:"",
      dependent_of:null, client_status:"active", relationship:null, school_name:null,
      photo:null, archived:false, salary_history:[], work_history:[],
      drive_path:"", drive_url:""
    };
    setClients(prev=>[newClient,...prev]);
    setSelected(newClient);
    setEditData(newClient);
    setEditMode(true);
    setTab("基本情報");
    if(isMobile) setShowDetail(true);
  }
  function handleDeleteClient(){
    if(!selected) return;
    const deps=clients.filter(x=>x.dependent_of===selected.client_id&&!x.archived);
    const caseCount=data.cases.filter(c=>c.client_id===selected.client_id).length;
    let msg=`「${selected.name_roman||"新規クライアント"}」を削除しますか？`;
    if(caseCount>0) msg+=`\n\n⚠ 関連する案件が${caseCount}件あります。`;
    if(deps.length>0) msg+=`\n⚠ 扶養家族が${deps.length}名います。`;
    if(!confirm(msg)) return;
    setClients(prev=>prev.filter(c=>c.client_id!==selected.client_id));
    setSelected(clients.find(c=>c.client_id!==selected.client_id)||null);
    setEditMode(false);setEditData(null);
  }

  // Keep selected in sync with clients
  const cur=editMode?editData:(clients.find(c=>c.client_id===selected?.client_id)||null);
  const depsForAlert=(c)=>clients.filter(x=>x.dependent_of===c.client_id&&!x.archived);

  function getTabs(c){
    if(!c)return["基本情報","在留・パスポート","案件履歴","職歴・給与"];
    if(c.client_type==="general") return["基本情報","案件履歴"];
    if(c.residence_status==="家族滞在") return["基本情報","扶養者","在留・パスポート","案件履歴","職歴・給与"];
    const deps=clients.filter(x=>x.dependent_of===c.client_id&&!x.archived);
    if(deps.length>0) return["基本情報","扶養家族","在留・パスポート","案件履歴","職歴・給与"];

                  {cur.residence_card&&<span style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace"}}>🪪 {cur.residence_card}</span>}
                  {(()=>{const tk=getTokureiInfo(cur,data.cases);if(tk.isTokurei)return <span style={{fontSize:11,color:"#5B2D8E"}}>特例〜{tk.tokureiExpiry.replace(/-/g,"/")} <AlertBadge days={getDays(cur.residence_expiry)} tokurei={tk}/></span>;if(cur.residence_expiry)return <span style={{fontSize:11,color:"var(--text2)"}}>〜{cur.residence_expiry.replace(/-/g,"/")} <AlertBadge days={getDays(cur.residence_expiry)}/></span>;return null;})()}</>}

              {tab==="職歴・給与"&&<TabWorkHistory c={cur} editMode={editMode} update={update} companies={data.companies}/>}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function TemplatePreviewModal({templateId,onClose}){
  const tmpl=TEMPLATES[templateId];
  if(!tmpl)return null;
  const groups=[...new Set(tmpl.docs.map(d=>d.group))];
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>

          <div>
            <div style={{fontSize:14,fontWeight:500}}>{tmpl.label}</div>
            {tmpl.note&&<div style={{fontSize:11,color:"#854F0B",marginTop:2}}>{tmpl.note}</div>}

          <button onClick={onClose} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
        </div>

          <div style={{fontSize:11,color:"#999",fontWeight:500,marginBottom:8}}>必要書類 {tmpl.docs.length}件</div>

            <div key={group||"none"} style={{marginBottom:8}}>
              {group&&<div style={{fontSize:11,color:"#999",fontWeight:500,marginBottom:4,paddingLeft:6,borderLeft:"2px solid #D3D1C7"}}>{group}</div>}
              {tmpl.docs.filter(d=>d.group===group).map(doc=>(
                <div key={doc.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:5,background:"var(--bg2)",marginBottom:3}}>
                  <div style={{width:14,height:14,borderRadius:3,border:"1px solid #ddd",background:"var(--bg)",flexShrink:0}}/>
                  <span style={{fontSize:12,color:"#444"}}>{doc.name}</span>

          <button onClick={onClose} style={{fontSize:12,padding:"5px 14px",cursor:"pointer",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"#666"}}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

        ws1["I45"] = {t:"s", v:"5年"};

        ws1["I48"] = {t:"s", v:"引き続き、"+(client.company_name||"会社")+"において調理業務に従事するため"};

      // ========== シート2: 申請人用２Ｎ ==========
      const ws2 = wb.Sheets["申請人用２Ｎ "];

        ws2["E9"] = {t:"s", v:client.company_name||""};
        ws2["W9"] = {t:"s", v:client.store||""};  // 支店名
        // 所在地
        ws2["F11"] = {t:"s", v:company.address||""};
        ws2["Z11"] = {t:"s", v:company.phone||""};
        // 取次者
        ws2["E74"] = {t:"s", v:office.representative||"長見　恵"};
        ws2["S74"] = {t:"s", v:office.address||"東京都立川市高松町１－３－４・２Ｆ"};
        ws2["C79"] = {t:"s", v:office.name||"ながみ行政書士事務所"};
        ws2["AA79"] = {t:"s", v:office.phone||"080-5170-5665"};

      // ========== シート3: 所属機関用１Ｎ ==========
      const ws3 = wb.Sheets["所属機関用１Ｎ "];
      if(ws3){

        ws3["G9"] = {t:"s", v:client.name_roman||""};
        ws3["S9"] = {t:"s", v:client.residence_card||""};  // 在留カード
        // 会社名
        ws3["G24"] = {t:"s", v:client.company_name||""};
        // 法人番号（13桁）
        if(company.corporate_number){
          const cn = company.corporate_number.toString();
          for(let i=0; i<13 && i<cn.length; i++){
            const col = String.fromCharCode(84+i);  // T=84
            ws3[col+"24"] = {t:"s", v:cn[i]};
          }
        }
        // 支店名
        ws3["J27"] = {t:"s", v:client.store||""};
        // 所在地
        ws3["H43"] = {t:"s", v:company.address||""};
        ws3["AB43"] = {t:"s", v:company.phone||""};
        // 資本金
        ws3["H46"] = {t:"s", v:company.capital||""};
        ws3["AC46"] = {t:"s", v:company.annual_sales||""};
        // 従業員数
        ws3["K49"] = {t:"n", v:company.employee_count||""};

        ws3["N51"] = {t:"n", v:company.foreign_employee_count||""};

      // Excel出力

  return(

            </div>}
            <div style={{fontSize:13,color:c.applicant?"var(--text3)":"#1a1a1a",fontWeight:c.applicant?400:500,marginBottom:3}}>{c.case_title}</div>

              <span style={{fontSize:12,color:"#666"}}>{client?.name_roman}</span>

              <span style={{fontSize:11,color:"#999"}}>·</span><span style={{fontSize:11,color:"#666"}}>{tmpl?.label}</span>
              <button onClick={()=>setShowPreview(true)} style={{fontSize:10,padding:"2px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid #378ADD",background:"#E6F1FB",color:"#185FA5"}}>書類一覧</button>
              <button onClick={exportOnlineExcel} style={{fontSize:10,padding:"2px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid #2E7D32",background:"#E8F5E9",color:"#2E7D32"}}>📤 申請CSV</button>
              <button onClick={exportPaperApplication} style={{fontSize:10,padding:"2px 8px",cursor:"pointer",borderRadius:4,border:"0.5px solid #D84315",background:"#FBE9E7",color:"#BF360C"}}>📄 紙の申請書</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <select value={c.status} onChange={e=>updateField("status",e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:6,border:"0.5px solid rgba(0,0,0,0.2)",background:"var(--bg2)",cursor:"pointer"}}>
              {[...new Set([...CASE_STATUS_LIST,c.status])].map(s=><option key={s}>{s}</option>)}
            </select>
            {onDelete&&<button onClick={onDelete} style={{fontSize:10,padding:"4px 10px",cursor:"pointer",borderRadius:5,border:"0.5px solid #A32D2D",background:"transparent",color:"#A32D2D"}}>🗑 削除</button>}
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:"#999",marginBottom:3}}>申請人</div>
          <input value={c.applicant||""} onChange={e=>updateField("applicant",e.target.value)} placeholder="申請人名（例: SAPKOTA DIPAK+BHAGAWATI）" style={{fontSize:13,padding:"5px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
          {[["受任日","accepted_date"],["申請日","applied_date"],["結果日","result_date"]].map(([label,field])=>(
            <div key={field}><div style={{fontSize:10,color:"#999",marginBottom:3}}>{label}</div>
              <input type="date" max="9999-12-31" min="1900-01-01" value={c[field]||""} onChange={e=>updateField(field,e.target.value||null)} style={{fontSize:12,padding:"4px 6px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>受付番号</div>
            <input value={c.receipt_number||""} onChange={e=>updateField("receipt_number",e.target.value)} placeholder="東オン認XXXXXXXX" style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",width:"100%"}}/></div>
          <div><div style={{fontSize:10,color:"#999",marginBottom:3}}>📁 Googleドライブ</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",gap:4}}>

                {c.drive_path&&<button onClick={()=>{navigator.clipboard.writeText(c.drive_path);const b=document.getElementById("toast");if(b){b.textContent="📋 パスをコピーしました";b.style.opacity=1;setTimeout(()=>b.style.opacity=0,1800);}}} style={{fontSize:11,padding:"4px 8px",borderRadius:5,background:"var(--bg2)",border:"0.5px solid var(--border)",cursor:"pointer",color:"var(--text)",whiteSpace:"nowrap"}}>📂 コピー</button>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <input value={c.drive_url||""} onChange={e=>updateField("drive_url",e.target.value)} placeholder="Web URL（ブラウザ用）" style={{fontSize:12,padding:"4px 8px",borderRadius:5,border:"0.5px solid rgba(0,0,0,0.15)",background:"var(--bg2)",flex:1}}/>

              </div>
            </div>
