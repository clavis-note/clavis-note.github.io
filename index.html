// ── モバイル対応 ──────────────────────────────────
const MobileContext = React.createContext(false);
function useMobile(){ return React.useContext(MobileContext); }

const TABS = [
  {id:"dashboard",label:"ダッシュボード",icon:"📊"},
  {id:"clients",label:"クライアント",icon:"👤"},
  {id:"cases",label:"案件管理",icon:"📋"},
  {id:"journal",label:"事件簿",icon:"📕"},
  {id:"payments",label:"報酬管理",icon:"💰"},
  {id:"master",label:"マスター登録",icon:"⚙️"},
];

const FS_KEY = "clavis-note-zoom";
const FS_OPTIONS = [{label:"小",val:"0.85"},{label:"中",val:"1"},{label:"大",val:"1.15"},{label:"特大",val:"1.3"}];

function App(){
  const [data,setData]=useState(getInitialData);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<768||/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent));
  const [activeTab,setActiveTab]=useState(()=>{const t=localStorage.getItem('clavis-note-tab');if(t){localStorage.removeItem('clavis-note-tab');return t;}return "dashboard";});
  const [fs,setFs]=useState(()=>localStorage.getItem(FS_KEY)||"1");
  const [showBackup,setShowBackup]=useState(false);
  const [navigateClientId,setNavigateClientId]=useState(null);
  const [navigateCaseId,setNavigateCaseId]=useState(null);
  const [navigatePaymentId,setNavigatePaymentId]=useState(null);
  const [gdriveReady,setGdriveReady]=useState(false);
  const [gdriveSignedIn,setGdriveSignedIn]=useState(false);
  const [gdriveSyncing,setGdriveSyncing]=useState(false);
  const [gdriveLastSync,setGdriveLastSync]=useState(()=>localStorage.getItem("clavis-gdrive-last-sync")||null);
  function handleNavigateToClient(clientId){setNavigateClientId(clientId);setActiveTab("clients");}
  function handleNavigateToCase(caseId){setNavigateCaseId(caseId);setActiveTab("cases");}
  function handleNavigateToPayment(paymentId){setNavigatePaymentId(paymentId);setActiveTab("payments");}
  const fileRef=useRef(null);

  // Google Drive初期化
  useEffect(()=>{
    const init = async () => {
      await new Promise(r => setTimeout(r, 500)); // API読み込み待機
      const ok = await initGoogleClient();
      setGdriveReady(ok);
      const savedToken = localStorage.getItem("clavis-google-token");
      if (savedToken) {
        googleAccessToken = savedToken;
        setGdriveSignedIn(true);
      }
    };
    init();
  },[]);

  async function handleGdriveSignIn(){
    try {
      await googleSignIn();
      setGdriveSignedIn(true);
      const t=document.getElementById("toast");if(t){t.textContent="✅ Googleにログインしました";t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
    } catch(e) {
      alert("ログインに失敗しました: "+e.message);
    }
  }

  function handleGdriveSignOut(){
    googleSignOut();
    setGdriveSignedIn(false);
    setGdriveLastSync(null);
    localStorage.removeItem("clavis-gdrive-last-sync");
    const t=document.getElementById("toast");if(t){t.textContent="ログアウトしました";t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
  }

  async function handleGdriveUpload(){
    if(!gdriveSignedIn){alert("先にGoogleにログインしてください");return;}
    setGdriveSyncing(true);
    try {
      await uploadToDrive(data);
      const now = new Date().toISOString();
      setGdriveLastSync(now);
      localStorage.setItem("clavis-gdrive-last-sync",now);
      const t=document.getElementById("toast");if(t){t.textContent="☁️ Driveにアップロードしました";t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
    } catch(e) {
      if(e.message.includes("401")||e.message.includes("403")){
        setGdriveSignedIn(false);
        localStorage.removeItem("clavis-google-token");
        alert("セッションが切れました。再度ログインしてください。");
      } else {
        alert("アップロードに失敗しました: "+e.message);
      }
    } finally {
      setGdriveSyncing(false);
    }
  }

  async function handleGdriveDownload(){
    if(!gdriveSignedIn){alert("先にGoogleにログインしてください");return;}
    setGdriveSyncing(true);
    try {
      const result = await downloadFromDrive();
      if(!result){alert("Driveにデータがありません");setGdriveSyncing(false);return;}
      if(!result.data.cases||!result.data.clients){alert("不正なデータ形式です");setGdriveSyncing(false);return;}
      if(confirm(`Driveからデータを読み込みます。\n（最終更新: ${new Date(result.modifiedTime).toLocaleString()}）\n現在のデータは上書きされます。よろしいですか？`)){
        setData(result.data);
        const now = new Date().toISOString();
        setGdriveLastSync(now);
        localStorage.setItem("clavis-gdrive-last-sync",now);
        const t=document.getElementById("toast");if(t){t.textContent="☁️ Driveからダウンロードしました";t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
      }
    } catch(e) {
      if(e.message.includes("401")||e.message.includes("403")){
        setGdriveSignedIn(false);
        localStorage.removeItem("clavis-google-token");
        alert("セッションが切れました。再度ログインしてください。");
      } else {
        alert("ダウンロードに失敗しました: "+e.message);
      }
    } finally {
      setGdriveSyncing(false);
    }
  }

  // Auto-save to localStorage
  useEffect(()=>{ saveData(data); },[data]);

  // zoom適用
  useEffect(()=>{
    localStorage.setItem(FS_KEY,fs);
  },[fs]);

  // モバイル検出
  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);


  // エクスポート
  function handleExport(){
    try{
      const json=JSON.stringify(data,null,2);
      const blob=new Blob([json],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const today=new Date().toISOString().slice(0,10).replace(/-/g,"");
      const filename=`clavis-note-backup-${today}.json`;
      const a=document.createElement("a");
      a.href=url; a.download=filename; a.style.display="none";
      document.body.appendChild(a);
      a.click();
      // PWA/モバイルでa.clickが効かない場合のフォールバック
      const isPWA=window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches;
      if(isPWA||/iPhone|iPad|Android/i.test(navigator.userAgent)){
        try{window.open(url,"_blank");}catch(e){}
      }
      setTimeout(()=>{try{document.body.removeChild(a);}catch(e){} setTimeout(()=>URL.revokeObjectURL(url),5000);},500);
      const sizeKB=(blob.size/1024).toFixed(0);
      const t=document.getElementById("toast");if(t){t.textContent=`💾 バックアップを書き出しました（${sizeKB}KB）`;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,3500);}
    }catch(err){
      console.error("Export error:",err);
      alert("バックアップの書き出しに失敗しました: "+err.message);
    }
    setShowBackup(false);
  }

  // インポート
  function handleImport(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!imported.cases||!imported.clients) throw new Error("不正なフォーマット");
        if(confirm(`バックアップを読み込みます。\n現在のデータは上書きされます。\nよろしいですか？`)){
          setData(imported);
          setShowBackup(false);
          alert("読み込み完了！");
        }
      }catch(err){alert("読み込みに失敗しました。\nClavis Noteのバックアップファイルを選んでください。");}
    };
    reader.readAsText(file);
    e.target.value="";
  }

  return(
    <MobileContext.Provider value={isMobile}>
    <div style={{minHeight:"100vh",background:"#eeede8",zoom:isMobile?"1":fs}}>
      {/* グローバルナビ */}
      <div style={{background:"var(--bg)",borderBottom:"0.5px solid var(--border)",display:"flex",alignItems:"center",height:52,padding:"0 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{fontSize:15,fontWeight:600,color:"var(--text)",marginRight:isMobile?8:24,letterSpacing:"-0.02em",flexShrink:0}}>
          <span style={{color:"var(--accent-text)"}}>Clavis</span> Note
        </div>
        {!isMobile&&<div style={{display:"flex",gap:2,flex:1}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)}
              style={{fontSize:12,padding:"6px 14px",cursor:"pointer",border:"none",borderRadius:6,
                background:activeTab===t.id?"var(--accent-bg)":"transparent",
                color:activeTab===t.id?"var(--accent-text)":"var(--text2)",
                fontWeight:activeTab===t.id?500:400,display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:14}}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>}
        {isMobile&&<div style={{display:"flex",gap:0,flex:1}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)}
              style={{fontSize:16,padding:"4px 5px",cursor:"pointer",border:"none",borderRadius:6,flexShrink:0,
                background:activeTab===t.id?"var(--accent-bg)":"transparent",
                color:activeTab===t.id?"var(--accent-text)":"var(--text2)"}}>
              {t.icon}
            </button>
          ))}
        </div>}
        {isMobile&&<div style={{flex:1}}/>}
        {/* 右側コントロール */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* フォントサイズ */}
          {!isMobile&&<div style={{display:"flex",gap:2,background:"#eeede8",borderRadius:6,padding:2}}>
            {FS_OPTIONS.map(o=>(
              <button key={o.val} onClick={()=>setFs(o.val)}
                style={{fontSize:10,padding:"3px 7px",borderRadius:4,border:"none",cursor:"pointer",
                  background:fs===o.val?"var(--accent-bg)":"transparent",
                  color:fs===o.val?"var(--accent-text)":"var(--text3)",
                  fontWeight:fs===o.val?600:400}}>
                {o.label}
              </button>
            ))}
          </div>}
          {/* バックアップ */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowBackup(p=>!p)}
              style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"0.5px solid var(--border)",background:"transparent",cursor:"pointer",color:"var(--text2)",display:"flex",alignItems:"center",gap:4}}>
              💾 <span>バックアップ</span>
            </button>
            {showBackup&&(
              <>
              <div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowBackup(false)}/>
              <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"var(--bg)",border:"0.5px solid rgba(0,0,0,0.15)",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",padding:16,width:280,zIndex:200,maxHeight:"70vh",overflowY:"auto"}}>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text)",marginBottom:12}}>💾 バックアップ</div>
                <button onClick={handleExport}
                  style={{width:"100%",fontSize:12,padding:"8px 12px",borderRadius:7,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",cursor:"pointer",fontWeight:500,marginBottom:8,textAlign:"left"}}>
                  📤 書き出し（JSONダウンロード）
                </button>
                <button onClick={()=>fileRef.current?.click()}
                  style={{width:"100%",fontSize:12,padding:"8px 12px",borderRadius:7,border:"0.5px solid rgba(0,0,0,0.15)",background:"transparent",color:"var(--text2)",cursor:"pointer",textAlign:"left"}}>
                  📥 読み込み（JSONから復元）
                </button>
                <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>

                {/* Google Drive同期 */}
                <div style={{borderTop:"1px solid var(--border)",marginTop:14,paddingTop:14}}>
                  <div style={{fontSize:11,fontWeight:500,color:"var(--text2)",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14}}>☁️</span> Google Drive同期
                  </div>
                  {!gdriveReady?(
                    <div style={{fontSize:10,color:"var(--text3)"}}>Google API読み込み中...</div>
                  ):!gdriveSignedIn?(
                    <button onClick={handleGdriveSignIn}
                      style={{width:"100%",fontSize:12,padding:"8px 12px",borderRadius:7,border:"0.5px solid #4285F4",background:"#4285F4",color:"#fff",cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                      Googleでログイン
                    </button>
                  ):(
                    <>
                      <div style={{display:"flex",gap:6,marginBottom:8}}>
                        <button onClick={handleGdriveUpload} disabled={gdriveSyncing}
                          style={{flex:1,fontSize:11,padding:"8px 10px",borderRadius:7,border:"0.5px solid var(--accent)",background:"var(--accent-bg)",color:"var(--accent-text)",cursor:gdriveSyncing?"wait":"pointer",fontWeight:500}}>
                          {gdriveSyncing?"同期中...":"⬆️ アップロード"}
                        </button>
                        <button onClick={handleGdriveDownload} disabled={gdriveSyncing}
                          style={{flex:1,fontSize:11,padding:"8px 10px",borderRadius:7,border:"0.5px solid var(--border)",background:"transparent",color:"var(--text2)",cursor:gdriveSyncing?"wait":"pointer"}}>
                          ⬇️ ダウンロード
                        </button>
                      </div>
                      {gdriveLastSync&&(
                        <div style={{fontSize:9,color:"var(--text3)",marginBottom:6}}>
                          最終同期: {new Date(gdriveLastSync).toLocaleString()}
                        </div>
                      )}
                      <button onClick={handleGdriveSignOut}
                        style={{fontSize:10,padding:"4px 8px",borderRadius:5,border:"none",background:"transparent",color:"var(--text3)",cursor:"pointer",textDecoration:"underline"}}>
                        ログアウト
                      </button>
                    </>
                  )}
                  <div style={{fontSize:9,color:"var(--text3)",marginTop:8,lineHeight:1.5}}>
                    ※ PC↔スマホでデータ共有できます<br/>
                    ※ アップロード→別端末でダウンロード
                  </div>
                </div>

                {/* 自動バックアップ */}
                {(()=>{
                  const bks=getAutoBackups();
                  return(<div style={{marginTop:14,borderTop:"0.5px solid rgba(0,0,0,0.1)",paddingTop:12}}>
                    <div style={{fontSize:11,fontWeight:500,color:"var(--text2)",marginBottom:8}}>🔄 自動バックアップ（直近3件）</div>
                    {bks.length===0?(<div style={{fontSize:10,color:"var(--text3)",lineHeight:1.6}}>まだ自動バックアップはありません。<br/>データ変更後、5分経過で自動作成されます。</div>):(
                    <>{bks.map(bk=>{
                      const d=new Date(bk.timestamp);
                      const label=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
                      const ago=Math.round((Date.now()-d.getTime())/60000);
                      const agoLabel=ago<60?`${ago}分前`:ago<1440?`${Math.round(ago/60)}時間前`:`${Math.round(ago/1440)}日前`;
                      return(
                        <div key={bk.gen} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid rgba(0,0,0,0.05)"}}>
                          <div>
                            <div style={{fontSize:12,color:"var(--text)"}}>{label}</div>
                            <div style={{fontSize:10,color:"var(--text3)"}}>{agoLabel}</div>
                          </div>
                          <button onClick={()=>{
                            if(confirm(`${label}のバックアップに復元しますか？\n現在のデータは上書きされます。`)){
                              const restored=restoreAutoBackup(bk.gen);
                              if(restored){setData(restored);setShowBackup(false);
                                const t=document.getElementById("toast");if(t){t.textContent="✅ バックアップから復元しました";t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
                              }else{alert("復元に失敗しました");}
                            }
                          }} style={{fontSize:11,padding:"4px 10px",borderRadius:5,border:"0.5px solid #2E8B57",background:"#EBF8EF",color:"#2E8B57",cursor:"pointer",fontWeight:500}}>
                            復元
                          </button>
                        </div>
                      );
                    })}</>)}
                    <div style={{fontSize:10,color:"var(--text3)",marginTop:8,lineHeight:1.6}}>
                      データ変更時に自動保存されます（5分間隔）。
                    </div>
                  </div>);
                })()}

                <div style={{fontSize:10,color:"var(--text3)",marginTop:10,lineHeight:1.6}}>
                  書き出したJSONを別のPCやスマホで読み込むと、データを移行できます。
                </div>
              </div>
              </>
            )}
          </div>
          {!isMobile&&<div style={{fontSize:11,color:"var(--text3)",marginLeft:4}}>{(data.office||{}).name||"Clavis Note"}</div>}
        </div>
      </div>

      {/* コンテンツ */}
      <div>
      {activeTab==="dashboard"&&(
        <div style={{maxWidth:960,margin:"0 auto",padding:"16px 20px"}}>
          <Dashboard data={data} setData={setData} onNavClient={handleNavigateToClient} onNavCase={handleNavigateToCase} onNavPayment={handleNavigateToPayment}/>
        </div>
      )}
      {activeTab==="clients"&&<ClientLedger data={data} setData={setData} navigateClientId={navigateClientId} clearNavigate={()=>setNavigateClientId(null)} onNavigateToCase={handleNavigateToCase}/>}
      {activeTab==="cases"&&<CaseManagement data={data} setData={setData} navigateCaseId={navigateCaseId} clearNavigate={()=>setNavigateCaseId(null)}/>}
      {activeTab==="journal"&&<CaseJournal data={data} setData={setData}/>}
      {activeTab==="payments"&&<PaymentManagement data={data} setData={setData} navigatePaymentId={navigatePaymentId} clearNavigate={()=>setNavigatePaymentId(null)}/>}
      {activeTab==="master"&&<MasterRegistration data={data} setData={setData} onNavigateToClient={handleNavigateToClient}/>}
      </div>
      {/* トースト通知 */}
      <div id="toast" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#fff",padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:500,opacity:0,transition:"opacity 0.3s",pointerEvents:"none",zIndex:9999}}/>
    </div>
    </MobileContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
