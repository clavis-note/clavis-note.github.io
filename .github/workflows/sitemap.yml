name: Generate sitemap.xml

# HTML を追加・編集して main に push すると sitemap.xml を自動再生成してコミットする。
# 生成物（sitemap.xml）の push は paths フィルタに該当しないため再トリガーされない（無限ループ防止）。
on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "scripts/generate_sitemap.py"
      - ".github/workflows/sitemap.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sitemap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastmod を git log から取るため全履歴が必要

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py > /dev/null

      - name: Commit if changed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml は最新です。変更なし。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: sitemap.xml 自動更新 [skip ci]"
          git push
