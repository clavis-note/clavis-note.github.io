name: Deploy automation (sitemap + SW version)

# HTML を追加・編集して main に push すると、
#   1) sitemap.xml を自動再生成
#   2) sw.js の CACHE_VERSION をデプロイ毎に必ず変わる値へ自動置換（青バナー出し忘れ根絶）
# を行い、変更があれば1つの bot コミットにまとめて push し、Pages 再ビルドを要求する。
# 生成物（sitemap.xml / sw.js）は paths フィルタに該当しないため再トリガーされない（無限ループ防止）。
on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "scripts/generate_sitemap.py"
      - ".github/workflows/sitemap.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write # bot コミット後に Pages 再ビルドを明示要求するため

concurrency:
  group: deploy-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastmod を git log から取るため全履歴が必要

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py > /dev/null

      - name: Bump Service Worker CACHE_VERSION
        run: |
          # デプロイ（=この push）の commit から毎回一意な版を生成し、sw.js の1行を丸ごと差し替える。
          # SHA を含めるため番号は単調増加しないが、毎デプロイ必ず変わる＝ブラウザが新版を検知して青バナーが出る。
          DATE="$(date -u +%Y-%m-%d)"
          SHA="$(git rev-parse --short HEAD)"
          VERSION="auto-${DATE}-${SHA}"
          sed -i -E "s|^(const CACHE_VERSION = ')[^']*(';)|\1${VERSION}\2|" sw.js
          echo "SW CACHE_VERSION -> ${VERSION}"
          grep -n "const CACHE_VERSION" sw.js

      - name: Commit and publish if changed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if git diff --quiet -- sitemap.xml sw.js; then
            echo "sitemap.xml / sw.js は最新です。変更なし。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml sw.js
          git commit -m "chore: sitemap.xml + SW CACHE_VERSION 自動更新 [skip ci]"
          git push
          # GITHUB_TOKEN による push は Pages の自動再ビルドを起こさないので、明示的にビルドを要求する
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages/builds"
